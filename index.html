<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Joe Coll</title>
<meta name="description" content="Joe Coll fka Osprey">
<meta name="theme-color" content="#060608">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F985;</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#060608;overflow:hidden}
iframe{position:fixed;inset:0;width:100%;height:100%;border:none}
.nav{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);z-index:100;display:flex;gap:1rem;align-items:center;background:rgba(6,6,8,.92);padding:5px 14px;border-radius:3px}
.nav button{font:400 10px/1 'Courier New',monospace;color:#fff;background:none;border:none;cursor:pointer;letter-spacing:.08em;transition:opacity .3s;padding:3px 2px;outline:none;-webkit-tap-highlight-color:transparent}
.nav button:hover{opacity:.7}
.nav button:focus,.nav button:focus-visible{outline:none;box-shadow:none}
.nav .ct{font:400 10px/1 'Courier New',monospace;color:#fff;letter-spacing:.06em;min-width:48px;text-align:center}
.nav .bv{font:400 9px/1 'Courier New',monospace;color:rgba(255,255,255,.35);letter-spacing:.04em;margin-left:4px}
@keyframes rainbow-cycle{0%{filter:sepia(1) hue-rotate(0deg) saturate(5) brightness(.8)}100%{filter:sepia(1) hue-rotate(360deg) saturate(5) brightness(.8)}}
iframe.rainbow{animation:rainbow-cycle 6s linear infinite}
@keyframes rainbow-text{0%{color:#ff4444}16%{color:#ff8844}33%{color:#ffff44}50%{color:#44ff44}66%{color:#4488ff}83%{color:#ff44ff}100%{color:#ff4444}}
.nav.rainbow-nav button,.nav.rainbow-nav .ct{animation:rainbow-text 4s linear infinite}
</style>
</head>
<body>
<iframe id="f"></iframe>
<div class="nav">
<button id="bp">&larr;</button>
<button id="br">shuffle</button>
<button id="bn">&rarr;</button>
<span class="ct" id="ct"></span><span class="bv" id="bv"></span>
</div>
<script>
var V=[1,3,4,5,6,7,9,11,13,14,15,16,17,18,19,20,21,23,25];
var N=V.length;
var idx=Math.floor(Math.random()*N);
var f=document.getElementById('f');
var ct=document.getElementById('ct');
// Cache-bust: always load fresh on page load
var STAMP=Date.now();
var BUILD='b'+new Date(STAMP).toISOString().slice(5,16).replace('T','.');
document.getElementById('bv').textContent=BUILD;

// Color themes: white, green (matrix), blue (ocean), red (blood)
var THEMES=[
  {filter:'',nav:'#fff'},
  {filter:'sepia(1) hue-rotate(75deg) saturate(5)',nav:'#00ff41'},
  {filter:'sepia(1) hue-rotate(180deg) saturate(8) brightness(.6)',nav:'#2196f3'},
  {filter:'sepia(1) hue-rotate(330deg) saturate(6) brightness(.5)',nav:'#c43030'},
  {filter:'rainbow',nav:'#fff'}
];
var ti=0;
function setTheme(i){
  ti=((i%THEMES.length)+THEMES.length)%THEMES.length;
  var t=THEMES[ti];
  var navEl=document.querySelector('.nav');
  if(t.filter==='rainbow'){
    f.style.filter='';f.classList.add('rainbow');navEl.classList.add('rainbow-nav');
    var els=document.querySelectorAll('.nav button,.nav .ct');
    for(var j=0;j<els.length;j++)els[j].style.color='';
  }else{
    f.classList.remove('rainbow');navEl.classList.remove('rainbow-nav');
    f.style.filter=t.filter;
    var els=document.querySelectorAll('.nav button,.nav .ct');
    for(var j=0;j<els.length;j++)els[j].style.color=t.nav;
  }
}

function load(i){
  idx=((i%N)+N)%N;
  f.src='/v/'+V[idx]+'.html?v='+STAMP;
  ct.textContent=(idx+1)+'/'+N;
}
function go(d){load(idx+d);}
function shuf(){
  var i;do{i=Math.floor(Math.random()*N);}while(i===idx&&N>1);
  load(i);
}
function handleKey(e){
  if(e.key==='ArrowLeft'){e.preventDefault();go(-1);}
  else if(e.key==='ArrowRight'){e.preventDefault();go(1);}
  else if(e.key==='ArrowUp'){e.preventDefault();setTheme(ti+1);}
  else if(e.key==='ArrowDown'){e.preventDefault();setTheme(ti-1);}
  else if(e.key===' '){e.preventDefault();shuf();}
}

document.getElementById('bp').onclick=function(){go(-1);};
document.getElementById('bn').onclick=function(){go(1);};
document.getElementById('br').onclick=shuf;
document.addEventListener('keydown',handleKey);

f.addEventListener('load',function(){
  try{
    var base=f.contentDocument.createElement('base');
    base.target='_blank';
    f.contentDocument.head.appendChild(base);
    f.contentWindow.addEventListener('keydown',handleKey);
    // Show variant name from page title (format: "14 — spinning donut")
    var title=f.contentDocument.title||'';
    var namePart=title.replace(/^\d+\s*[—-]\s*/,'');
    document.getElementById('bv').textContent=namePart?'· '+namePart:'';
  }catch(e){}
  setTheme(ti);
});

load(idx);
</script>
</body>
</html>
