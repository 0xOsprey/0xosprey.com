<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Joe Coll</title>
<meta name="description" content="Joe Coll fka Osprey">
<meta name="theme-color" content="#060608">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F985;</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#060608;overflow:hidden}
iframe{position:fixed;inset:0;width:100%;height:100%;border:none}
.title{position:fixed;top:calc(50% - 70px);left:50%;transform:translate(-50%,-50%);font:40px/1 'Courier New',monospace;color:rgba(255,255,255,.85);text-shadow:0 0 8px #060608,0 0 22px #060608;letter-spacing:.04em;pointer-events:none;z-index:10;white-space:nowrap}
.icons{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);display:flex;gap:28px;align-items:center;justify-content:center;z-index:10;pointer-events:none;color:rgba(255,255,255,.85)}
.icons a{color:inherit;opacity:1;text-decoration:none;pointer-events:auto;transition:opacity .3s}
.icons a:hover{opacity:.4}
.icons svg{display:block;width:28px;height:28px;filter:drop-shadow(0 0 2px rgba(6,6,8,.9)) drop-shadow(0 0 6px rgba(6,6,8,.5))}
.nav{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);z-index:100;display:flex;gap:1rem;align-items:center;background:rgba(6,6,8,.92);padding:5px 14px;border-radius:3px;opacity:0;pointer-events:none;transition:opacity .4s}
.nav.dev{opacity:1;pointer-events:auto}
.nav button{font:400 10px/1 'Courier New',monospace;color:#fff;background:none;border:none;cursor:pointer;letter-spacing:.08em;transition:opacity .3s;padding:3px 2px;outline:none;-webkit-tap-highlight-color:transparent}
.nav button:hover{opacity:.7}
.nav button:focus,.nav button:focus-visible{outline:none;box-shadow:none}
.nav .ct{font:400 10px/1 'Courier New',monospace;color:#fff;letter-spacing:.06em;min-width:48px;text-align:center}
.nav .bv{font:400 9px/1 'Courier New',monospace;color:rgba(255,255,255,.35);letter-spacing:.04em;margin-left:4px}
@keyframes rainbow-cycle{0%{filter:sepia(1) hue-rotate(0deg) saturate(5) brightness(.8)}100%{filter:sepia(1) hue-rotate(360deg) saturate(5) brightness(.8)}}
</style>
</head>
<body>
<iframe id="f"></iframe>
<div class="title">Joe Coll</div>
<div class="icons"><a href="https://x.com/0xOsprey" title="X" target="_blank"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.736l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></a><a href="https://github.com/0xOsprey" title="GitHub" target="_blank"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.342-3.369-1.342-.454-1.155-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0112 6.844a9.59 9.59 0 012.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg></a><a href="mailto:hi@0xosprey.com" title="Email"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg></a></div>
<div class="nav">
<button id="bp">&larr;</button>
<button id="br">shuffle</button>
<button id="bn">&rarr;</button>
<span class="ct" id="ct"></span><span class="bv" id="bv"></span>
</div>
<script>
var V=[1,3,4,5,7,9,11,13,15,16,17,18,19,20,21,23,25,27,29,31,33,37,39,41,43,45,47];
var N=V.length;
var idx=Math.floor(Math.random()*N);
var f=document.getElementById('f');
var ct=document.getElementById('ct');
var navEl=document.querySelector('.nav');
var titleEl=document.querySelector('.title');
var iconsEl=document.querySelector('.icons');
// Cache-bust: always load fresh on page load
var STAMP=Date.now();
var BUILD='b'+new Date(STAMP).toISOString().slice(5,16).replace('T','.');
document.getElementById('bv').textContent=BUILD;

// Color themes: white, green (matrix), blue (ocean), red (blood)
// brightness() MUST come before sepia() — it lowers the input so the later
// saturate() step doesn't clamp channels at 255 and shift hue. Blue/red had
// brightness at the end of the chain, which only dimmed the already-broken
// output.
var THEMES=[
  {filter:'',nav:'#fff'},
  {filter:'brightness(.5) sepia(1) hue-rotate(75deg) saturate(5)',nav:'#00ff41'},
  {filter:'brightness(.5) sepia(1) hue-rotate(180deg) saturate(8)',nav:'#2196f3'},
  {filter:'brightness(.5) sepia(1) hue-rotate(330deg) saturate(6)',nav:'#c43030'},
  {filter:'rainbow',nav:'#fff'}
];
var ti=0;
var rbRaf=null,rbStart=null;
var rbEls=[];

function stopRainbow(resetStart){
  if(rbRaf){cancelAnimationFrame(rbRaf);rbRaf=null;}
  if(resetStart) rbStart=null;
  f.style.filter='';
  rbEls.forEach(function(el){el.style.filter='';});
}

function tickRainbow(now){
  if(!rbStart) rbStart=now;
  var deg=((now-rbStart)/6000%1)*360;
  var flt='sepia(1) hue-rotate('+deg+'deg) saturate(5) brightness(.8)';
  f.style.filter=flt;
  rbEls.forEach(function(el){el.style.filter=flt;});
  rbRaf=requestAnimationFrame(tickRainbow);
}

function setTheme(i){
  ti=((i%THEMES.length)+THEMES.length)%THEMES.length;
  var t=THEMES[ti],rb=t.filter==='rainbow';
  stopRainbow(!rb);
  f.classList.toggle('rainbow',false);
  navEl.classList.toggle('rainbow-nav',false);
  titleEl.classList.toggle('rainbow-nav',false);
  iconsEl.classList.toggle('rainbow-nav',false);
  if(rb){
    rbEls=[titleEl,iconsEl].concat(Array.from(navEl.querySelectorAll('button,.ct')));
    rbRaf=requestAnimationFrame(tickRainbow);
  }else{
    f.style.filter=t.filter;
  }
  var c=rb?'':t.nav;
  titleEl.style.color=c;
  iconsEl.style.color=c;
  navEl.querySelectorAll('button,.ct').forEach(function(el){el.style.color=c;});
}

function load(i){
  idx=((i%N)+N)%N;
  f.src='/v/'+V[idx]+'.html?v='+STAMP;
  ct.textContent=(idx+1)+'/'+N;
}
function go(d){load(idx+d);}
function shuf(){
  var i;do{i=Math.floor(Math.random()*N);}while(i===idx&&N>1);
  load(i);
}
function onIframeClick(e){
  if(e.target.closest('a'))return;
  setTheme(ti+1);
}
function handleKey(e){
  if(e.key==='ArrowLeft'){e.preventDefault();go(-1);}
  else if(e.key==='ArrowRight'){e.preventDefault();go(1);}
  else if(e.key==='ArrowUp'){e.preventDefault();setTheme(ti+1);}
  else if(e.key==='ArrowDown'){e.preventDefault();setTheme(ti-1);}
  else if(e.key===' '){e.preventDefault();shuf();}
}

document.getElementById('bp').onclick=function(){go(-1);};
document.getElementById('bn').onclick=function(){go(1);};
document.getElementById('br').onclick=shuf;
document.addEventListener('keydown',handleKey);

// Dev mode: press D to toggle nav visibility
var devMode=false;
function toggleDev(){devMode=!devMode;navEl.classList.toggle('dev',devMode);}
function onKeyDown(e){if(e.key==='d'||e.key==='D')toggleDev();}
document.addEventListener('keydown',onKeyDown);

f.addEventListener('load',function(){
  try{
    var base=f.contentDocument.createElement('base');
    base.target='_blank';
    f.contentDocument.head.appendChild(base);
    f.contentWindow.addEventListener('keydown',handleKey);
    f.contentWindow.addEventListener('keydown',onKeyDown);
    f.contentWindow.addEventListener('click',onIframeClick);
    // Show variant name from page title (format: "14 — spinning donut")
    var title=f.contentDocument.title||'';
    var namePart=title.replace(/^\d+\s*[—-]\s*/,'');
    document.getElementById('bv').textContent=namePart?'· '+namePart:'';
  }catch(e){}
  setTheme(ti);
});

load(idx);
</script>
</body>
</html>
