<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Joe Coll</title>
<meta name="description" content="Joe Coll fka Osprey">
<meta name="theme-color" content="#060608">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F985;</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#060608;overflow:hidden}
iframe{position:fixed;inset:0;width:100%;height:100%;border:none}
</style>
</head>
<body>
<iframe id="f"></iframe>
<script>
var V=[1,3,4,5,7,9,11,13,14,15,16,17,18,19,20,21,23,25];
var FILTERS=['','sepia(1) hue-rotate(75deg) saturate(5)','sepia(1) hue-rotate(180deg) saturate(8) brightness(.6)','sepia(1) hue-rotate(330deg) saturate(6) brightness(.5)'];
var f=document.getElementById('f');
var STAMP=Date.now();
var idx=Math.floor(Math.random()*V.length);
var ti=0;

function load(i){idx=((i%V.length)+V.length)%V.length;f.src='/v/'+V[idx]+'.html?v='+STAMP;}
function go(d){load(idx+d);}
function shuf(){var i;do{i=Math.floor(Math.random()*V.length);}while(i===idx&&V.length>1);load(i);}
function setTheme(i){ti=((i%FILTERS.length)+FILTERS.length)%FILTERS.length;f.style.filter=FILTERS[ti];applyDim();}

// Name renders at alpha .85, icons at .34 (.85×.4 element opacity). Under
// saturate(5) the bright name's G channel clamps to 255 and shifts hue toward
// cyan (#00FFCB). Dim .n1 to match icon alpha so the filter produces the same hue.
function applyDim(){
  try{
    var doc=f.contentDocument;if(!doc)return;
    var s=doc.getElementById('_d');
    if(!s){s=doc.createElement('style');s.id='_d';doc.head.appendChild(s);}
    s.textContent=FILTERS[ti]?'.n1,.n2{color:rgba(255,255,255,.34)!important}':'';
  }catch(e){}
}

function onClick(e){if(!e.target.closest('a'))setTheme(ti+1);}
function onKey(e){
  if(e.key==='ArrowLeft'){e.preventDefault();go(-1);}
  else if(e.key==='ArrowRight'){e.preventDefault();go(1);}
  else if(e.key==='ArrowUp'){e.preventDefault();setTheme(ti+1);}
  else if(e.key==='ArrowDown'){e.preventDefault();setTheme(ti-1);}
  else if(e.key===' '){e.preventDefault();shuf();}
}

document.addEventListener('keydown',onKey);
f.addEventListener('load',function(){
  try{
    var base=f.contentDocument.createElement('base');base.target='_blank';
    f.contentDocument.head.appendChild(base);
    f.contentWindow.addEventListener('keydown',onKey);
    f.contentWindow.addEventListener('click',onClick);
  }catch(e){}
  applyDim();
});

load(idx);
</script>
</body>
</html>
