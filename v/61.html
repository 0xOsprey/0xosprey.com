<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>61 — rookery</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#060608;overflow:hidden;cursor:crosshair}
canvas{position:fixed;inset:0;z-index:0}
.content{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;pointer-events:none;padding:48px}
.card{pointer-events:auto;text-align:center}
</style></head><body>
<canvas id="c"></canvas>
<div class="content"><div class="card" id="card"></div></div>
<script>
(function(){
var CW=4.8,CH=10,cvs=document.getElementById('c'),ctx=cvs.getContext('2d');
var W=innerWidth,H=innerHeight;cvs.width=W;cvs.height=H;
var COLS=Math.ceil(W/CW)+1,ROWS=Math.ceil(H/CH)+1;
ctx.font='8px Courier New';ctx.textBaseline='top';
var mx=W/2,my=H/2,mOn=false;
addEventListener('mousemove',function(e){mOn=true;mx=e.clientX;my=e.clientY;});
addEventListener('mouseleave',function(){mOn=false;});
addEventListener('touchstart',function(e){if(e.touches[0]){mOn=true;mx=e.touches[0].clientX;my=e.touches[0].clientY;}},{passive:true});
addEventListener('touchmove',function(e){if(e.touches[0]){mOn=true;mx=e.touches[0].clientX;my=e.touches[0].clientY;}},{passive:true});
document.getElementById('card').innerHTML='';

// Rookery — seabird colony on a chalk cliff. Gulls perch in rows,
// individuals lift off to arc across the sky and resettle. Cursor
// near the cliff triggers an alarm: the whole colony erupts, wheels,
// and drifts back down. Kee-ar.

var grid=new Float32Array(COLS*ROWS);
var ch=new Array(COLS*ROWS);

var CLIFF=Math.round(COLS*0.58);

// Pre-generate cliff: rocky face, a few ledges
var cliffTiles=[];
(function(){
  var RC=['#','%','/','\\','|','='];
  for(var y=0;y<ROWS;y++){
    var jut=(Math.sin(y*0.5)*3 + Math.sin(y*0.17)*5)|0;
    var start=CLIFF+jut;
    for(var x=start;x<COLS;x++){
      var g=0.35+Math.random()*0.4;
      if(x===start) g+=0.25;
      var c=RC[(Math.random()*RC.length)|0];
      cliffTiles.push({x:x,y:y,c:c,g:Math.min(0.95,g)});
    }
  }
})();

// Nests — random spots on the cliff face
var nests=[];
(function(){
  var taken={};
  for(var y=2;y<ROWS-2;y+=2){
    var jut=(Math.sin(y*0.5)*3 + Math.sin(y*0.17)*5)|0;
    var base=CLIFF+jut;
    var n=2+((Math.random()*3)|0);
    for(var i=0;i<n;i++){
      var x=base+1+((Math.random()*5)|0);
      var k=y*1000+x;
      if(taken[k]) continue;
      taken[k]=1;
      nests.push({x:x,y:y,occupied:1,cooldown:0});
    }
  }
})();

// Flyers
var flyers=[];
var squawks=[];
var frame=0;
var alarmT=0;

function launch(nest){
  if(!nest.occupied||nest.cooldown>0) return;
  nest.occupied=0;nest.cooldown=80+Math.random()*200;
  // Arc: depart left from cliff, loop back
  var turnX=20+Math.random()*(CLIFF-40);
  var turnY=Math.max(2,nest.y-8+Math.random()*6);
  flyers.push({
    x:nest.x-1,y:nest.y,
    phase:0,timer:0,
    waypoints:[
      {x:turnX,y:turnY,t:90+Math.random()*60},
      {x:turnX+5,y:Math.max(1,nest.y-12),t:50},
      {x:nest.x,y:nest.y,t:80}
    ],
    home:nest,wing:Math.random()*6
  });
  if(Math.random()<0.4){
    squawks.push({x:nest.x-1,y:nest.y-1,text:Math.random()<0.5?'kee-ar':'kree',life:40});
  }
}

function massLaunch(){
  for(var i=0;i<nests.length;i++){
    if(Math.random()<0.8) launch(nests[i]);
  }
}

function step(){
  frame++;
  // Cooldown
  for(var i=0;i<nests.length;i++){
    if(nests[i].cooldown>0) nests[i].cooldown--;
  }
  // Ambient spontaneous launches
  if(Math.random()<0.04){
    var pick=nests[(Math.random()*nests.length)|0];
    launch(pick);
  }

  // Alarm from cursor near cliff
  if(mOn){
    var cx=mx/CW,cy=my/CH;
    if(cx>CLIFF-14&&alarmT===0){
      alarmT=1;
      setTimeout(massLaunch,0);
    }
    if(cx<CLIFF-24) alarmT=0;
  }

  // Fly
  for(var f=flyers.length-1;f>=0;f--){
    var fl=flyers[f];
    fl.timer++;
    var wp=fl.waypoints[fl.phase];
    var dx=wp.x-fl.x,dy=wp.y-fl.y;
    var d=Math.sqrt(dx*dx+dy*dy);
    var spd=Math.min(0.6,d*0.08+0.15);
    if(d<0.7||fl.timer>wp.t){
      fl.phase++;fl.timer=0;
      if(fl.phase>=fl.waypoints.length){
        fl.home.occupied=1;
        if(Math.random()<0.25) squawks.push({x:fl.home.x-1,y:fl.home.y-1,text:'kree',life:30});
        flyers.splice(f,1);
        continue;
      }
    }else{
      fl.x+=dx/d*spd;
      fl.y+=dy/d*spd;
    }
    fl.wing+=0.5;
  }

  // Squawk life
  for(var s=squawks.length-1;s>=0;s--){
    squawks[s].life--;
    if(squawks[s].life<=0) squawks.splice(s,1);
  }
}

function stamp(x,y,c,g){
  x=Math.round(x);y=Math.round(y);
  if(x<0||x>=COLS||y<0||y>=ROWS) return;
  var id=y*COLS+x;
  if(grid[id]<g){grid[id]=g;ch[id]=c;}
}

function render(){
  for(var i=0;i<grid.length;i++){grid[i]=0;ch[i]=null;}

  // Distant sky dots (drifting clouds)
  for(var i=0;i<40;i++){
    var dx=(i*137.2+frame*0.15)%(CLIFF-4);
    var dy=((i*73)%ROWS*0.55)|0;
    stamp(dx,dy,Math.random()<0.6?'.':"'",0.18);
  }
  // Sea below
  for(var sy=ROWS-3;sy<ROWS;sy++){
    for(var sx=0;sx<CLIFF-2;sx++){
      var sv=Math.sin(sx*0.3+frame*0.05+sy)*0.4;
      stamp(sx,sy,sv>0?'~':'-',0.25+Math.max(0,sv)*0.3);
    }
  }

  // Cliff
  for(var r=0;r<cliffTiles.length;r++){
    var t=cliffTiles[r];
    stamp(t.x,t.y,t.c,t.g);
  }

  step();

  // Perched gulls
  for(var n=0;n<nests.length;n++){
    var nn=nests[n];
    if(!nn.occupied) continue;
    stamp(nn.x-1,nn.y,'>',0.95);
    stamp(nn.x,nn.y,'-',0.9);
    stamp(nn.x+1,nn.y,'<',0.8);
  }

  // Flyers
  var WINGS=[['v','~','v'],['-','~','-'],['^','~','^'],['-','~','-']];
  for(var f=0;f<flyers.length;f++){
    var fl=flyers[f];
    var wp2=WINGS[(fl.wing|0)%4];
    var bx=Math.round(fl.x),by=Math.round(fl.y);
    stamp(bx-1,by,wp2[0],1.1);
    stamp(bx,by,wp2[1],1.2);
    stamp(bx+1,by,wp2[2],1.1);
  }

  // Squawks (text)
  ctx.fillStyle='#060608';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#ffffff';
  for(var row=0;row<ROWS;row++){
    for(var col=0;col<COLS;col++){
      var id=row*COLS+col;
      var g=grid[id];if(g<0.05) continue;
      ctx.globalAlpha=Math.min(1,g);
      ctx.fillText(ch[id]||'.',col*CW,row*CH);
    }
  }
  // Squawks overlay
  for(var s=0;s<squawks.length;s++){
    var sq=squawks[s];
    ctx.globalAlpha=Math.min(1,sq.life/40);
    ctx.fillText(sq.text,sq.x*CW,(sq.y-Math.round((40-sq.life)*0.08))*CH);
  }
  ctx.globalAlpha=1;
  requestAnimationFrame(render);
}
requestAnimationFrame(render);
})();
</script></body></html>
