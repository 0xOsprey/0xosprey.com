<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>61 — braided river</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#060608;overflow:hidden;cursor:crosshair}
canvas{position:fixed;inset:0;z-index:0}
.content{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;pointer-events:none;padding:48px}
.card{pointer-events:auto;text-align:center}
</style></head><body>
<canvas id="c"></canvas>
<div class="content"><div class="card" id="card"></div></div>
<script>
(function(){
var CW=4.8,CH=10,cvs=document.getElementById('c'),ctx=cvs.getContext('2d');
var W=innerWidth,H=innerHeight;cvs.width=W;cvs.height=H;
var COLS=Math.ceil(W/CW)+1,ROWS=Math.ceil(H/CH)+1;
ctx.font='8px Courier New';ctx.textBaseline='top';
var mx=-1,my=-1,mOn=false;
addEventListener('mousemove',function(e){mOn=true;mx=e.clientX;my=e.clientY});
addEventListener('mouseleave',function(){mOn=false});
addEventListener('touchstart',function(e){if(e.touches[0]){mOn=true;mx=e.touches[0].clientX;my=e.touches[0].clientY;}},{passive:true});
addEventListener('touchmove',function(e){if(e.touches[0]){mOn=true;mx=e.touches[0].clientX;my=e.touches[0].clientY;}},{passive:true});
document.getElementById('card').innerHTML='';

// Braided river — meltwater crossing an outwash plain. Water
// deepens whatever channel it follows; deep channels capture more
// water; starved bars dry out and the braid reweaves itself,
// forever. Press the cursor into the plain and the river bends
// to meet your finger. Leave, and your channel slowly silts in.

var RAMP=' .·:;=+*#%@';
var depth=new Float32Array(COLS*ROWS); // carved bed (memory)
var S=new Float32Array(COLS*ROWS);     // sparkle (water moving now)

var M=520;
var wx=new Float32Array(M),wy=new Float32Array(M),
    wv=new Float32Array(M),ws=new Float32Array(M);
for(var i=0;i<M;i++){
  wx[i]=Math.random()*W;
  wy[i]=H*(0.20+0.60*Math.random());
  wv[i]=0;
  ws[i]=1.0+Math.random()*1.2;
}

function render(now){
  var t=now*0.001;

  for(var i=0;i<depth.length;i++){depth[i]*=0.9962;S[i]*=0.78;}

  // cursor carves the plain
  if(mOn){
    var cgc=mx/CW,cgr=my/CH;
    var c0=Math.max(0,cgc-5|0),c1=Math.min(COLS-1,cgc+5|0);
    var r0=Math.max(0,cgr-3|0),r1=Math.min(ROWS-1,cgr+3|0);
    for(var r=r0;r<=r1;r++)for(var c=c0;c<=c1;c++){
      var dc=c-cgc,dr=(r-cgr)*2.08;
      depth[r*COLS+c]+=0.34*Math.exp(-(dc*dc+dr*dr)/7);
    }
  }

  for(var i=0;i<M;i++){
    var c=wx[i]/CW|0,r=wy[i]/CH|0;
    // look downstream: which thread is deepest?
    var c2=Math.min(COLS-1,c+4);
    var best=-1e9,bi=0;
    for(var k=-1;k<=1;k++){
      var rr=r+k*2;
      if(rr<1||rr>=ROWS-1)continue;
      var d=depth[rr*COLS+c2];
      // slow meander noise keeps the braid alive
      d+=0.35*Math.sin(wx[i]*0.006+t*0.10+k*1.7+Math.sin(wy[i]*0.010-t*0.07)*2.0);
      if(d>best){best=d;bi=k;}
    }
    wv[i]+=(bi*0.55-wv[i])*0.05+(Math.random()-0.5)*0.07;
    // the river is drawn to the carved line
    if(mOn){
      var ddx=mx-wx[i],ddy=my-wy[i];
      if(ddx>-40&&ddx<260&&ddy*ddy<200*200)
        wv[i]+=Math.max(-0.4,Math.min(0.4,ddy*0.004))*0.16;
    }
    // gentle pull back toward mid-plain so it never walks offscreen
    wv[i]+=((H*0.5-wy[i])/H)*0.010;

    wy[i]+=wv[i];wx[i]+=ws[i];
    if(wy[i]<CH)wy[i]=CH;if(wy[i]>H-CH)wy[i]=H-CH;
    if(wx[i]>W){
      wx[i]=0;
      wy[i]=H*(0.30+0.40*Math.random());
      wv[i]=0;
    }

    c=wx[i]/CW|0;r=wy[i]/CH|0;
    var id=r*COLS+c;
    depth[id]=Math.min(2.2,depth[id]+0.05);
    S[id]+=0.5;
  }

  ctx.fillStyle='#060608';ctx.fillRect(0,0,W,H);ctx.fillStyle='#ffffff';

  for(var row=0;row<ROWS;row++){
    for(var col=0;col<COLS;col++){
      var id=row*COLS+col;
      var bed=Math.min(0.30,depth[id]*0.16);
      var water=Math.min(1,S[id]);
      var b=bed+water*0.85;
      if(b<0.035)continue;
      b=Math.min(1,b);
      var ch;
      if(water>0.55)ch='~';
      else{
        var ci=Math.min(RAMP.length-1,(b*RAMP.length)|0);
        ch=RAMP[ci];
        if(ch===' ')continue;
      }
      ctx.globalAlpha=b;
      ctx.fillText(ch,col*CW,row*CH);
    }
  }
  ctx.globalAlpha=1;
  requestAnimationFrame(render);
}
requestAnimationFrame(render);
})();
</script></body></html>
