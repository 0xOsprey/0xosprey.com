<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>29 — volcanic plume</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#060608;overflow:hidden;cursor:crosshair}
canvas{position:fixed;inset:0;z-index:0}
.content{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;pointer-events:none;padding:48px}
.card{pointer-events:auto;text-align:center}
.name{position:relative;height:52px;margin-bottom:20px;white-space:nowrap}
.n1,.n2{position:absolute;top:0;left:50%;transform:translateX(-50%);font:40px/1 'Courier New',monospace;color:rgba(255,255,255,.85);text-shadow:0 0 8px #060608,0 0 22px #060608;letter-spacing:.04em}
.n1{animation:ns1 14s infinite}
.n2{animation:ns2 14s infinite;opacity:0}
@keyframes ns1{0%,40%{opacity:1;filter:blur(0)}55%{opacity:0;filter:blur(7px)}90%{opacity:0;filter:blur(7px)}100%{opacity:1;filter:blur(0)}}@keyframes ns2{0%,40%{opacity:0;filter:blur(7px)}55%{opacity:1;filter:blur(0)}90%{opacity:1;filter:blur(0)}100%{opacity:0;filter:blur(7px)}}
.icons{display:flex;gap:28px;align-items:center;justify-content:center}
.icons a{color:rgba(255,255,255,.85);opacity:1;transition:opacity .3s;text-decoration:none}
.icons a:hover{opacity:.45}
.icons svg{display:block;width:28px;height:28px;filter:drop-shadow(0 0 2px rgba(6,6,8,.9)) drop-shadow(0 0 6px rgba(6,6,8,.5))}
</style></head><body>
<canvas id="c"></canvas>
<div class="content"><div class="card" id="card"></div></div>
<script>
(function(){
var CW=4.8,CH=10,cvs=document.getElementById('c'),ctx=cvs.getContext('2d');
var W=innerWidth,H=innerHeight;cvs.width=W;cvs.height=H;
var COLS=Math.ceil(W/CW)+1,ROWS=Math.ceil(H/CH)+1;
ctx.font='8px Courier New';ctx.textBaseline='top';
var mx=-1,my=-1,mOn=false;
addEventListener('mousemove',function(e){mOn=true;mx=e.clientX;my=e.clientY});
addEventListener('mouseleave',function(){mOn=false});
var cardEl=document.getElementById('card');
cardEl.innerHTML='';

// Volcanic plume — buoyant particles erupt from a vent and rise through
// noise-driven thermal turbulence. Dense and bright at the base, the column
// fractures into wispy tendrils far above. Cursor shifts the wind, tilting the plume.

var RAMP=' .\u00B7:;=+*#%@\u2588';
var N=480;
var ppx=new Float32Array(N),ppy=new Float32Array(N);
var pvx=new Float32Array(N),pvy=new Float32Array(N);
var page=new Float32Array(N);   // [0..1] normalized age
var plife=new Float32Array(N);  // lifetime in frames

var BASE_Y=H*0.93;
var EMIT_SPREAD=22;
var LIFT=-2.6;        // base upward velocity (px/frame)
var LIFETIME_MIN=90,LIFETIME_RANGE=100;
var smoothWind=0;

function resetParticle(i,t){
  ppx[i]=W/2+(Math.random()-.5)*EMIT_SPREAD;
  ppy[i]=BASE_Y+(Math.random()-.5)*8;
  var spread=(Math.random()-.5)*0.9;
  pvx[i]=spread;
  pvy[i]=LIFT*(0.85+Math.random()*0.30);
  page[i]=0;
  plife[i]=LIFETIME_MIN+Math.random()*LIFETIME_RANGE;
}

for(var i=0;i<N;i++){
  resetParticle(i,0);
  page[i]=Math.random(); // stagger start
  ppx[i]=W/2+(Math.random()-.5)*EMIT_SPREAD;
  ppy[i]=BASE_Y-(page[i]*plife[i])*(-LIFT);
}

var field=new Float32Array(COLS*ROWS);

// Multi-octave turbulence
function turbX(x,y,t){
  var s=0.018;
  return(Math.sin(x*s*1.0+y*s*0.5+t*0.72)*0.45
        +Math.sin(x*s*2.1-y*s*0.9+t*1.05)*0.28
        +Math.sin(x*s*0.7+y*s*1.6-t*0.58)*0.20
        +Math.sin((x-y)*s*1.3+t*0.88)*0.14)*2.0;
}
function turbY(x,y,t){
  var s=0.018;
  return(Math.sin(x*s*0.9+y*s*1.1+t*0.65)*0.35
        +Math.sin(x*s*1.8-y*s*0.6+t*0.90)*0.22
        +Math.sin(x*s*0.5+y*s*2.0-t*0.48)*0.18)*1.2;
}

function render(now){
  var t=now*.001;

  // Wind from cursor x offset
  var targetWind=mOn?(mx-W/2)/W*3.5:0;
  smoothWind+=(targetWind-smoothWind)*0.025;

  for(var i=0;i<field.length;i++) field[i]*=0.78;

  for(var i=0;i<N;i++){
    page[i]+=1/plife[i];
    if(page[i]>=1){resetParticle(i,t);continue;}

    var age=page[i];
    var tx=turbX(ppx[i],ppy[i],t);
    var ty=turbY(ppx[i],ppy[i],t);
    // Turbulence increases with height (as plume rises it disperses)
    var hFrac=Math.max(0,(BASE_Y-ppy[i])/(BASE_Y));
    var turb=0.4+hFrac*2.2;
    pvx[i]+=tx*turb*.06+smoothWind*.04;
    pvy[i]+=ty*turb*.04;
    // Slight buoyancy taper: early upward acceleration, later coasting
    pvy[i]+=(age<0.3?-0.04:0.015);
    pvx[i]*=0.985;
    pvy[i]=Math.max(LIFT*1.6,Math.min(0.4,pvy[i]));
    ppx[i]+=pvx[i];
    ppy[i]+=pvy[i];

    // Brightness: high when young and dense, fades with age
    var b=Math.pow(1-age,1.8)*(0.7+hFrac*0.0);
    if(b<0.04) continue;

    // Gaussian splat
    var gc=ppx[i]/CW,gr=ppy[i]/CH;
    var sr=0.8+age*1.4;
    var inv=1/(sr*sr+0.1);
    var c0=Math.max(0,Math.ceil(gc-sr-1)),c1=Math.min(COLS-1,Math.floor(gc+sr+1));
    var r0=Math.max(0,Math.ceil(gr-sr-1)),r1=Math.min(ROWS-1,Math.floor(gr+sr+1));
    for(var r=r0;r<=r1;r++){
      for(var c=c0;c<=c1;c++){
        var dc=c-gc,dr=r-gr;
        field[r*COLS+c]+=b*Math.exp(-(dc*dc+dr*dr)*inv);
      }
    }
  }

  ctx.fillStyle='#060608';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#ffffff';

  for(var row=0;row<ROWS;row++){
    for(var col=0;col<COLS;col++){
      var b=Math.min(1,field[row*COLS+col]);
      if(b<0.025) continue;
      var ci=Math.min(RAMP.length-1,(b*RAMP.length)|0);
      var ch=RAMP[ci];
      if(ch===' ') continue;
      ctx.globalAlpha=b;
      ctx.fillText(ch,col*CW,row*CH);
    }
  }
  ctx.globalAlpha=1;
  requestAnimationFrame(render);
}
requestAnimationFrame(render);
})();
</script></body></html>
