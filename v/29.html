<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>29 — physarum</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#060608;overflow:hidden;cursor:crosshair}
canvas{position:fixed;inset:0;z-index:0}
.content{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;pointer-events:none;padding:48px}
.card{pointer-events:auto;text-align:center}
</style></head><body>
<canvas id="c"></canvas>
<div class="content"><div class="card" id="card"></div></div>
<script>
(function(){
var CW=4.8,CH=10,cvs=document.getElementById('c'),ctx=cvs.getContext('2d');
var W=innerWidth,H=innerHeight;cvs.width=W;cvs.height=H;
var COLS=Math.ceil(W/CW)+1,ROWS=Math.ceil(H/CH)+1;
ctx.font='8px Courier New';ctx.textBaseline='top';
var mx=-1,my=-1,mOn=false;
addEventListener('mousemove',function(e){mOn=true;mx=e.clientX;my=e.clientY});
addEventListener('mouseleave',function(){mOn=false});
addEventListener('touchstart',function(e){if(e.touches[0]){mOn=true;mx=e.touches[0].clientX;my=e.touches[0].clientY;}},{passive:true});addEventListener('touchmove',function(e){if(e.touches[0]){mOn=true;mx=e.touches[0].clientX;my=e.touches[0].clientY;}},{passive:true});
document.getElementById('card').innerHTML='';

// Physarum polycephalum — slime mold network.
// Agents follow chemical trails and deposit more trail,
// self-organizing into branching vein networks.
// Cursor deposits food — network grows toward it.

var DIRS=['─','╲','│','╱','─','╲','│','╱'];
var N=600;
var ax=new Float32Array(N),ay=new Float32Array(N),aa=new Float32Array(N);
for(var i=0;i<N;i++){
  ax[i]=Math.random()*COLS;
  ay[i]=Math.random()*ROWS;
  aa[i]=Math.random()*Math.PI*2;
}

var trail=new Float32Array(COLS*ROWS);
var trailBuf=new Float32Array(COLS*ROWS);
var SA=Math.PI/4; // sensor angle offset
var SD=11;        // sensor distance (cells)
var RA=Math.PI/4; // rotation step
var DECAY=0.982;  // trails persist longer
var DEP=0.48;     // gentle deposit — no harsh flares
var SS=0.75;      // slow agents

function sense(x,y,angle){
  var sc=Math.round(x+Math.cos(angle)*SD);
  var sr=Math.round(y+Math.sin(angle)*SD);
  if(sc<0||sc>=COLS||sr<0||sr>=ROWS) return 0;
  return trail[sr*COLS+sc];
}

function render(){
  // Diffuse + decay
  for(var r=0;r<ROWS;r++){
    for(var c=0;c<COLS;c++){
      var idx=r*COLS+c;
      var s=trail[idx]*0.5;
      if(r>0)        s+=trail[(r-1)*COLS+c]*0.125;
      if(r<ROWS-1)   s+=trail[(r+1)*COLS+c]*0.125;
      if(c>0)        s+=trail[idx-1]*0.125;
      if(c<COLS-1)   s+=trail[idx+1]*0.125;
      trailBuf[idx]=s*DECAY; // weights sum to 1.0, times decay
    }
  }
  var tmp=trail;trail=trailBuf;trailBuf=tmp;

  // Cursor deposits food
  if(mOn){
    var mc=(mx/CW)|0,mr=(my/CH)|0;
    for(var dr=-3;dr<=3;dr++) for(var dc=-3;dc<=3;dc++){
      var rr=mr+dr,cc=mc+dc;
      if(rr>=0&&rr<ROWS&&cc>=0&&cc<COLS) trail[rr*COLS+cc]=Math.min(2,trail[rr*COLS+cc]+0.4);
    }
  }

  // Update agents
  for(var i=0;i<N;i++){
    var fwd=sense(ax[i],ay[i],aa[i]);
    var lft=sense(ax[i],ay[i],aa[i]-SA);
    var rgt=sense(ax[i],ay[i],aa[i]+SA);
    if(fwd>=lft&&fwd>=rgt){
      // no turn
    } else if(lft>rgt){
      aa[i]-=RA;
    } else if(rgt>lft){
      aa[i]+=RA;
    } else {
      aa[i]+=(Math.random()-0.5)*2*RA;
    }
    ax[i]+=Math.cos(aa[i])*SS;
    ay[i]+=Math.sin(aa[i])*SS;
    if(ax[i]<0)ax[i]+=COLS; if(ax[i]>=COLS)ax[i]-=COLS;
    if(ay[i]<0)ay[i]+=ROWS; if(ay[i]>=ROWS)ay[i]-=ROWS;
    var c2=ax[i]|0,r2=ay[i]|0;
    if(c2>=0&&c2<COLS&&r2>=0&&r2<ROWS) trail[r2*COLS+c2]=Math.min(2,trail[r2*COLS+c2]+DEP);
  }

  ctx.fillStyle='#060608';ctx.fillRect(0,0,W,H);ctx.fillStyle='#ffffff';
  for(var row=0;row<ROWS;row++){
    for(var col=0;col<COLS;col++){
      var b=trail[row*COLS+col];
      if(b<0.04) continue;
      b=Math.min(1,b);
      var dc=(trail[row*COLS+Math.min(col+1,COLS-1)]-trail[row*COLS+Math.max(col-1,0)]);
      var dr=(trail[Math.min(row+1,ROWS-1)*COLS+col]-trail[Math.max(row-1,0)*COLS+col]);
      var ang=Math.atan2(dr,dc);
      var di=((Math.round(ang/(Math.PI/4))%8)+8)%8;
      ctx.globalAlpha=b;
      ctx.fillText(DIRS[di],col*CW,row*CH);
    }
  }
  ctx.globalAlpha=1;
  requestAnimationFrame(render);
}
requestAnimationFrame(render);
})();
</script></body></html>
