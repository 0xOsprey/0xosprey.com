<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>4 — topographic</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#060608;overflow:hidden;cursor:crosshair}
#bg{position:fixed;inset:0;z-index:0;user-select:none}
.r{font:12px/14px "Courier New",monospace;white-space:pre;color:#d4d0c8}
.a1{opacity:.06}.a2{opacity:.14}.a3{opacity:.22}.a4{opacity:.32}
.a5{opacity:.44}.a6{opacity:.56}.a7{opacity:.68}.a8{opacity:.80}.a9{opacity:.90}.a10{opacity:1}
.content{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;pointer-events:none;padding:48px}
.card{pointer-events:auto;text-align:center}
.name{position:relative;height:52px;margin-bottom:20px;white-space:nowrap}
.n1,.n2{position:absolute;top:0;left:50%;transform:translateX(-50%);font:40px/1 'Courier New',monospace;color:rgba(255,255,255,.85);text-shadow:0 0 6px #060608,0 0 16px #060608;letter-spacing:.08em;font-variant:small-caps}
.n1{animation:ns1 14s infinite}
.n2{animation:ns2 14s infinite;opacity:0}
@keyframes ns1{0%,40%{opacity:1;filter:blur(0)}55%{opacity:0;filter:blur(7px)}90%{opacity:0;filter:blur(7px)}100%{opacity:1;filter:blur(0)}}@keyframes ns2{0%,40%{opacity:0;filter:blur(7px)}55%{opacity:1;filter:blur(0)}90%{opacity:1;filter:blur(0)}100%{opacity:0;filter:blur(7px)}}
.icons{display:flex;gap:28px;align-items:center;justify-content:center}
.icons a{color:rgba(255,255,255,.85);opacity:.45;transition:opacity .3s,color .3s;text-decoration:none}
.icons a:hover{opacity:1;color:#d4c8a8}
.icons svg{display:block;width:28px;height:28px;filter:drop-shadow(-1px -1px 0 #000) drop-shadow(1px -1px 0 #000) drop-shadow(-1px 1px 0 #000) drop-shadow(1px 1px 0 #000) drop-shadow(0 0 4px rgba(0,0,0,.9))}

</style></head><body>
<div id="bg"></div>
<div class="content"><div class="card" id="card">
<div class="name"><span class="n1">Joe Coll</span><span class="n2">Osprey</span></div><div class="icons"><a href="https://x.com/0xOsprey" title="X" target="_blank"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.736l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></a><a href="https://github.com/0xOsprey" title="GitHub" target="_blank"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.342-3.369-1.342-.454-1.155-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0112 6.844a9.59 9.59 0 012.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg></a><a href="mailto:hi@0xosprey.com" title="Email"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg></a></div>
</div></div>
<script>

var CH=14,CW=7.2;
var COLS=Math.ceil(innerWidth/CW)+2,ROWS=Math.ceil(innerHeight/CH)+2;

var mouseX=-1,mouseY=-1,mouseOn=false;
document.addEventListener('mousemove',function(e){mouseOn=true;mouseX=e.clientX;mouseY=e.clientY});
document.addEventListener('mouseleave',function(){mouseOn=false});
document.addEventListener('touchmove',function(e){mouseOn=true;mouseX=e.touches[0].clientX;mouseY=e.touches[0].clientY},{passive:true});
document.addEventListener('touchend',function(){mouseOn=false});

var cardEl=document.getElementById('card');
var iC0=0,iR0=0,iC1=0,iR1=0;
function updIsland(){var r=cardEl.getBoundingClientRect();iC0=Math.floor(r.left/CW)-1;iR0=Math.floor(r.top/CH)-1;iC1=Math.ceil(r.right/CW)+1;iR1=Math.ceil(r.bottom/CH)+1;}
updIsland();

// Elliptical fade parameters
var ccx=0,ccy=0,crx=1,cry=1;
function updFade(){
  var r=cardEl.getBoundingClientRect();
  ccx=(r.left+r.right)/2/CW;
  ccy=(r.top+r.bottom)/2/CH;
  crx=r.width/2/CW+3;
  cry=r.height/2/CH+2;
}
updFade();

function hash(x,y){var n=x*374761393+y*668265263;n=(n^(n>>13))*1274126177;return(n^(n>>16))/2147483648;}
function smooth(x,y){var ix=Math.floor(x),iy=Math.floor(y),fx=x-ix,fy=y-iy;fx=fx*fx*(3-2*fx);fy=fy*fy*(3-2*fy);return hash(ix,iy)*(1-fx)*(1-fy)+hash(ix+1,iy)*fx*(1-fy)+hash(ix,iy+1)*(1-fx)*fy+hash(ix+1,iy+1)*fx*fy;}
function fbm(x,y){return smooth(x,y)*.5+smooth(x*2,y*2)*.3+smooth(x*4,y*4)*.15+smooth(x*8,y*8)*.05;}
var CONTOUR_CHARS=['·','-','─','=','≈','~','∿','+','#'];
var elevation=new Float32Array(COLS*ROWS);

var bgEl=document.getElementById('bg');
var rowEls=[];
for(var r=0;r<ROWS;r++){var d=document.createElement('div');d.className='r';bgEl.appendChild(d);rowEls.push(d);}

function render(now){
  updIsland();
  updFade();
  var t=now*0.00008;
  // Cursor raises terrain
  var cursorBoost=new Float32Array(COLS*ROWS);
  if(mouseOn){
    var mc=mouseX/CW,mr=mouseY/CH;
    for(var row=0;row<ROWS;row++)for(var col=0;col<COLS;col++){
      var dx=col-mc,dy=row-mr;
      var d=Math.sqrt(dx*dx+dy*dy);
      if(d<15) cursorBoost[row*COLS+col]=0.15*(1-d/15);
    }
  }
  // Compute elevation
  for(var row=0;row<ROWS;row++)for(var col=0;col<COLS;col++){
    elevation[row*COLS+col]=fbm(col*0.03+t,row*0.04+t*0.7)+cursorBoost[row*COLS+col];
  }
  var NUM_CONTOURS=12;
  for(var row=0;row<ROWS;row++){
    var line='';
    for(var col=0;col<COLS;col++){
      var h=elevation[row*COLS+col];
      var contourLevel=h*NUM_CONTOURS;
      var frac=contourLevel%1;
      var nearContour=Math.min(frac,1-frac);
      var hR=col<COLS-1?elevation[row*COLS+col+1]:h;
      var hD=row<ROWS-1?elevation[(row+1)*COLS+col]:h;
      var gx=hR-h,gy=hD-h;
      if(nearContour<0.12){
        var v=1-nearContour/0.12;
        // Elliptical fade
        var ndx=(col-ccx)/crx;
        var ndy=(row-ccy)/cry;
        var nd=ndx*ndx+ndy*ndy;
        var fade=nd<1?nd*nd:1;
        v*=fade;
        if(v<0.03){line+=' ';continue;}
        var ci=Math.floor(contourLevel)%CONTOUR_CHARS.length;
        var ai=Math.max(1,Math.min(10,Math.round(v*8+2)));
        line+='<span class="a'+ai+'">'+CONTOUR_CHARS[ci]+'</span>';
      } else {
        line+=' ';
      }
    }
    rowEls[row].innerHTML=line;
  }
  requestAnimationFrame(render);
}
requestAnimationFrame(render);

</script></body></html>
