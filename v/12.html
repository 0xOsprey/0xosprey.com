<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>12 — lorenz attractor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#060608;overflow:hidden;cursor:crosshair}
canvas{position:fixed;inset:0;z-index:0}
.content{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;pointer-events:none}
.card{pointer-events:auto;text-align:left;padding:0}
.prompt{font:16px/1.5 'Courier New',monospace;color:#e8e0d8;text-shadow:0 0 6px #060608,0 0 14px #060608}
.links{margin-top:8px}
.links a{font:12px/1.6 'Courier New',monospace;color:rgba(232,224,216,.7);text-decoration:none;display:block;transition:color .3s;text-shadow:0 0 6px #060608,0 0 14px #060608}
.links a:hover{color:#e8e0d8}
.links a::before{content:'> ';color:rgba(232,224,216,.35)}
</style></head><body>
<canvas id="c"></canvas>
<div class="content"><div class="card" id="card"></div></div>
<script>
(function(){
var CW=4.8,CH=10,cvs=document.getElementById('c'),ctx=cvs.getContext('2d');
var W=innerWidth,H=innerHeight;cvs.width=W;cvs.height=H;
var COLS=Math.ceil(W/CW)+1,ROWS=Math.ceil(H/CH)+1;
ctx.font='8px Courier New';ctx.textBaseline='top';
var mx=-1,my=-1,mOn=false;
addEventListener('mousemove',function(e){mOn=true;mx=e.clientX;my=e.clientY});
addEventListener('mouseleave',function(){mOn=false});
var cardEl=document.getElementById('card');
cardEl.innerHTML='<div class="prompt">Joe Coll</div><div class="links"><a href="https://x.com/0xOsprey">x.com/0xOsprey</a><a href="https://github.com/0xOsprey">github.com/0xOsprey</a><a href="https://t.me/OspreyJoe">t.me/OspreyJoe</a><a href="mailto:hi@0xosprey.com">hi@0xosprey.com</a></div>';

// Lorenz system parameters
var sigma=10, rho=28, beta=8/3, dt=0.005;
var NUM_PARTICLES=80;
var SUB_STEPS=8;

// Brightness field with decay
var bright=new Float32Array(COLS*ROWS);
var DECAY=0.97;

// Block characters by brightness
var blockChars=['\u00B7','\u2591','\u2592','\u2593','\u2588'];

// Initialize particles spread around the attractor
var particles=[];
for(var i=0;i<NUM_PARTICLES;i++){
  particles.push({
    x:0.1*(Math.random()-0.5)+1,
    y:0.1*(Math.random()-0.5)+1,
    z:0.1*(Math.random()-0.5)+25
  });
}

// Attractor bounds for projection (approximate Lorenz range)
// x: roughly -20 to 20, y: -25 to 25, z: 5 to 50
var xMin=-22,xMax=22,zMin=0,zMax=52;

var cardRect=cardEl.getBoundingClientRect();
var ccx,ccy,crx,cry;
function updateCard(){
  cardRect=cardEl.getBoundingClientRect();
  ccx=(cardRect.left+cardRect.right)/2/CW;
  ccy=(cardRect.top+cardRect.bottom)/2/CH;
  crx=(cardRect.width/2/CW)+3;
  cry=(cardRect.height/2/CH)+2;
}
updateCard();
var frameCount=0;

function render(now){
  frameCount++;
  if(frameCount%60===0)updateCard();

  // Cursor modulates rho
  var currentRho=rho;
  if(mOn){
    currentRho=rho+(mx/W-0.5)*20;
  }

  // Decay brightness field
  for(var i=0;i<bright.length;i++) bright[i]*=DECAY;

  // Integrate particles
  for(var p=0;p<NUM_PARTICLES;p++){
    var pt=particles[p];
    for(var s=0;s<SUB_STEPS;s++){
      var dx=sigma*(pt.y-pt.x)*dt;
      var dy=(pt.x*(currentRho-pt.z)-pt.y)*dt;
      var dz=(pt.x*pt.y-beta*pt.z)*dt;
      pt.x+=dx;pt.y+=dy;pt.z+=dz;
    }

    // Project to screen: x -> col, z -> row
    var col=Math.floor(((pt.x-xMin)/(xMax-xMin))*COLS);
    var row=Math.floor((1-(pt.z-zMin)/(zMax-zMin))*ROWS); // z up, invert for row

    if(col>=0&&col<COLS&&row>=0&&row<ROWS){
      var idx=row*COLS+col;
      bright[idx]=Math.min(1,bright[idx]+0.25);
      // Also light up neighbors slightly for thicker trails
      if(col>0)bright[idx-1]=Math.min(1,bright[idx-1]+0.08);
      if(col<COLS-1)bright[idx+1]=Math.min(1,bright[idx+1]+0.08);
      if(row>0)bright[idx-COLS]=Math.min(1,bright[idx-COLS]+0.06);
      if(row<ROWS-1)bright[idx+COLS]=Math.min(1,bright[idx+COLS]+0.06);
    }

    // Re-seed if particle escapes
    if(Math.abs(pt.x)>100||Math.abs(pt.y)>100||Math.abs(pt.z)>100||isNaN(pt.x)){
      pt.x=0.1*(Math.random()-0.5)+1;
      pt.y=0.1*(Math.random()-0.5)+1;
      pt.z=0.1*(Math.random()-0.5)+25;
    }
  }

  // Render
  ctx.fillStyle='#060608';ctx.fillRect(0,0,W,H);ctx.fillStyle='#d4d0c8';

  for(var row=0;row<ROWS;row++){
    for(var col=0;col<COLS;col++){
      var idx=row*COLS+col;
      var b=bright[idx];
      if(b<0.02)continue;

      // Card fade
      var ndx=(col-ccx)/crx,ndy=(row-ccy)/cry;
      var nd=ndx*ndx+ndy*ndy;
      var fade=nd<1?nd*nd:1;
      b*=fade;

      if(b<0.02)continue;
      b=Math.min(1,b);

      // Choose character based on brightness
      var ci;
      if(b>0.8)ci=4;
      else if(b>0.55)ci=3;
      else if(b>0.35)ci=2;
      else if(b>0.15)ci=1;
      else ci=0;
      var ch=blockChars[ci];

      ctx.globalAlpha=b;
      ctx.fillText(ch,col*CW,row*CH);
    }
  }
  ctx.globalAlpha=1;
  requestAnimationFrame(render);
}
requestAnimationFrame(render);
})();
</script></body></html>
