<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>12 — metaballs</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#060608;overflow:hidden;cursor:crosshair}
canvas{position:fixed;inset:0;z-index:0}
.content{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;pointer-events:none}
.card{pointer-events:auto;text-align:left;padding:0}
.prompt{font:13px/1.5 'Courier New',monospace;color:#fff;text-shadow:0 0 6px #060608,0 0 14px #060608}
.links{margin-top:8px}
.links a{font:12px/1.6 'Courier New',monospace;color:rgba(255,255,255,.7);text-decoration:none;display:block;transition:color .3s;text-shadow:0 0 6px #060608,0 0 14px #060608}
.links a:hover{color:#fff}
.links a::before{content:'> ';color:rgba(255,255,255,.35)}
</style></head><body>
<canvas id="c"></canvas>
<div class="content"><div class="card" id="card"></div></div>
<script>
(function(){
var CW=4.8,CH=10,cvs=document.getElementById('c'),ctx=cvs.getContext('2d');
var W=innerWidth,H=innerHeight;cvs.width=W;cvs.height=H;
var COLS=Math.ceil(W/CW)+1,ROWS=Math.ceil(H/CH)+1;
ctx.font='8px Courier New';ctx.textBaseline='top';
var mx=-1,my=-1,mOn=false;
addEventListener('mousemove',function(e){mOn=true;mx=e.clientX;my=e.clientY});
addEventListener('mouseleave',function(){mOn=false});
var cardEl=document.getElementById('card');
cardEl.innerHTML='<div class="prompt">Joe Coll</div><div class="links"><a href="https://x.com/0xOsprey">x.com/0xOsprey</a><a href="https://github.com/0xOsprey">github.com/0xOsprey</a><a href="https://t.me/OspreyJoe">t.me/OspreyJoe</a><a href="mailto:hi@0xosprey.com">hi@0xosprey.com</a></div>';

var RAMP=' .\u00B7:;=+*#%@\u2588';

// Metaballs: blobs defined by potential field F = Σ r²/(d²+ε)
// The isosurface (F≈1) forms smooth organic boundaries.
// Blobs merge when close: their potentials add, pulling the surface together.
var NB=7;
var bx=new Float32Array(NB),by=new Float32Array(NB),br=new Float32Array(NB);
var bax=new Float32Array(NB),bay=new Float32Array(NB);
var bfx=new Float32Array(NB),bfy=new Float32Array(NB);
var bpx=new Float32Array(NB),bpy=new Float32Array(NB);

for(var i=0;i<NB;i++){
  bx[i]=0.12+Math.random()*0.76;
  by[i]=0.12+Math.random()*0.76;
  br[i]=7+Math.random()*6;      // blob radius in grid cells
  bax[i]=0.09+Math.random()*0.11;
  bay[i]=0.09+Math.random()*0.11;
  bfx[i]=0.038+Math.random()*0.055;
  bfy[i]=0.038+Math.random()*0.055;
  bpx[i]=Math.random()*Math.PI*2;
  bpy[i]=Math.random()*Math.PI*2;
}

var cbx=new Float32Array(NB),cby=new Float32Array(NB);

function render(now){
  var t=now*0.001;

  for(var i=0;i<NB;i++){
    cbx[i]=(bx[i]+Math.sin(t*bfx[i]+bpx[i])*bax[i])*COLS;
    cby[i]=(by[i]+Math.sin(t*bfy[i]+bpy[i])*bay[i])*ROWS;
  }

  ctx.fillStyle='#060608';ctx.fillRect(0,0,W,H);ctx.fillStyle='#d4d0c8';

  var cardRect=cardEl.getBoundingClientRect();
  var ccx=(cardRect.left+cardRect.right)/2/CW,ccy=(cardRect.top+cardRect.bottom)/2/CH;
  var crx=(cardRect.width/2/CW)+3,cry=(cardRect.height/2/CH)+2;

  for(var row=0;row<ROWS;row++){
    for(var col=0;col<COLS;col++){
      var F=0;
      for(var i=0;i<NB;i++){
        var dx=col-cbx[i],dy=row-cby[i];
        var r=br[i];
        F+=r*r/(dx*dx+dy*dy+0.5);
      }
      // Cursor: adds a warm additional blob
      if(mOn){
        var dx=col-mx/CW,dy=row-my/CH;
        F+=7*7/(dx*dx+dy*dy+0.5);
      }

      // Brightness: inside blobs = full, surface = glowing edge, outside = falloff
      var b;
      if(F>=1.0){
        // Interior: solid with slight over-brightness at merges
        b=0.45+Math.min(0.55,F*0.18);
      }else{
        // Exterior: smooth falloff with surface glow
        b=F*F*0.9;
      }

      // Slow global breathe
      b*=0.88+0.12*Math.sin(t*0.22);

      // Card fade
      var ndx=(col-ccx)/crx,ndy=(row-ccy)/cry;
      var nd=ndx*ndx+ndy*ndy;
      b*=nd<1?nd*nd:1;

      b=Math.max(0,Math.min(1,b));
      if(b<0.025)continue;

      var ci=Math.min(RAMP.length-1,(b*RAMP.length)|0);
      var ch=RAMP[ci];
      if(ch===' ')continue;
      ctx.globalAlpha=b;
      ctx.fillText(ch,col*CW,row*CH);
    }
  }
  ctx.globalAlpha=1;
  requestAnimationFrame(render);
}
requestAnimationFrame(render);
})();
</script></body></html>
