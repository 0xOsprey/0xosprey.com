<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>5 — terrain contours</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#060608;overflow:hidden;cursor:crosshair}
canvas{position:fixed;inset:0;z-index:0}
.content{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;pointer-events:none;padding:48px}
.card{pointer-events:auto;text-align:center}
.name{position:relative;height:52px;margin-bottom:20px;white-space:nowrap}
.n1,.n2{position:absolute;top:0;left:50%;transform:translateX(-50%);font:40px/1 'Courier New',monospace;color:rgba(255,255,255,.85);text-shadow:0 0 6px #060608,0 0 16px #060608;letter-spacing:.04em}
.n1{animation:ns1 14s infinite}
.n2{animation:ns2 14s infinite;opacity:0}
@keyframes ns1{0%,40%{opacity:1;filter:blur(0)}55%{opacity:0;filter:blur(7px)}90%{opacity:0;filter:blur(7px)}100%{opacity:1;filter:blur(0)}}@keyframes ns2{0%,40%{opacity:0;filter:blur(7px)}55%{opacity:1;filter:blur(0)}90%{opacity:1;filter:blur(0)}100%{opacity:0;filter:blur(7px)}}
.icons{display:flex;gap:28px;align-items:center;justify-content:center}
.icons a{color:rgba(255,255,255,.85);opacity:1;transition:opacity .3s,color .3s;text-decoration:none}
.icons a:hover{opacity:.45;color:#d4c8a8}
.icons svg{display:block;width:28px;height:28px;filter:drop-shadow(0 0 2px rgba(6,6,8,.9)) drop-shadow(0 0 6px rgba(6,6,8,.5))}
</style></head><body>
<canvas id="c"></canvas>
<div class="content"><div class="card" id="card"></div></div>
<script>
(function(){
var CW=4.8,CH=10,cvs=document.getElementById('c'),ctx=cvs.getContext('2d');
var W=innerWidth,H=innerHeight;cvs.width=W;cvs.height=H;
var COLS=Math.ceil(W/CW)+1,ROWS=Math.ceil(H/CH)+1;
ctx.font='8px Courier New';ctx.textBaseline='top';
var mx=-1,my=-1,mOn=false;
addEventListener('mousemove',function(e){mOn=true;mx=e.clientX;my=e.clientY});
addEventListener('mouseleave',function(){mOn=false});
addEventListener('touchstart',function(e){if(e.touches[0]){mOn=true;mx=e.touches[0].clientX;my=e.touches[0].clientY;}},{passive:true});addEventListener('touchmove',function(e){if(e.touches[0]){mOn=true;mx=e.touches[0].clientX;my=e.touches[0].clientY;}},{passive:true});
var cardEl=document.getElementById('card');
cardEl.innerHTML='';

// --- Terrain Contours with FBM noise ---

function hash(x,y){
  var n=x*374761393+y*668265263;
  n=((n^(n>>13))*1274126177)|0;
  return(n^(n>>16))/2147483648;
}

function smooth(x,y){
  var ix=Math.floor(x),iy=Math.floor(y);
  var fx=x-ix,fy=y-iy;
  // Smoothstep
  fx=fx*fx*(3-2*fx);
  fy=fy*fy*(3-2*fy);
  var a=hash(ix,iy);
  var b=hash(ix+1,iy);
  var c=hash(ix,iy+1);
  var d=hash(ix+1,iy+1);
  return a+(b-a)*fx+(c-a)*fy+(a-b-c+d)*fx*fy;
}

function fbm(x,y){
  return smooth(x,y)*0.5+smooth(x*2,y*2)*0.3+smooth(x*4,y*4)*0.15+smooth(x*8,y*8)*0.05;
}

var contourChars=['·','-','─','=','≈','~','+','#'];

// Software glyph renderer: prerendered alpha masks stamped into a
// pixel buffer, one putImageData per frame instead of per-cell
// fillText. Visuals identical; far less canvas call overhead.
var CHARS=contourChars.join('');
var GW=Math.ceil(CW)+2,GH=CH+4,GOX=1,GOY=2;
var masks=[],mbox=[];
(function(){
  var n=CHARS.length,mc=document.createElement('canvas');
  mc.width=GW*n;mc.height=GH;
  var x=mc.getContext('2d');
  x.font='8px Courier New';x.textBaseline='top';x.fillStyle='#fff';
  for(var i=0;i<n;i++)x.fillText(CHARS[i],i*GW+GOX,GOY);
  var d=x.getImageData(0,0,GW*n,GH).data;
  for(var i=0;i<n;i++){
    var m=new Uint8Array(GW*GH);
    var bx0=GW,bx1=-1,by0=GH,by1=-1;
    for(var yy=0;yy<GH;yy++)for(var xx=0;xx<GW;xx++){
      var a=d[((yy*GW*n)+(i*GW+xx))*4+3];
      m[yy*GW+xx]=a;
      if(a){if(xx<bx0)bx0=xx;if(xx>bx1)bx1=xx;if(yy<by0)by0=yy;if(yy>by1)by1=yy;}
    }
    masks.push(m);mbox.push([bx0,by0,bx1+1,by1+1]);
  }
})();
var img=ctx.createImageData(W,H);
var buf32=new Uint32Array(img.data.buffer);
var inten=new Uint8Array(W*H);
var BG=0xFF080606;
var LUT=new Uint32Array(256);
for(var i=0;i<256;i++){
  var lr=Math.round(6+(255-6)*i/255),lg=Math.round(6+(255-6)*i/255),lb=Math.round(8+(255-8)*i/255);
  LUT[i]=(255<<24)|(lb<<16)|(lg<<8)|lr;
}
function stamp(mi,a255,sx,sy){
  var m=masks[mi],bx=mbox[mi];
  var xs=bx[0],ys=bx[1],xe=bx[2],ye=bx[3];
  if(sx+xs<0)xs=-sx;if(sy+ys<0)ys=-sy;
  if(sx+xe>W)xe=W-sx;if(sy+ye>H)ye=H-sy;
  for(var yy=ys;yy<ye;yy++){
    var ro=(sy+yy)*W+sx,mo2=yy*GW;
    for(var xx=xs;xx<xe;xx++){
      var ma=m[mo2+xx];
      if(!ma)continue;
      var v=(ma*a255)>>8;
      var p=ro+xx;
      if(v>inten[p]){inten[p]=v;buf32[p]=LUT[v];}
    }
  }
}

// Hash-lattice cache: fbm octaves sample a small integer lattice of
// hash() values rebuilt per frame (a few thousand hashes) instead of
// calling hash() four times per octave per cell (hundreds of thousands).
function buildLat(m,xa,xb,ya,yb){
  var x0=Math.floor(xa*m),y0=Math.floor(ya*m);
  var w=Math.ceil(xb*m)-x0+2,h=Math.ceil(yb*m)-y0+2;
  var a=new Float32Array(w*h);
  for(var j=0;j<h;j++)for(var i=0;i<w;i++)a[j*w+i]=hash(x0+i,y0+j);
  return {a:a,w:w,x0:x0,y0:y0};
}
function sampleLat(L,x,y){
  var ix=Math.floor(x),iy=Math.floor(y);
  var fx=x-ix,fy=y-iy;
  fx=fx*fx*(3-2*fx);fy=fy*fy*(3-2*fy);
  var p=(iy-L.y0)*L.w+(ix-L.x0);
  var a=L.a[p],b=L.a[p+1],c=L.a[p+L.w],d=L.a[p+L.w+1];
  return a+(b-a)*fx+(c-a)*fy+(a-b-c+d)*fx*fy;
}

// Tinted LUTs: exact rgba(r,g,b,brightness) blend per contour level,
// brightness quantized to 32 steps (invisible at these intensities).
var QB=32,LUTS=[];
(function(){
  for(var L=0;L<16;L++){
    var hue=0.55+L*0.03,sat=0.05+L*0.02;
    for(var q=0;q<QB;q++){
      var br=(q+0.5)/QB;
      var R=Math.min(255,Math.max(0,Math.floor(212*(1+sat*Math.sin(hue*6.28))*br)));
      var Gc=Math.min(255,Math.max(0,Math.floor(208*(1+sat*Math.cos(hue*6.28))*br)));
      var B2=Math.min(255,Math.max(0,Math.floor(200*br)));
      var lut=new Uint32Array(256);
      for(var m=0;m<256;m++){
        var ea=br*m/255;
        var rr=Math.round(6+(R-6)*ea),gg=Math.round(6+(Gc-6)*ea),bb=Math.round(8+(B2-8)*ea);
        lut[m]=(255<<24)|(bb<<16)|(gg<<8)|rr;
      }
      LUTS.push(lut);
    }
  }
})();
function stampT(mi,a255,lut,sx,sy){
  var m=masks[mi],bx=mbox[mi];
  var xs=bx[0],ys=bx[1],xe=bx[2],ye=bx[3];
  if(sx+xs<0)xs=-sx;if(sy+ys<0)ys=-sy;
  if(sx+xe>W)xe=W-sx;if(sy+ye>H)ye=H-sy;
  for(var yy=ys;yy<ye;yy++){
    var ro=(sy+yy)*W+sx,mo2=yy*GW;
    for(var xx=xs;xx<xe;xx++){
      var ma=m[mo2+xx];
      if(!ma)continue;
      var v=(ma*a255)>>8;
      var p=ro+xx;
      if(v>inten[p]){inten[p]=v;buf32[p]=lut[ma];}
    }
  }
}
var numContours=12;
var scale=0.06;
var scrollSpeed=0.012;

var cardRect=cardEl.getBoundingClientRect(),fcrd=0;
function render(time){
  var t=time*0.001;
  var offX=t*scrollSpeed*8;
  var offY=t*scrollSpeed*3;

  inten.fill(0);buf32.fill(BG);

  // Card fade zone
  if(++fcrd%60===0)cardRect=cardEl.getBoundingClientRect();
  var ccx=(cardRect.left+cardRect.right)/2/CW,ccy=(cardRect.top+cardRect.bottom)/2/CH;
  var crx=(cardRect.width/2/CW)+3,cry=(cardRect.height/2/CH)+2;

  // Compute elevation grid via per-frame hash lattices
  var xa=offX,xb=offX+(COLS+1)*scale,ya=offY,yb=offY+(ROWS+1)*scale;
  var L1=buildLat(1,xa,xb,ya,yb),L2=buildLat(2,xa,xb,ya,yb),
      L4=buildLat(4,xa,xb,ya,yb),L8=buildLat(8,xa,xb,ya,yb);
  var elev=new Float32Array((COLS+1)*(ROWS+1));
  for(var row=0;row<=ROWS;row++){
    var wy=row*scale+offY;
    var pdy=(row*CH-my);
    for(var col=0;col<=COLS;col++){
      var wx=col*scale+offX;
      var e=sampleLat(L1,wx,wy)*0.5+sampleLat(L2,wx*2,wy*2)*0.3
           +sampleLat(L4,wx*4,wy*4)*0.15+sampleLat(L8,wx*8,wy*8)*0.05;

      // Mouse raises terrain
      if(mOn){
        var pdx=(col*CW-mx);
        if(pdx>-150&&pdx<150&&pdy>-150&&pdy<150){
          var pd=Math.sqrt(pdx*pdx+pdy*pdy);
          if(pd<150){
            var mf=(1-pd/150);
            mf=mf*mf;
            e+=mf*0.25;
          }
        }
      }

      elev[row*(COLS+1)+col]=e*numContours;
    }
  }

  for(var row=0;row<ROWS;row++){
    for(var col=0;col<COLS;col++){
      var e=elev[row*(COLS+1)+col];
      var eRight=elev[row*(COLS+1)+col+1];
      var eBelow=elev[(row+1)*(COLS+1)+col];

      // Detect contour crossings: does e cross an integer boundary with neighbors?
      var eFloor=Math.floor(e);
      var crossH=(Math.floor(eRight)!==eFloor);
      var crossV=(Math.floor(eBelow)!==eFloor);
      var isCross=crossH||crossV;

      if(!isCross)continue;

      // Brightness based on elevation
      var normE=(e%1);
      var brightness=0.2+0.8*Math.min(1,Math.abs(normE-0.5)*2);

      // Contour level determines character
      var level=((eFloor%contourChars.length)+contourChars.length)%contourChars.length;
      var ch=contourChars[level];

      // Card fade
      var ndx=(col-ccx)/crx,ndy=(row-ccy)/cry,nd=ndx*ndx+ndy*ndy;
      var fade=nd<1?1:1;
      brightness*=fade;

      if(brightness<0.03)continue;

      // Tinted stamp: color varies slightly by elevation level
      var Lf=eFloor<0?0:(eFloor>15?15:eFloor);
      var q=(brightness*QB)|0;if(q>=QB)q=QB-1;
      stampT(level,(brightness*255)|0,LUTS[Lf*QB+q],((col*CW+0.5)|0)-GOX,row*CH-GOY);
    }
  }

  ctx.putImageData(img,0,0);
  requestAnimationFrame(render);
}
requestAnimationFrame(render);
})();
</script></body></html>
