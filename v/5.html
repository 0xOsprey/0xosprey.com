<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>5 — slow starfield</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#060608;overflow:hidden;cursor:crosshair}
#bg{position:fixed;inset:0;z-index:0;user-select:none}
.r{white-space:pre;color:#d4d0c8}
.a1{opacity:.06}.a2{opacity:.12}.a3{opacity:.20}.a4{opacity:.30}
.a5{opacity:.42}.a6{opacity:.55}.a7{opacity:.68}.a8{opacity:.80}.a9{opacity:.90}.a10{opacity:1}
.content{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;pointer-events:none;padding:48px}
.card{pointer-events:auto;text-align:center}
.name{position:relative;height:52px;margin-bottom:20px;white-space:nowrap}
.n1,.n2{position:absolute;top:0;left:50%;transform:translateX(-50%);font:40px/1 'Courier New',monospace;color:rgba(255,255,255,.85);text-shadow:0 0 8px #060608,0 0 22px #060608;letter-spacing:.04em}
.n1{animation:ns1 14s infinite}
.n2{animation:ns2 14s infinite;opacity:0}
@keyframes ns1{0%,40%{opacity:1;filter:blur(0)}55%{opacity:0;filter:blur(7px)}90%{opacity:0;filter:blur(7px)}100%{opacity:1;filter:blur(0)}}@keyframes ns2{0%,40%{opacity:0;filter:blur(7px)}55%{opacity:1;filter:blur(0)}90%{opacity:1;filter:blur(0)}100%{opacity:0;filter:blur(7px)}}
@keyframes twinkle{0%,100%{opacity:1}50%{opacity:.5}}
.icons{display:flex;gap:28px;align-items:center;justify-content:center}
.icons a{color:rgba(255,255,255,.85);opacity:.4;transition:opacity .3s;text-decoration:none}
.icons a:hover{opacity:1}
.icons svg{display:block;width:28px;height:28px;filter:drop-shadow(-1px -1px 0 #000) drop-shadow(1px -1px 0 #000) drop-shadow(-1px 1px 0 #000) drop-shadow(1px 1px 0 #000) drop-shadow(0 0 4px rgba(0,0,0,.9))}
.r{font:11px/13px 'Courier New',monospace;height:13px}
</style></head><body>
<div id="bg"></div>
<div class="content"><div class="card" id="card"></div></div>
<script>

var CH=13,CW=6.6;
var COLS=Math.ceil(innerWidth/CW)+2,ROWS=Math.ceil(innerHeight/CH)+2;

var mouseX=-1,mouseY=-1,mouseOn=false,prevMX=-1,prevMY=-1;
document.addEventListener('mousemove',function(e){mouseOn=true;prevMX=mouseX;prevMY=mouseY;mouseX=e.clientX;mouseY=e.clientY});
document.addEventListener('mouseleave',function(){mouseOn=false});
document.addEventListener('touchmove',function(e){mouseOn=true;mouseX=e.touches[0].clientX;mouseY=e.touches[0].clientY},{passive:true});
document.addEventListener('touchend',function(){mouseOn=false});

var cardEl=document.getElementById('card');
cardEl.innerHTML='<div class="name"><span class="n1">Joe Coll</span><span class="n2">Osprey</span></div><div class="icons"><a href="https://x.com/0xOsprey" title="X" target="_blank"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.736l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></a><a href="https://github.com/0xOsprey" title="GitHub" target="_blank"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.342-3.369-1.342-.454-1.155-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0112 6.844a9.59 9.59 0 012.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg></a><a href="mailto:hi@0xosprey.com" title="Email"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg></a></div>';

// Wrap characters in twinkle spans
function wrapTwinkle(el){
  if(!el)return;
  var text=el.textContent;
  var html='';
  for(var i=0;i<text.length;i++){
    if(text[i]===' '){html+=' ';continue;}
    var dur=(1.5+Math.random()*3).toFixed(2);
    var del=(Math.random()*3).toFixed(2);
    html+='<span class="tw" style="animation:twinkle '+dur+'s ease-in-out '+del+'s infinite">'+text[i]+'</span>';
  }
  el.innerHTML=html;
}
wrapTwinkle(document.getElementById('promptEl'));
var linkEls=document.querySelectorAll('#linksEl a');
for(var li=0;li<linkEls.length;li++) wrapTwinkle(linkEls[li]);

// Elliptical fade parameters
var ccx=0,ccy=0,crx=1,cry=1;
function updFade(){
  var r=cardEl.getBoundingClientRect();
  ccx=(r.left+r.right)/2/CW;
  ccy=(r.top+r.bottom)/2/CH;
  crx=r.width/2/CW+3;
  cry=r.height/2/CH+2;
}
updFade();

var STAR_N=800;
var stars=[];
for(var i=0;i<STAR_N;i++)stars.push({x:(Math.random()-.5)*3,y:(Math.random()-.5)*3,z:Math.random()});
var grid=new Float32Array(COLS*ROWS);
var RAMP=' \u00B7.+*\u2022\u2726\u2736\u2738';
var RAMP2=' \u2219\u2027\u00D7\u2666\u25C6\u2605\u2588';
var steerX=0,steerY=0;

var bgEl=document.getElementById('bg');
var rowEls=[];
for(var r=0;r<ROWS;r++){var d=document.createElement('div');d.className='r';bgEl.appendChild(d);rowEls.push(d);}

function render(now){
  updFade();
  for(var i=0;i<grid.length;i++)grid[i]*=.75;
  if(mouseOn){steerX+=((mouseX/innerWidth-.5)*.006-steerX)*.03;steerY+=((mouseY/innerHeight-.5)*.006-steerY)*.03;}
  else{steerX*=.99;steerY*=.99;}
  var speed=.004;
  for(var i=0;i<STAR_N;i++){
    var s=stars[i];
    s.z-=speed;s.x+=steerX;s.y+=steerY;
    if(s.z<=.001){s.x=(Math.random()-.5)*3;s.y=(Math.random()-.5)*3;s.z=1;}
    var sx=s.x/s.z,sy=s.y/s.z;
    var col=Math.floor((sx+1)*.5*COLS),row=Math.floor((sy+1)*.5*ROWS);
    if(col<0||col>=COLS||row<0||row>=ROWS)continue;
    var brightness=Math.min(1,(1-s.z)*1.8);
    grid[row*COLS+col]=Math.max(grid[row*COLS+col],brightness);
    for(var t=1;t<4;t++){
      var pz=s.z+speed*t*4;if(pz>1)continue;
      var psx=s.x/pz,psy=s.y/pz;
      var pc=Math.floor((psx+1)*.5*COLS),pr=Math.floor((psy+1)*.5*ROWS);
      if(pc>=0&&pc<COLS&&pr>=0&&pr<ROWS)grid[pr*COLS+pc]=Math.max(grid[pr*COLS+pc],brightness*(1-t/4)*.5);
    }
  }
  for(var row=0;row<ROWS;row++){
    var line='';
    for(var col=0;col<COLS;col++){
      var v=grid[row*COLS+col];
      // Elliptical fade
      var ndx=(col-ccx)/crx;
      var ndy=(row-ccy)/cry;
      var nd=ndx*ndx+ndy*ndy;
      var fade=nd<1?nd*nd:1;
      v*=fade;
      if(v<.04){line+=' ';continue;}
      var ramp=((row*131+col*997)&1)?RAMP:RAMP2;
      var ci=Math.min(ramp.length-1,(v*ramp.length)|0);
      var ai=Math.max(1,Math.min(10,Math.round(v*10)));
      line+='<span class="a'+ai+'">'+ramp[ci]+'</span>';
    }
    rowEls[row].innerHTML=line;
  }
  requestAnimationFrame(render);
}
requestAnimationFrame(render);

</script></body></html>
