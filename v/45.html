<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>45 — cyclic ca</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#060608;overflow:hidden;cursor:crosshair}
canvas{position:fixed;inset:0;z-index:0}
.content{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;pointer-events:none;padding:48px}
.card{pointer-events:auto;text-align:center}
</style></head><body>
<canvas id="c"></canvas>
<div class="content"><div class="card" id="card"></div></div>
<script>
(function(){
var CW=4.8,CH=10,cvs=document.getElementById('c'),ctx=cvs.getContext('2d');
var W=innerWidth,H=innerHeight;cvs.width=W;cvs.height=H;
var COLS=Math.ceil(W/CW)+1,ROWS=Math.ceil(H/CH)+1;
ctx.font='8px Courier New';ctx.textBaseline='top';
var mx=-1,my=-1,mOn=false;
addEventListener('mousemove',function(e){mOn=true;mx=e.clientX;my=e.clientY});
addEventListener('mouseleave',function(){mOn=false});
document.getElementById('card').innerHTML='';

// Cyclic cellular automaton — K colors arranged in a clock.
// A cell advances to the next color when ≥ THRESH neighbors
// are already at that next color. This creates expanding waves
// that curve into spirals that devour each other in an
// endless competition. Cursor scatters pigment.

var K=15;     // number of color states
var THRESH=2; // neighbors needed to advance
var STEPS=1;  // CA steps per render frame

var grid=new Int32Array(COLS*ROWS);
var gnext=new Int32Array(COLS*ROWS);

// Random initialization — spiral seeds arise from phase singularities
for(var i=0;i<grid.length;i++) grid[i]=Math.floor(Math.random()*K);

var RAMP=[' ','\u00B7','.',':',';','=','+','*','#','@','\u2588'];

function step(){
  if(mOn){
    var mc=(mx/CW)|0,mr=(my/CH)|0;
    for(var dr=-4;dr<=4;dr++) for(var dc=-4;dc<=4;dc++){
      var rr=mr+dr,cc=mc+dc;
      if(rr>=0&&rr<ROWS&&cc>=0&&cc<COLS) grid[rr*COLS+cc]=Math.floor(Math.random()*K);
    }
  }
  for(var r=0;r<ROWS;r++){
    for(var c=0;c<COLS;c++){
      var state=grid[r*COLS+c];
      var nxt=(state+1)%K;
      var n=0;
      var rm1=r>0,rp1=r<ROWS-1,cm1=c>0,cp1=c<COLS-1;
      if(rm1&&grid[(r-1)*COLS+c]===nxt)n++;
      if(rp1&&grid[(r+1)*COLS+c]===nxt)n++;
      if(cm1&&grid[r*COLS+c-1]===nxt)n++;
      if(cp1&&grid[r*COLS+c+1]===nxt)n++;
      if(rm1&&cm1&&grid[(r-1)*COLS+c-1]===nxt)n++;
      if(rm1&&cp1&&grid[(r-1)*COLS+c+1]===nxt)n++;
      if(rp1&&cm1&&grid[(r+1)*COLS+c-1]===nxt)n++;
      if(rp1&&cp1&&grid[(r+1)*COLS+c+1]===nxt)n++;
      gnext[r*COLS+c]=(n>=THRESH)?nxt:state;
    }
  }
  var tmp=grid;grid=gnext;gnext=tmp;
}

function render(){
  for(var s=0;s<STEPS;s++) step();

  ctx.fillStyle='#060608';ctx.fillRect(0,0,W,H);ctx.fillStyle='#ffffff';
  for(var row=0;row<ROWS;row++){
    for(var col=0;col<COLS;col++){
      var state=grid[row*COLS+col];
      if(state===0) continue;
      var b=state/(K-1);
      if(b<0.05) continue;
      var ci=Math.min(RAMP.length-1,(b*(RAMP.length-1))|0);
      ctx.globalAlpha=b;
      ctx.fillText(RAMP[ci],col*CW,row*CH);
    }
  }
  ctx.globalAlpha=1;
  requestAnimationFrame(render);
}
requestAnimationFrame(render);
})();
</script></body></html>
