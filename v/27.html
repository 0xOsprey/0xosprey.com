<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>27 — magnetosphere</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#060608;overflow:hidden;cursor:crosshair}
canvas{position:fixed;inset:0;z-index:0}
.content{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;pointer-events:none;padding:48px}
.card{pointer-events:auto;text-align:center}
.name{position:relative;height:52px;margin-bottom:20px;white-space:nowrap}
.n1,.n2{position:absolute;top:0;left:50%;transform:translateX(-50%);font:40px/1 'Courier New',monospace;color:rgba(255,255,255,.85);text-shadow:0 0 8px #060608,0 0 22px #060608;letter-spacing:.04em}
.n1{animation:ns1 14s infinite}
.n2{animation:ns2 14s infinite;opacity:0}
@keyframes ns1{0%,40%{opacity:1;filter:blur(0)}55%{opacity:0;filter:blur(7px)}90%{opacity:0;filter:blur(7px)}100%{opacity:1;filter:blur(0)}}@keyframes ns2{0%,40%{opacity:0;filter:blur(7px)}55%{opacity:1;filter:blur(0)}90%{opacity:1;filter:blur(0)}100%{opacity:0;filter:blur(7px)}}
.icons{display:flex;gap:28px;align-items:center;justify-content:center}
.icons a{color:rgba(255,255,255,.85);opacity:1;transition:opacity .3s;text-decoration:none}
.icons a:hover{opacity:.45}
.icons svg{display:block;width:28px;height:28px;filter:drop-shadow(0 0 2px rgba(6,6,8,.9)) drop-shadow(0 0 6px rgba(6,6,8,.5))}
</style></head><body>
<canvas id="c"></canvas>
<div class="content"><div class="card" id="card"></div></div>
<script>
(function(){
var CW=4.8,CH=10,cvs=document.getElementById('c'),ctx=cvs.getContext('2d');
var W=innerWidth,H=innerHeight;cvs.width=W;cvs.height=H;
var COLS=Math.ceil(W/CW)+1,ROWS=Math.ceil(H/CH)+1;
ctx.font='8px Courier New';ctx.textBaseline='top';
var mx=-1,my=-1,mOn=false;
addEventListener('mousemove',function(e){mOn=true;mx=e.clientX;my=e.clientY});
addEventListener('mouseleave',function(){mOn=false});
addEventListener('touchstart',function(e){if(e.touches[0]){mOn=true;mx=e.touches[0].clientX;my=e.touches[0].clientY;}},{passive:true});addEventListener('touchmove',function(e){if(e.touches[0]){mOn=true;mx=e.touches[0].clientX;my=e.touches[0].clientY;}},{passive:true});
var cardEl=document.getElementById('card');
cardEl.innerHTML='';

// Magnetosphere — potential flow of solar wind around a planetary obstacle.
// Classical irrotational flow around a cylinder: streamlines curve perfectly
// around the planet, compressing on the day-side, stretching a long tail behind.
// Cursor moves the planet. Direction arrows trace the flow topology.

var DIRS=['\u2192','\u2197','\u2191','\u2196','\u2190','\u2199','\u2193','\u2198'];
var N=700;
var ppx=new Float32Array(N),ppy=new Float32Array(N);
var R=Math.min(W,H)*0.27; // magnetosphere radius
var R2=R*R;
var V0=2.0;    // stream speed
var MAX_SPD=4.0;

for(var i=0;i<N;i++){
  ppx[i]=Math.random()*W;
  ppy[i]=Math.random()*H;
}

var cx=W/2,cy=H/2;
var scx=W/2,scy=H/2;

var field=new Float32Array(COLS*ROWS);
var dfx=new Float32Array(COLS*ROWS);
var dfy=new Float32Array(COLS*ROWS);
var DECAY=0.89;

function flow(x,y){
  var dx=x-cx,dy=y-cy;
  var r2=dx*dx+dy*dy;
  if(r2<R2*0.12) return {vx:0,vy:0};
  var r4=r2*r2;
  // Potential flow around cylinder: u=(V0*(1+R2*(dy2-dx2)/r4), -V0*R2*2dx*dy/r4)
  var vx=V0*(1.0+R2*(dy*dy-dx*dx)/r4);
  var vy=-V0*R2*2.0*dx*dy/r4;
  var spd=Math.sqrt(vx*vx+vy*vy);
  if(spd>MAX_SPD){vx=vx/spd*MAX_SPD;vy=vy/spd*MAX_SPD;}
  return {vx:vx,vy:vy};
}

function render(now){
  if(mOn){scx+=(mx-scx)*0.045;scy+=(my-scy)*0.045;}
  else{scx+=(W/2-scx)*0.01;scy+=(H/2-scy)*0.01;}
  cx=scx;cy=scy;

  for(var i=0;i<field.length;i++){field[i]*=DECAY;dfx[i]*=DECAY;dfy[i]*=DECAY;}

  for(var i=0;i<N;i++){
    var fl=flow(ppx[i],ppy[i]);
    ppx[i]+=fl.vx;
    ppy[i]+=fl.vy;

    var dx=ppx[i]-cx,dy=ppy[i]-cy;
    var r2=dx*dx+dy*dy;
    if(ppx[i]>W+30||ppx[i]<-30||ppy[i]<-30||ppy[i]>H+30||r2<R2*0.1){
      ppx[i]=-8;
      ppy[i]=Math.random()*H;
      continue;
    }

    var col=(ppx[i]/CW)|0,row=(ppy[i]/CH)|0;
    if(col<0||col>=COLS||row<0||row>=ROWS) continue;
    var idx=row*COLS+col,v=0.28;
    field[idx]+=v;dfx[idx]+=fl.vx*v;dfy[idx]+=fl.vy*v;
    if(col>0)      {var j=idx-1;   field[j]+=v*.18;dfx[j]+=fl.vx*v*.18;dfy[j]+=fl.vy*v*.18;}
    if(col<COLS-1) {var j=idx+1;   field[j]+=v*.18;dfx[j]+=fl.vx*v*.18;dfy[j]+=fl.vy*v*.18;}
    if(row>0)      {var j=idx-COLS;field[j]+=v*.18;dfx[j]+=fl.vx*v*.18;dfy[j]+=fl.vy*v*.18;}
    if(row<ROWS-1) {var j=idx+COLS;field[j]+=v*.18;dfx[j]+=fl.vx*v*.18;dfy[j]+=fl.vy*v*.18;}
  }

  ctx.fillStyle='#060608';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#ffffff';

  for(var row=0;row<ROWS;row++){
    for(var col=0;col<COLS;col++){
      var b=Math.min(1,field[row*COLS+col]);
      if(b<0.03) continue;
      var px2=col*CW-cx,py2=row*CH-cy;
      if(px2*px2+py2*py2<R2*0.09) continue;
      var idx=row*COLS+col;
      var angle=Math.atan2(dfy[idx],dfx[idx]);
      var di=((Math.round(angle/(Math.PI/4))%8)+8)%8;
      ctx.globalAlpha=b;
      ctx.fillText(DIRS[di],col*CW,row*CH);
    }
  }
  ctx.globalAlpha=1;
  requestAnimationFrame(render);
}
requestAnimationFrame(render);
})();
</script></body></html>
