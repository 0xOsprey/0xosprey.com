<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2 — particle swarm</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #060608; overflow: hidden; cursor: crosshair; }
  #bg { position: fixed; inset: 0; z-index: 0; user-select: none; }
  .r { font: 9px/11px 'Courier New', monospace; white-space: pre; height: 11px; color: #d4d0c8; }
  .a1{opacity:.06} .a2{opacity:.14} .a3{opacity:.22} .a4{opacity:.32}
  .a5{opacity:.44} .a6{opacity:.56} .a7{opacity:.68} .a8{opacity:.80} .a9{opacity:.90} .a10{opacity:1}
  .content{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;pointer-events:none}
  .card{pointer-events:auto;text-align:left;padding:0}
  .links{margin-top:8px}
.links a{font:12px/1.6 'Courier New',monospace;color:#ffe8d0;text-decoration:none;display:block;transition:opacity .3s;animation:linkPulse 3s ease-in-out infinite;text-shadow:0 0 6px #060608,0 0 14px #060608}
.links a:hover{opacity:1!important}
.links a::before{content:'> ';color:rgba(255,232,208,.3)}

.prompt{font:13px/1.5 'Courier New',monospace;color:#ffe8d0;text-shadow:0 0 12px rgba(255,200,140,.4),0 0 30px rgba(255,160,80,.15),0 0 6px #060608,0 0 14px #060608}
.prompt .jch{display:inline-block}
.links .jch{display:inline-block}

@keyframes linkPulse{0%,100%{opacity:.6}50%{opacity:.9}}
@keyframes jitter1{0%,100%{transform:translate(0,0)}25%{transform:translate(0.4px,-0.3px)}50%{transform:translate(-0.3px,0.5px)}75%{transform:translate(0.5px,0.2px)}}
@keyframes jitter2{0%,100%{transform:translate(0,0)}25%{transform:translate(-0.5px,0.4px)}50%{transform:translate(0.3px,-0.4px)}75%{transform:translate(-0.2px,0.3px)}}
@keyframes jitter3{0%,100%{transform:translate(0,0)}25%{transform:translate(0.3px,0.5px)}50%{transform:translate(-0.4px,-0.3px)}75%{transform:translate(0.2px,-0.5px)}}

</style>
</head>
<body>
<div id="bg"></div>
<div class="content"><div class="card" id="card">
<div class="prompt">Joe Coll</div><div class="links"><a href="https://x.com/0xOsprey">x.com/0xOsprey</a><a href="https://github.com/0xOsprey">github.com/0xOsprey</a><a href="https://t.me/OspreyJoe">t.me/OspreyJoe</a><a href="mailto:hi@0xosprey.com">hi@0xosprey.com</a></div>
</div></div>
<script>
// V2: Refined particle swarm — particles leave directional trails
(function(){
  var CH=11,CW=5.4;
  var COLS=Math.ceil(innerWidth/CW)+2, ROWS=Math.ceil(innerHeight/CH)+2;
  var FOS=2, FCOLS=COLS*FOS, FROWS=ROWS*FOS;
  var DECAY=0.85;
  var PN=280;

  var DIR_CHARS=['─','╲','│','╱','─','╲','│','╱'];
  var INTENSITY=['·','-','=','+','*','x','#','@'];

  var mouseX=-1,mouseY=-1,mouseOn=false;
  document.addEventListener('mousemove',function(e){mouseOn=true;mouseX=e.clientX;mouseY=e.clientY});
  document.addEventListener('mouseleave',function(){mouseOn=false});
  document.addEventListener('touchmove',function(e){mouseOn=true;mouseX=e.touches[0].clientX;mouseY=e.touches[0].clientY},{passive:true});

  var cardEl=document.getElementById('card');
  var iC0=0,iR0=0,iC1=0,iR1=0;
  var iFX0=0,iFY0=0,iFX1=0,iFY1=0;
  function updIsland(){
    var r=cardEl.getBoundingClientRect();
    iC0=Math.floor(r.left/CW)-1;iR0=Math.floor(r.top/CH)-1;
    iC1=Math.ceil(r.right/CW)+1;iR1=Math.ceil(r.bottom/CH)+1;
    iFX0=iC0*FOS;iFY0=iR0*FOS;iFX1=iC1*FOS;iFY1=iR1*FOS;
  }
  updIsland();

  // Elliptical fade parameters
  var ccx=0,ccy=0,crx=1,cry=1;
  function updFade(){
    var r=cardEl.getBoundingClientRect();
    ccx=(r.left+r.right)/2/CW;
    ccy=(r.top+r.bottom)/2/CH;
    crx=r.width/2/CW+3;
    cry=r.height/2/CH+2;
  }
  updFade();

  var fieldB=new Float32Array(FCOLS*FROWS);
  var fieldA=new Float32Array(FCOLS*FROWS);

  function makeStamp(radius,peak){
    var size=radius*2+1,data=new Float32Array(size*size);
    for(var y=0;y<size;y++)for(var x=0;x<size;x++){
      var dx=(x-radius)/radius,dy=(y-radius)/radius;
      var d=Math.sqrt(dx*dx+dy*dy);
      if(d<1) data[y*size+x]=peak*(1-d*d);
    }
    return{data:data,size:size,radius:radius};
  }
  var pStamp=makeStamp(10,0.3);
  var aStamp=makeStamp(16,0.45);
  var cStamp=makeStamp(22,0.6);

  function splat(stamp,cx,cy,angle){
    var r=stamp.radius,x0=Math.round(cx)-r,y0=Math.round(cy)-r;
    for(var sy=0;sy<stamp.size;sy++){
      var fy=y0+sy;if(fy<0||fy>=FROWS)continue;
      for(var sx=0;sx<stamp.size;sx++){
        var fx=x0+sx;if(fx<0||fx>=FCOLS)continue;
        var v=stamp.data[sy*stamp.size+sx];
        var idx=fy*FCOLS+fx;
        if(v>fieldB[idx]){fieldA[idx]=angle;}
        fieldB[idx]+=v;
      }
    }
  }

  var particles=[];
  for(var i=0;i<PN;i++){
    var a=(i/PN)*Math.PI*2;
    var r=Math.min(FCOLS,FROWS)*0.3;
    particles.push({x:FCOLS/2+Math.cos(a)*r,y:FROWS/2+Math.sin(a)*r,vx:0,vy:0});
  }

  function repel(px,py){
    var M=8,S=0.5;
    if(px<iFX0-M||px>iFX1+M||py<iFY0-M||py>iFY1+M) return null;
    var nx=Math.max(iFX0,Math.min(iFX1,px)),ny=Math.max(iFY0,Math.min(iFY1,py));
    var dx=px-nx,dy=py-ny,dist=Math.sqrt(dx*dx+dy*dy)||0.1;
    if(px>=iFX0&&px<=iFX1&&py>=iFY0&&py<=iFY1){
      var tl=px-iFX0,tr=iFX1-px,tt=py-iFY0,tb=iFY1-py,mn=Math.min(tl,tr,tt,tb);
      if(mn===tl)return{fx:-S*2,fy:0};if(mn===tr)return{fx:S*2,fy:0};
      if(mn===tt)return{fx:0,fy:-S*2};return{fx:0,fy:S*2};
    }
    if(dist>M) return null;
    var s=S*(1-dist/M);
    return{fx:(dx/dist)*s,fy:(dy/dist)*s};
  }

  // Wrap text chars in jitter spans
  function wrapJitter(el){
    var text=el.textContent;
    var html='';
    var anims=['jitter1','jitter2','jitter3'];
    for(var i=0;i<text.length;i++){
      var anim=anims[i%3];
      var dur=(1.5+Math.random()*2).toFixed(2);
      var del=(Math.random()*2).toFixed(2);
      var c=text[i]===' '?' ':'<span class="jch" style="animation:'+anim+' '+dur+'s ease-in-out '+del+'s infinite">'+text[i]+'</span>';
      html+=c;
    }
    el.innerHTML=html;
  }
  wrapJitter(document.querySelector('.prompt'));
  var linkEls=document.querySelectorAll('.links a');
  for(var li=0;li<linkEls.length;li++){
    var la=linkEls[li];
    // Give each link a different pulse delay
    la.style.animationDelay=(li*0.7)+'s';
    wrapJitter(la);
  }

  var bgEl=document.getElementById('bg');
  var rowEls=[];
  for(var r=0;r<ROWS;r++){var d=document.createElement('div');d.className='r';bgEl.appendChild(d);rowEls.push(d);}

  var fc=0;
  function render(now){
    fc++;
    if(fc%30===0){updIsland();updFade();}

    var a1x=Math.cos(now*.0004)*FCOLS*.3+FCOLS/2;
    var a1y=Math.sin(now*.0007)*FROWS*.3+FROWS/2;
    var a2x=Math.cos(now*.001+Math.PI)*FCOLS*.25+FCOLS/2;
    var a2y=Math.sin(now*.0006+Math.PI)*FROWS*.25+FROWS/2;
    var cFX=-200,cFY=-200;
    if(mouseOn){cFX=(mouseX/innerWidth)*FCOLS;cFY=(mouseY/innerHeight)*FROWS;}

    for(var i=0;i<fieldB.length;i++){fieldB[i]*=DECAY;}

    for(var i=0;i<particles.length;i++){
      var p=particles[i];
      var d1x=a1x-p.x,d1y=a1y-p.y,d2x=a2x-p.x,d2y=a2y-p.y;
      var dist1=Math.sqrt(d1x*d1x+d1y*d1y)||1,dist2=Math.sqrt(d2x*d2x+d2y*d2y)||1;
      var fx,fy,best=1,minD=dist1;
      if(dist2<minD){best=2;minD=dist2;}
      if(mouseOn){var dcx=cFX-p.x,dcy=cFY-p.y,dC=Math.sqrt(dcx*dcx+dcy*dcy)||1;if(dC<minD){best=3;minD=dC;}}
      if(best===1){fx=(d1x/dist1)*.18;fy=(d1y/dist1)*.18;}
      else if(best===2){fx=(d2x/dist2)*.06;fy=(d2y/dist2)*.06;}
      else{var dcx2=cFX-p.x,dcy2=cFY-p.y,dC2=Math.sqrt(dcx2*dcx2+dcy2*dcy2)||1;fx=(dcx2/dC2)*.3;fy=(dcy2/dC2)*.3;}
      var rp=repel(p.x,p.y);if(rp){fx+=rp.fx;fy+=rp.fy;}
      p.vx=(p.vx+fx)*.96+(Math.random()-.5)*.18;
      p.vy=(p.vy+fy)*.96+(Math.random()-.5)*.18;
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x+=FCOLS;if(p.x>=FCOLS)p.x-=FCOLS;
      if(p.y<0)p.y+=FROWS;if(p.y>=FROWS)p.y-=FROWS;
      var angle=Math.atan2(p.vy,p.vx);
      splat(pStamp,p.x,p.y,angle);
    }
    splat(aStamp,a1x,a1y,0);
    splat(aStamp,a2x,a2y,Math.PI);
    if(mouseOn) splat(cStamp,cFX,cFY,0);

    for(var row=0;row<ROWS;row++){
      var line='';
      for(var col=0;col<COLS;col++){
        var fy=row*FOS,fx=col*FOS;
        var sum=0,aSum=0,aWeight=0;
        for(var sy=0;sy<FOS;sy++)for(var sx=0;sx<FOS;sx++){
          var idx=(fy+sy)*FCOLS+(fx+sx);
          sum+=fieldB[idx];
          if(fieldB[idx]>0.01){aSum+=fieldA[idx]*fieldB[idx];aWeight+=fieldB[idx];}
        }
        var avg=sum/(FOS*FOS);
        // Elliptical fade
        var ndx=(col-ccx)/crx;
        var ndy=(row-ccy)/cry;
        var nd=ndx*ndx+ndy*ndy;
        var fade=nd<1?nd*nd:1;
        avg*=fade;
        if(avg<0.03){line+=' ';continue;}
        var angle=aWeight>0?aSum/aWeight:0;
        var ai8=((Math.round(angle/(Math.PI/4))%8)+8)%8;
        var dirCh=DIR_CHARS[ai8];
        var intIdx=Math.min(INTENSITY.length-1,(avg*INTENSITY.length)|0);
        var ch=avg>0.5?INTENSITY[intIdx]:dirCh;
        var alphaIdx=Math.max(1,Math.min(10,Math.round(avg*10)));
        line+='<span class="a'+alphaIdx+'">'+ch+'</span>';
      }
      rowEls[row].innerHTML=line;
    }
    requestAnimationFrame(render);
  }
  requestAnimationFrame(render);
})();
</script>
</html>
