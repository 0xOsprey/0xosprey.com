<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>14 — silk</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#060608;overflow:hidden;cursor:crosshair}
canvas{position:fixed;inset:0;z-index:0}
.content{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;pointer-events:none}
.card{pointer-events:auto;text-align:left;padding:0}
.prompt{font:13px/1.5 'Courier New',monospace;color:#fff;text-shadow:0 0 6px #060608,0 0 14px #060608}
.links{margin-top:8px}
.links a{font:12px/1.6 'Courier New',monospace;color:rgba(255,255,255,.7);text-decoration:none;display:block;transition:color .3s;text-shadow:0 0 6px #060608,0 0 14px #060608}
.links a:hover{color:#fff}
.links a::before{content:'> ';color:rgba(255,255,255,.35)}
</style></head><body>
<canvas id="c"></canvas>
<div class="content"><div class="card" id="card"></div></div>
<script>
(function(){
var CW=4.8,CH=10,cvs=document.getElementById('c'),ctx=cvs.getContext('2d');
var W=innerWidth,H=innerHeight;cvs.width=W;cvs.height=H;
var COLS=Math.ceil(W/CW)+1,ROWS=Math.ceil(H/CH)+1;
ctx.font='8px Courier New';ctx.textBaseline='top';

// Smooth cursor tracking
var mx=-1,my=-1,mOn=false;
var smx=W/2,smy=H/2;
addEventListener('mousemove',function(e){mOn=true;mx=e.clientX;my=e.clientY});
addEventListener('mouseleave',function(){mOn=false});
var cardEl=document.getElementById('card');
cardEl.innerHTML='<div class="prompt">Joe Coll</div><div class="links"><a href="https://x.com/0xOsprey">x.com/0xOsprey</a><a href="https://github.com/0xOsprey">github.com/0xOsprey</a><a href="https://t.me/OspreyJoe">t.me/OspreyJoe</a><a href="mailto:hi@0xosprey.com">hi@0xosprey.com</a></div>';

var RAMP=' .\u00B7:;=+*#%@\u2588';

// Silk: a draped fabric sheet defined by a slow-evolving height field.
// Surface normals determine brightness — bright on lit folds, dark in creases.
// Cursor presses a smooth Gaussian dimple into the sheet.
// Light direction (fixed)
var LX=0.38,LY=0.26,LZ=0.89; // normalised
var LNORM=Math.sqrt(LX*LX+LY*LY+LZ*LZ);
LX/=LNORM;LY/=LNORM;LZ/=LNORM;

var H_STEP=0.7; // finite-difference step for normal computation

function fabricH(col,row,t){
  var x=col*0.075, y=row*0.065;
  // Four overlapping slow sine waves — large gentle drapery folds
  var h=Math.sin(x+t*0.32)*0.50
       +Math.sin(y-t*0.24)*0.42
       +Math.sin(x*0.65+y*0.55+t*0.18)*0.36
       +Math.sin(x*0.40-y*0.70+t*0.22)*0.28;
  return h;
}

function render(now){
  var t=now*0.001;

  // Smooth cursor follow
  if(mOn){smx+=(mx-smx)*0.06;smy+=(my-smy)*0.06;}
  else{smx+=(W/2-smx)*0.015;smy+=(H/2-smy)*0.015;}

  var mcol=smx/CW, mrow=smy/CH;
  // Gaussian pull strength — fabric dimples toward cursor
  var pullStr=mOn?2.8:0.0;
  // Cursor "pull" radius in grid-cell units (wide, soft press)
  var pullInvR2=1/(22*22);

  ctx.fillStyle='#060608';ctx.fillRect(0,0,W,H);ctx.fillStyle='#d4d0c8';

  var cardRect=cardEl.getBoundingClientRect();
  var ccx=(cardRect.left+cardRect.right)/2/CW,ccy=(cardRect.top+cardRect.bottom)/2/CH;
  var crx=(cardRect.width/2/CW)+3,cry=(cardRect.height/2/CH)+2;

  for(var row=0;row<ROWS;row++){
    for(var col=0;col<COLS;col++){
      // Cursor pull: Gaussian indent
      var dcx=col-mcol,dcy=row-mrow;
      var d2=dcx*dcx+dcy*dcy;
      var pull=pullStr*Math.exp(-d2*pullInvR2);

      // Sample height field at col, col+step, row, row+step
      var z  =fabricH(col,       row,       t)-pull;
      var zx =fabricH(col+H_STEP,row,       t)
             -pullStr*Math.exp(-((col+H_STEP-mcol)*(col+H_STEP-mcol)+dcy*dcy)*pullInvR2);
      var zy =fabricH(col,       row+H_STEP,t)
             -pullStr*Math.exp(-(dcx*dcx+(row+H_STEP-mrow)*(row+H_STEP-mrow))*pullInvR2);

      // Surface normal from gradient
      var nx=(z-zx)/H_STEP, ny=(z-zy)/H_STEP, nz=1.0;
      var nl=Math.sqrt(nx*nx+ny*ny+nz*nz);
      nx/=nl;ny/=nl;nz/=nl;

      // Lambertian shading
      var b=nx*LX+ny*LY+nz*LZ;
      // Lift from [-1,1] range to [0,1], accentuate highlights
      b=(b+1)*0.5;
      b=b*b*b*1.6; // gamma curve — rich darks, bright highlights

      // Card fade
      var ndx=(col-ccx)/crx,ndy=(row-ccy)/cry;
      var nd=ndx*ndx+ndy*ndy;
      b*=nd<1?nd*nd:1;

      b=Math.max(0,Math.min(1,b));
      if(b<0.025)continue;

      var ci=Math.min(RAMP.length-1,(b*RAMP.length)|0);
      var ch=RAMP[ci];
      if(ch===' ')continue;
      ctx.globalAlpha=b;
      ctx.fillText(ch,col*CW,row*CH);
    }
  }
  ctx.globalAlpha=1;
  requestAnimationFrame(render);
}
requestAnimationFrame(render);
})();
</script></body></html>
