<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>14 — kelp forest</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#060608;overflow:hidden;cursor:crosshair}
canvas{position:fixed;inset:0;z-index:0}
.content{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;pointer-events:none;padding:48px}
.card{pointer-events:auto;text-align:center;animation:sway 7s ease-in-out infinite}
.name{position:relative;height:52px;margin-bottom:20px;white-space:nowrap}
.n1,.n2{position:absolute;top:0;left:50%;transform:translateX(-50%);font:40px/1 'Courier New',monospace;color:rgba(255,255,255,.85);text-shadow:0 0 8px #060608,0 0 22px #060608,0 0 8px rgba(144,232,200,.12);letter-spacing:.04em}
.n1{animation:ns1 14s infinite}
.n2{animation:ns2 14s infinite;opacity:0}
@keyframes ns1{0%,40%{opacity:1;filter:blur(0)}55%{opacity:0;filter:blur(7px)}90%{opacity:0;filter:blur(7px)}100%{opacity:1;filter:blur(0)}}@keyframes ns2{0%,40%{opacity:0;filter:blur(7px)}55%{opacity:1;filter:blur(0)}90%{opacity:1;filter:blur(0)}100%{opacity:0;filter:blur(7px)}}
@keyframes sway{0%,100%{transform:translateX(0)}50%{transform:translateX(4px)}}
.icons{display:flex;gap:28px;align-items:center;justify-content:center}
.icons a{color:rgba(255,255,255,.85);opacity:.4;transition:opacity .3s;text-decoration:none}
.icons a:hover{opacity:1}
.icons svg{display:block;width:28px;height:28px;filter:drop-shadow(-1px -1px 0 #000) drop-shadow(1px -1px 0 #000) drop-shadow(-1px 1px 0 #000) drop-shadow(1px 1px 0 #000) drop-shadow(0 0 4px rgba(0,0,0,.9))}
</style></head><body>
<canvas id="c"></canvas>
<div class="content"><div class="card" id="card"></div></div>
<script>
(function(){
var CW=4.8,CH=10,cvs=document.getElementById('c'),ctx=cvs.getContext('2d');
var W=innerWidth,H=innerHeight;cvs.width=W;cvs.height=H;
var COLS=Math.ceil(W/CW)+1,ROWS=Math.ceil(H/CH)+1;
ctx.font='8px Courier New';ctx.textBaseline='top';

var mx=W/2,my=H/2,mOn=false;
var smx=W/2,smy=H/2;
addEventListener('mousemove',function(e){mOn=true;mx=e.clientX;my=e.clientY});
addEventListener('mouseleave',function(){mOn=false});
var cardEl=document.getElementById('card');
cardEl.innerHTML='<div class="name"><span class="n1">Joe Coll</span><span class="n2">Osprey</span></div><div class="icons"><a href="https://x.com/0xOsprey" title="X" target="_blank"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.736l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></a><a href="https://github.com/0xOsprey" title="GitHub" target="_blank"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.342-3.369-1.342-.454-1.155-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0112 6.844a9.59 9.59 0 012.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg></a><a href="mailto:hi@0xosprey.com" title="Email"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg></a></div>';

var RAMP=' .·:;=+*#%@█';

// Kelp forest: tall seaweed strands rooted at the bottom, rendered
// as sampled bezier-like curves. Each strand sways in a slow ocean current.
// Cursor acts as a water current — strands bend strongly toward it.
// Bioluminescent glow fades from bright tips to dark roots.

var NS=28; // number of strands
var SEG=18; // segments per strand (sample points from root to tip)

// Strand data
var rootX=new Float32Array(NS);   // root x in pixels
var height=new Float32Array(NS);  // strand height in pixels
var phase=new Float32Array(NS);   // sway phase offset
var freq=new Float32Array(NS);    // sway frequency
var amp=new Float32Array(NS);     // base sway amplitude
var thick=new Float32Array(NS);   // thickness (affects glow spread)

for(var i=0;i<NS;i++){
  rootX[i]=W*(0.02+i/(NS-1)*0.96);
  height[i]=H*(0.45+Math.random()*0.40);
  // Keep strands near horizontal center short so they don't reach the card
  var distC=Math.abs(rootX[i]-W*0.5)/(W*0.5);
  var centerZone=Math.max(0,1-distC*3.2);
  height[i]*=(1-centerZone*0.70);
  phase[i]=Math.random()*Math.PI*2;
  freq[i]=0.018+Math.random()*0.022;
  amp[i]=18+Math.random()*22; // base sway pixels at tip
  thick[i]=0.8+Math.random()*1.2;
}

var field=new Float32Array(COLS*ROWS);
var DECAY=0.82;

function render(now){
  var t=now*0.001;

  // Smooth cursor
  if(mOn){smx+=(mx-smx)*0.05;smy+=(my-smy)*0.05;}
  else{smx+=(W/2-smx)*0.01;smy+=(H/2-smy)*0.01;}

  // Decay field
  for(var k=0;k<field.length;k++)field[k]*=DECAY;

  // Global slow ocean current — a gentle sinusoidal horizontal drift
  var globalCur=Math.sin(t*0.12)*12+Math.sin(t*0.07)*7;

  for(var si=0;si<NS;si++){
    var rx=rootX[si];
    var ry=H+2;
    var h=height[si];

    // Cursor influence: horizontal pull proportional to proximity
    // Acts strongest near tip (top of strand)
    var tipY=ry-h;
    var cursorDist=Math.sqrt((smx-rx)*(smx-rx)+(smy-tipY)*(smy-tipY));
    var cursorPull=0;
    if(mOn&&cursorDist<280){
      var strength=(1-cursorDist/280);
      cursorPull=(smx-rx)*strength*0.55;
    }

    // Sample SEG+1 points along strand from root (s=0) to tip (s=1)
    var prevCol=-1,prevRow=-1;
    for(var j=0;j<=SEG;j++){
      var s=j/SEG; // 0=root, 1=tip

      // Sway: sinusoidal, increases with height (cubic ease)
      var swayFactor=s*s*s;
      var sway=Math.sin(t*freq[si]+phase[si]+s*1.2)*amp[si]*swayFactor;
      sway+=globalCur*swayFactor*0.4;
      sway+=cursorPull*swayFactor;

      // Additional slow secondary wave for naturalistic motion
      sway+=Math.sin(t*freq[si]*1.7+phase[si]+s*2.5)*amp[si]*0.3*swayFactor;

      var px=rx+sway;
      var py=ry-s*h;

      var col=px/CW|0;
      var row=py/CH|0;

      if(col<0||col>=COLS||row<0||row>=ROWS)continue;

      // Brightness: bright at tip, dim at root, with pulse
      var pulse=0.85+0.15*Math.sin(t*0.8+phase[si]+s*3.5);
      var b=s*s*pulse*thick[si];
      b=Math.min(1,b);
      if(b<0.04)continue;

      var idx=row*COLS+col;
      field[idx]+=b*0.55;
      // Splat neighbors for thickness
      var sp=thick[si]*0.35;
      if(col>0)field[idx-1]+=b*sp;
      if(col<COLS-1)field[idx+1]+=b*sp;
      if(row>0)field[idx-COLS]+=b*sp*0.6;
      if(row<ROWS-1)field[idx+COLS]+=b*sp*0.6;

      // Draw line segment between consecutive sample points
      if(prevCol>=0&&(Math.abs(col-prevCol)+Math.abs(row-prevRow))>1){
        // Fill gaps along the segment
        var steps=Math.max(Math.abs(col-prevCol),Math.abs(row-prevRow));
        for(var q=1;q<steps;q++){
          var qc=Math.round(prevCol+(col-prevCol)*q/steps);
          var qr=Math.round(prevRow+(row-prevRow)*q/steps);
          if(qc>=0&&qc<COLS&&qr>=0&&qr<ROWS){
            var qs=((j-1)/SEG+s)*0.5;
            var qb=qs*qs*pulse*thick[si]*0.5;
            field[qr*COLS+qc]+=Math.min(1,qb);
          }
        }
      }
      prevCol=col;prevRow=row;
    }
  }

  ctx.fillStyle='#060608';ctx.fillRect(0,0,W,H);ctx.fillStyle='#ffffff';

  var cardRect=cardEl.getBoundingClientRect();
  var ccx=(cardRect.left+cardRect.right)/2/CW,ccy=(cardRect.top+cardRect.bottom)/2/CH;
  var crx=(cardRect.width/2/CW)+3,cry=(cardRect.height/2/CH)+2;

  for(var row=0;row<ROWS;row++){
    for(var col=0;col<COLS;col++){
      var b=Math.min(1,field[row*COLS+col]);
      if(b<0.025)continue;

      var ndx=(col-ccx)/crx,ndy=(row-ccy)/cry;
      var nd=ndx*ndx+ndy*ndy;
      b*=nd<1?nd*nd:1;
      if(b<0.025)continue;

      var ci=Math.min(RAMP.length-1,(b*RAMP.length)|0);
      var ch=RAMP[ci];
      if(ch===' ')continue;
      ctx.globalAlpha=b;
      ctx.fillText(ch,col*CW,row*CH);
    }
  }
  ctx.globalAlpha=1;
  requestAnimationFrame(render);
}
requestAnimationFrame(render);
})();
</script></body></html>
