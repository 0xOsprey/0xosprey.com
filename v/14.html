<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>14 — spinning donut</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#060608;overflow:hidden;cursor:crosshair}
canvas{position:fixed;inset:0;z-index:0}
.content{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;pointer-events:none}
.card{pointer-events:auto;text-align:left;padding:0}
.prompt{font:13px/1.5 'Courier New',monospace;color:#fff;text-shadow:0 0 6px #060608,0 0 14px #060608}
.links{margin-top:8px}
.links a{font:12px/1.6 'Courier New',monospace;color:rgba(255,255,255,.7);text-decoration:none;display:block;transition:color .3s;text-shadow:0 0 6px #060608,0 0 14px #060608}
.links a:hover{color:#fff}
.links a::before{content:'> ';color:rgba(255,255,255,.35)}
</style></head><body>
<canvas id="c"></canvas>
<div class="content"><div class="card" id="card"></div></div>
<script>
(function(){
var CW=4.8,CH=10,cvs=document.getElementById('c'),ctx=cvs.getContext('2d');
var W=innerWidth,H=innerHeight;cvs.width=W;cvs.height=H;
var COLS=Math.ceil(W/CW)+1,ROWS=Math.ceil(H/CH)+1;
ctx.font='8px Courier New';ctx.textBaseline='top';
var mx=W/2,my=H/2,mOn=false;
addEventListener('mousemove',function(e){mOn=true;mx=e.clientX;my=e.clientY});
addEventListener('mouseleave',function(){mOn=false});
var cardEl=document.getElementById('card');
cardEl.innerHTML='<div class="prompt">Joe Coll</div><div class="links"><a href="https://x.com/0xOsprey">x.com/0xOsprey</a><a href="https://github.com/0xOsprey">github.com/0xOsprey</a><a href="https://t.me/OspreyJoe">t.me/OspreyJoe</a><a href="mailto:hi@0xosprey.com">hi@0xosprey.com</a></div>';
var ramp=' .\u00b7:;=+*#%@\u2588';
var R=1.2,r=0.4;
var asp=W/H*(CH/CW);
function sdTorus(px,py,pz){
var q=Math.sqrt(px*px+pz*pz)-R;
return Math.sqrt(q*q+py*py)-r;
}
function render(now){
requestAnimationFrame(render);
var t=now*0.001;
var cosA=Math.cos(t*0.5),sinA=Math.sin(t*0.5);
var cosB=Math.cos(t*0.3),sinB=Math.sin(t*0.3);
ctx.fillStyle='#060608';ctx.fillRect(0,0,W,H);ctx.fillStyle='#d4d0c8';
var cardRect=cardEl.getBoundingClientRect();
var ccx=(cardRect.left+cardRect.right)/2/CW,ccy=(cardRect.top+cardRect.bottom)/2/CH;
var crx=(cardRect.width/2/CW)+3,cry=(cardRect.height/2/CH)+2;
var lx=mx/W-0.5,ly=-(my/H-0.5),lz=0.5;
var ll=Math.sqrt(lx*lx+ly*ly+lz*lz);
lx/=ll;ly/=ll;lz/=ll;
var eps=0.005;
for(var row=0;row<ROWS;row++){
for(var col=0;col<COLS;col++){
var u=(col/COLS-0.5)*2*asp;
var v=-(row/ROWS-0.5)*2;
var rdx=u,rdy=v,rdz=-1.5;
var rl=Math.sqrt(rdx*rdx+rdy*rdy+rdz*rdz);
rdx/=rl;rdy/=rl;rdz/=rl;
var ox=0,oy=0,oz=4;
var hit=false,tt=0;
for(var i=0;i<40;i++){
var px=ox+rdx*tt,py=oy+rdy*tt,pz=oz+rdz*tt;
var rx=px*cosA-pz*sinA,rz=px*sinA+pz*cosA;
var ry2=py*cosB-rz*sinB,rz2=py*sinB+rz*cosB;
var d=sdTorus(rx,ry2,rz2);
if(d<0.01){hit=true;break;}
tt+=d;
if(tt>20)break;
}
var bright=0;
if(hit){
var hpx=ox+rdx*tt,hpy=oy+rdy*tt,hpz=oz+rdz*tt;
var hrx=hpx*cosA-hpz*sinA,hrz=hpx*sinA+hpz*cosA;
var hry2=hpy*cosB-hrz*sinB,hrz2=hpy*sinB+hrz*cosB;
var nx=sdTorus(hrx+eps,hry2,hrz2)-sdTorus(hrx-eps,hry2,hrz2);
var ny=sdTorus(hrx,hry2+eps,hrz2)-sdTorus(hrx,hry2-eps,hrz2);
var nz=sdTorus(hrx,hry2,hrz2+eps)-sdTorus(hrx,hry2,hrz2-eps);
var nl=Math.sqrt(nx*nx+ny*ny+nz*nz)+1e-8;
nx/=nl;ny/=nl;nz/=nl;
var diff=nx*lx+ny*ly+nz*lz;
if(diff<0)diff=0;
bright=diff*0.85+0.15;
}
var ndx=(col-ccx)/crx,ndy=(row-ccy)/cry,nd=ndx*ndx+ndy*ndy;
var fade=nd<1?nd*nd:1;
bright*=fade;
bright=Math.max(0,Math.min(1,bright));
var ci=Math.floor(bright*(ramp.length-1)+0.5);
ctx.fillText(ramp[ci],col*CW,row*CH);
}
}
}
requestAnimationFrame(render);
})();
</script></body></html>
