<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>15 — dune sea</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#060608;overflow:hidden;cursor:crosshair}
canvas{position:fixed;inset:0;z-index:0}
.content{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;pointer-events:none;padding:48px}
.card{pointer-events:auto;text-align:center}
</style></head><body>
<canvas id="c"></canvas>
<div class="content"><div class="card" id="card"></div></div>
<script>
(function(){
var CW=4.8,CH=10,cvs=document.getElementById('c'),ctx=cvs.getContext('2d');
var W=innerWidth,H=innerHeight;cvs.width=W;cvs.height=H;
var COLS=Math.ceil(W/CW)+1,ROWS=Math.ceil(H/CH)+1;
ctx.font='8px Courier New';ctx.textBaseline='top';
var mx=-1,my=-1,mOn=false;
addEventListener('mousemove',function(e){mOn=true;mx=e.clientX;my=e.clientY});
addEventListener('mouseleave',function(){mOn=false});
addEventListener('touchstart',function(e){if(e.touches[0]){mOn=true;mx=e.touches[0].clientX;my=e.touches[0].clientY;}},{passive:true});
addEventListener('touchmove',function(e){if(e.touches[0]){mOn=true;mx=e.touches[0].clientX;my=e.touches[0].clientY;}},{passive:true});
document.getElementById('card').innerHTML='';

// Dune sea — wind over sand, seen from above. Ripples crawl
// downwind, gathered into long dune bands. The wind slowly veers.
// The cursor is a gust: ripples surge under it and loose grains
// leap downwind in little saltation hops. Every so often a gust
// front sweeps the whole field on its own.

var RAMP=' .·:;=+*#';

// Software glyph renderer: prerendered alpha masks stamped into a
// pixel buffer, one putImageData per frame instead of per-cell
// fillText. Visuals identical; far less canvas call overhead.
var CHARS=RAMP+"~'.";
var GW=Math.ceil(CW)+2,GH=CH+4,GOX=1,GOY=2;
var masks=[],mbox=[];
(function(){
  var n=CHARS.length,mc=document.createElement('canvas');
  mc.width=GW*n;mc.height=GH;
  var x=mc.getContext('2d');
  x.font='8px Courier New';x.textBaseline='top';x.fillStyle='#fff';
  for(var i=0;i<n;i++)x.fillText(CHARS[i],i*GW+GOX,GOY);
  var d=x.getImageData(0,0,GW*n,GH).data;
  for(var i=0;i<n;i++){
    var m=new Uint8Array(GW*GH);
    var bx0=GW,bx1=-1,by0=GH,by1=-1;
    for(var yy=0;yy<GH;yy++)for(var xx=0;xx<GW;xx++){
      var a=d[((yy*GW*n)+(i*GW+xx))*4+3];
      m[yy*GW+xx]=a;
      if(a){if(xx<bx0)bx0=xx;if(xx>bx1)bx1=xx;if(yy<by0)by0=yy;if(yy>by1)by1=yy;}
    }
    masks.push(m);mbox.push([bx0,by0,bx1+1,by1+1]);
  }
})();
var img=ctx.createImageData(W,H);
var buf32=new Uint32Array(img.data.buffer);
var inten=new Uint8Array(W*H);
var BG=0xFF080606;
var LUT=new Uint32Array(256);
for(var i=0;i<256;i++){
  var lr=Math.round(6+(255-6)*i/255),lg=Math.round(6+(255-6)*i/255),lb=Math.round(8+(255-8)*i/255);
  LUT[i]=(255<<24)|(lb<<16)|(lg<<8)|lr;
}
function stamp(mi,a255,sx,sy){
  var m=masks[mi],bx=mbox[mi];
  var xs=bx[0],ys=bx[1],xe=bx[2],ye=bx[3];
  if(sx+xs<0)xs=-sx;if(sy+ys<0)ys=-sy;
  if(sx+xe>W)xe=W-sx;if(sy+ye>H)ye=H-sy;
  for(var yy=ys;yy<ye;yy++){
    var ro=(sy+yy)*W+sx,mo2=yy*GW;
    for(var xx=xs;xx<xe;xx++){
      var ma=m[mo2+xx];
      if(!ma)continue;
      var v=(ma*a255)>>8;
      var p=ro+xx;
      if(v>inten[p]){inten[p]=v;buf32[p]=LUT[v];}
    }
  }
}
var CREST=RAMP.length,GRAIN_UP=RAMP.length+1,GRAIN_DN=1;
var SINN=4096,sinLUT=new Float32Array(SINN);
for(var i=0;i<SINN;i++)sinLUT[i]=Math.sin(i/SINN*Math.PI*2);
function fsin(a){var x=a*(SINN/(Math.PI*2));x-=Math.floor(x/SINN)*SINN;return sinLUT[x|0];}
var POWN=2048,powLUT=new Float32Array(POWN);
for(var i=0;i<POWN;i++)powLUT[i]=Math.pow(i/(POWN-1),2.4);
var colU=new Float32Array(COLS),warpX=new Float32Array(COLS);
var colPX=new Int32Array(COLS);
var rowU=new Float32Array(ROWS),warpY=new Float32Array(ROWS),rowS=new Float32Array(ROWS);
var G=new Float32Array(COLS*ROWS); // accumulated local gust surge
var grains=[];                     // saltating sand
var gustX=-1e9,gustT=400;

function render(now){
  var t=now*0.001;
  var th=0.50+0.35*Math.sin(t*0.045)+0.12*Math.sin(t*0.013+2); // wind veers
  var cth=Math.cos(th),sth=Math.sin(th);

  for(var i=0;i<G.length;i++)G[i]*=0.972;

  // cursor gust
  if(mOn){
    var cgx=mx/CW,cgy=my/CH;
    var R=12;
    var c0=Math.max(0,cgx-R|0),c1=Math.min(COLS-1,cgx+R|0);
    var r0=Math.max(0,cgy-R/2|0),r1=Math.min(ROWS-1,cgy+R/2|0);
    for(var r=r0;r<=r1;r++)for(var c=c0;c<=c1;c++){
      var dc=c-cgx,dr=(r-cgy)*2.08;
      G[r*COLS+c]+=0.085*Math.exp(-(dc*dc+dr*dr)/90);
    }
    if(grains.length<240&&Math.random()<0.8)
      grains.push({x:mx+(Math.random()-0.5)*40,y:my+(Math.random()-0.5)*20,
                   vx:(2.5+Math.random()*2)*cth,vy:-(1.2+Math.random()*1.6),life:90});
  }

  // autonomous gust front sweeping downwind
  if(--gustT<=0){gustX=-80;gustT=700+(Math.random()*500|0);}
  if(gustX>-1e8){
    gustX+=5.5;
    if(gustX>W+260)gustX=-1e9;
    else{
      for(var r=0;r<ROWS;r++){
        var ybase=r*CH*sth;
        for(var c=0;c<COLS;c++){
          var u=c*CW*cth+ybase;
          var d=(u-gustX)/55;
          if(d>-2&&d<2)G[r*COLS+c]+=0.05*Math.exp(-d*d);
        }
      }
      if(grains.length<240&&Math.random()<0.7){
        var gy=Math.random()*H;
        grains.push({x:gustX-gy*sth/cth*0+Math.random()*30,y:gy,
                     vx:(2.5+Math.random()*2)*cth,vy:-(1+Math.random()*1.8),life:80});
      }
    }
  }

  // saltation: hop, land, hop again
  for(var gi=grains.length-1;gi>=0;gi--){
    var g=grains[gi];
    g.x+=g.vx;g.y+=g.vy+g.vx*sth*0.4;
    g.vy+=0.16;
    g.life--;
    if(g.vy>1.6){ // landed
      if(Math.random()<0.55&&g.life>0)g.vy=-(0.8+Math.random()*1.4);
      else{grains.splice(gi,1);continue;}
    }
    if(g.life<=0||g.x<-30||g.x>W+30||g.y<-30||g.y>H+30)grains.splice(gi,1);
  }

  inten.fill(0);buf32.fill(BG);

  for(var col=0;col<COLS;col++){
    var xp=col*CW;
    colU[col]=xp*cth;
    warpX[col]=Math.sin(xp*0.011+t*0.07);
    colPX[col]=((xp+0.5)|0)-GOX;
  }
  for(var row=0;row<ROWS;row++){
    var yp=row*CH;
    rowU[row]=yp*sth;
    warpY[row]=Math.cos(yp*0.013-t*0.05)*34;
    rowS[row]=Math.sin(yp*0.004+t*0.01)*1.5;
  }
  var t9=t*0.9,tEnv=t*0.018;
  for(var row=0;row<ROWS;row++){
    var ru=rowU[row],wy=warpY[row],rs=rowS[row],rpy=row*CH-GOY,base=row*COLS;
    for(var col=0;col<COLS;col++){
      var u=colU[col]+ru;
      var warp=warpX[col]*wy;
      var ripple=fsin((u+warp)*0.042-t9-G[base+col]);
      var env=0.5+0.5*fsin((u+warp*2.5)*0.0065-tEnv+rs);
      var amp=0.16+0.84*env*env;
      var b=amp*powLUT[((0.5+0.5*ripple)*(POWN-1))|0];
      if(b<0.04)continue;
      if(b>1)b=1;
      var mi;
      if(ripple>0.86)mi=CREST;
      else{
        mi=Math.min(RAMP.length-1,(b*RAMP.length)|0);
        if(mi===0)continue;
      }
      stamp(mi,(b*255)|0,colPX[col],rpy);
    }
  }

  // airborne grains on top
  for(var gi=0;gi<grains.length;gi++){
    var g=grains[gi];
    stamp(g.vy<0?GRAIN_UP:GRAIN_DN,217,((g.x+0.5)|0)-GOX,((g.y+0.5)|0)-GOY);
  }
  ctx.putImageData(img,0,0);
  requestAnimationFrame(render);
}
requestAnimationFrame(render);
})();
</script></body></html>
