<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>15 — solar surface</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#060608;overflow:hidden;cursor:crosshair}
canvas{position:fixed;inset:0;z-index:0}
.content{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;pointer-events:none;padding:48px}
.card{pointer-events:auto;text-align:center}
</style></head><body>
<canvas id="c"></canvas>
<div class="content"><div class="card" id="card"></div></div>
<script>
(function(){
var CW=4.8,CH=10,cvs=document.getElementById('c'),ctx=cvs.getContext('2d');
var W=innerWidth,H=innerHeight;cvs.width=W;cvs.height=H;
var COLS=Math.ceil(W/CW)+1,ROWS=Math.ceil(H/CH)+1;
ctx.font='8px Courier New';ctx.textBaseline='top';
var mx=-1,my=-1,mOn=false;
addEventListener('mousemove',function(e){mOn=true;mx=e.clientX;my=e.clientY});
addEventListener('mouseleave',function(){mOn=false});
addEventListener('touchstart',function(e){if(e.touches[0]){mOn=true;mx=e.touches[0].clientX;my=e.touches[0].clientY;}},{passive:true});
addEventListener('touchmove',function(e){if(e.touches[0]){mOn=true;mx=e.touches[0].clientX;my=e.touches[0].clientY;}},{passive:true});
document.getElementById('card').innerHTML='';

// Solar surface — convective granulation. Hot plasma rises in
// bright cells, cools, and sinks along the dark lanes between
// them. Two sunspots drift across the disk. Magnetic loops erupt,
// glow, and rain back down. The cursor is a magnetic probe —
// the convection churns and swirls beneath it.

var RAMP=' .·:;=+*#%@';
var SX=0.55,SY=1.06; // cell → granule space (squares up the aspect)

function gran(x,y,t){
  var v=Math.sin(x*0.30+t*0.21+Math.sin(y*0.23-t*0.17)*2.3)
       *Math.sin(y*0.27-t*0.13+Math.sin(x*0.21+t*0.11)*2.3);
  v+=0.55*Math.sin(x*0.61-t*0.33+2.1+Math.sin(y*0.43+t*0.19)*1.4)
        *Math.sin(y*0.57+t*0.29+1.3);
  v+=0.30*Math.sin(x*1.13+t*0.51)*Math.sin(y*1.07-t*0.47);
  return v/1.85;
}

// Sunspots: dark umbrae wandering the disk
var spots=[
  {x:COLS*0.30,y:ROWS*0.38,r:6.5,vx:0.009,vy:0.004},
  {x:COLS*0.72,y:ROWS*0.66,r:4.5,vx:-0.007,vy:-0.003}
];

// Magnetic loops: bright arcs anchored at two footpoints
var Lo=new Float32Array(COLS*ROWS);
var loops=[];
function spawnLoop(cx,cy){
  if(loops.length>=3)return;
  var span=8+Math.random()*12;
  loops.push({c0:cx-span,c1:cx+span,row:cy,hMax:6+Math.random()*11,
              age:0,life:380+(Math.random()*240|0),dir:Math.random()<0.5?1:-1});
}
var nextLoop=200;

var pmx=-1,pmy=-1,frame=0;

function render(now){
  var t=now*0.001*0.55;
  frame++;

  // autonomous eruptions
  if(--nextLoop<=0){
    spawnLoop(Math.random()*COLS,ROWS*(0.15+Math.random()*0.7));
    nextLoop=350+Math.random()*450|0;
  }
  // a fast hand drags the field lines — eruption at the probe
  if(mOn&&pmx>=0){
    var mdx=mx-pmx,mdy=my-pmy;
    if(mdx*mdx+mdy*mdy>900&&Math.random()<0.10)
      spawnLoop(mx/CW,my/CH);
  }
  pmx=mOn?mx:-1;pmy=mOn?my:-1;

  for(var i=0;i<spots.length;i++){
    var s=spots[i];
    s.x+=s.vx;s.y+=s.vy;
    if(s.x<-s.r)s.x=COLS+s.r;if(s.x>COLS+s.r)s.x=-s.r;
    if(s.y<-s.r)s.y=ROWS+s.r;if(s.y>ROWS+s.r)s.y=-s.r;
  }

  // loop plasma flows along the arc, rises, then dies away
  for(var i=0;i<Lo.length;i++)Lo[i]*=0.74;
  for(var li=loops.length-1;li>=0;li--){
    var L=loops[li];
    L.age++;
    if(L.age>=L.life){loops.splice(li,1);continue;}
    var rise=Math.min(1,L.age/110);
    var fade=Math.min(1,(L.life-L.age)/80);
    var h=L.hMax*rise;
    var n=Math.ceil(Math.abs(L.c1-L.c0))*2;
    for(var k=0;k<=n;k++){
      var sfrac=k/n;
      var cc=Math.round(L.c0+(L.c1-L.c0)*sfrac);
      var rr=Math.round(L.row-Math.sin(sfrac*Math.PI)*h);
      if(cc<0||cc>=COLS||rr<0||rr>=ROWS)continue;
      var flow=0.5+0.5*Math.sin(sfrac*16*L.dir-L.age*0.22);
      Lo[rr*COLS+cc]=Math.min(1.4,Lo[rr*COLS+cc]+(0.18+0.5*flow)*fade);
    }
  }

  ctx.fillStyle='#060608';ctx.fillRect(0,0,W,H);ctx.fillStyle='#ffffff';

  var cgx=mx/CW,cgy=my/CH;
  for(var row=0;row<ROWS;row++){
    for(var col=0;col<COLS;col++){
      var x=col*SX,y=row*SY;
      var boost=0;
      if(mOn){
        var dc=col-cgx,dr=(row-cgy)*2.08;
        var d2=dc*dc+dr*dr;
        if(d2<3000){
          var g=Math.exp(-d2/520);
          // swirl the sample point around the probe
          var ang=g*1.5*Math.sin(t*1.7);
          var ca=Math.cos(ang),sa=Math.sin(ang);
          var ox=x-cgx*SX,oy=y-cgy*SY;
          x=cgx*SX+ox*ca-oy*sa;
          y=cgy*SY+ox*sa+oy*ca;
          boost=g*0.30;
        }
      }
      var v=gran(x,y,t);
      var b=Math.pow((v+1)*0.5,1.55)*0.95+boost;
      // sunspots eat the light
      for(var si=0;si<2;si++){
        var s=spots[si];
        var sdc=col-s.x,sdr=(row-s.y)*2.08;
        var sd2=sdc*sdc+sdr*sdr;
        if(sd2<s.r*s.r*9)
          b*=1-0.88*Math.exp(-sd2/(s.r*s.r*1.8));
      }
      b+=Lo[row*COLS+col];
      if(b<0.04)continue;
      b=Math.min(1,b);
      var ci=Math.min(RAMP.length-1,(b*RAMP.length)|0);
      var ch=RAMP[ci];
      if(ch===' ')continue;
      ctx.globalAlpha=b;
      ctx.fillText(ch,col*CW,row*CH);
    }
  }
  ctx.globalAlpha=1;
  requestAnimationFrame(render);
}
requestAnimationFrame(render);
})();
</script></body></html>
