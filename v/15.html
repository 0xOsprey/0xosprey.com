<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>15 — voronoi drift</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#060608;overflow:hidden;cursor:crosshair}
canvas{position:fixed;inset:0;z-index:0}
.content{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;pointer-events:none;padding:48px}
.card{pointer-events:auto;text-align:center}
.name{position:relative;height:52px;margin-bottom:20px;white-space:nowrap}
.n1,.n2{position:absolute;top:0;left:50%;transform:translateX(-50%);font:40px/1 'Courier New',monospace;color:rgba(255,255,255,.85);text-shadow:0 0 8px #060608,0 0 22px #060608,0 0 8px rgba(127,255,212,.12);letter-spacing:.04em}
.n1{animation:ns1 14s infinite}
.n2{animation:ns2 14s infinite;opacity:0}
@keyframes ns1{0%,40%{opacity:1;filter:blur(0)}55%{opacity:0;filter:blur(7px)}90%{opacity:0;filter:blur(7px)}100%{opacity:1;filter:blur(0)}}@keyframes ns2{0%,40%{opacity:0;filter:blur(7px)}55%{opacity:1;filter:blur(0)}90%{opacity:1;filter:blur(0)}100%{opacity:0;filter:blur(7px)}}
.icons{display:flex;gap:28px;align-items:center;justify-content:center}
.icons a{color:rgba(255,255,255,.85);opacity:1;transition:opacity .3s;text-decoration:none}
.icons a:hover{opacity:.4}
.icons svg{display:block;width:28px;height:28px;filter:drop-shadow(0 0 2px rgba(6,6,8,.9)) drop-shadow(0 0 6px rgba(6,6,8,.5))}
</style></head><body>
<canvas id="c"></canvas>
<div class="content"><div class="card" id="card"></div></div>
<script>
(function(){
var CW=4.8,CH=10,cvs=document.getElementById('c'),ctx=cvs.getContext('2d');
var W=innerWidth,H=innerHeight;cvs.width=W;cvs.height=H;
var COLS=Math.ceil(W/CW)+1,ROWS=Math.ceil(H/CH)+1;
ctx.font='8px Courier New';ctx.textBaseline='top';
var mx=-1,my=-1,mOn=false;
addEventListener('mousemove',function(e){mOn=true;mx=e.clientX;my=e.clientY});
addEventListener('mouseleave',function(){mOn=false});
var cardEl=document.getElementById('card');
cardEl.innerHTML='<div class="icons"><a href="https://x.com/0xOsprey" title="X" target="_blank"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.736l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></a><a href="https://github.com/0xOsprey" title="GitHub" target="_blank"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.342-3.369-1.342-.454-1.155-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0112 6.844a9.59 9.59 0 012.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg></a><a href="mailto:hi@0xosprey.com" title="Email"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg></a></div>';

var RAMP=' .\u00B7:;=+*#%@\u2588';

// Voronoi drift: seeds float on slow sinusoidal paths.
// Each character glows where it is equidistant from two nearest seeds —
// the cell boundaries shimmer like bioluminescent membranes.
var NS=18;
var sBaseX=new Float32Array(NS),sBaseY=new Float32Array(NS);
var sAX=new Float32Array(NS),sAY=new Float32Array(NS);
var sFX=new Float32Array(NS),sFY=new Float32Array(NS);
var sPX=new Float32Array(NS),sPY=new Float32Array(NS);

for(var i=0;i<NS;i++){
  // Distribute base positions in a loose grid with jitter
  var gx=i%6,gy=Math.floor(i/6);
  sBaseX[i]=(gx+0.5)/6+(Math.random()-0.5)*0.12;
  sBaseY[i]=(gy+0.5)/3+(Math.random()-0.5)*0.15;
  sAX[i]=0.08+Math.random()*0.10;
  sAY[i]=0.08+Math.random()*0.10;
  sFX[i]=0.035+Math.random()*0.055;
  sFY[i]=0.035+Math.random()*0.055;
  sPX[i]=Math.random()*Math.PI*2;
  sPY[i]=Math.random()*Math.PI*2;
}

var cx=new Float32Array(NS),cy=new Float32Array(NS);

function render(now){
  var t=now*0.001;

  // Update seed positions
  for(var i=0;i<NS;i++){
    cx[i]=(sBaseX[i]+Math.sin(t*sFX[i]+sPX[i])*sAX[i])*COLS;
    cy[i]=(sBaseY[i]+Math.sin(t*sFY[i]+sPY[i])*sAY[i])*ROWS;
  }

  // Mouse seed: cursor acts as an extra seed AND pushes nearby seeds away
  var hasMouse=mOn;
  var mcx=mx/CW,mcy=my/CH;

  // Push existing seeds away from cursor (creates a visible void/warp zone)
  if(hasMouse){
    for(var i=0;i<NS;i++){
      var pdx=cx[i]-mcx,pdy=cy[i]-mcy;
      var pd2=pdx*pdx+pdy*pdy;
      var pushR=22;
      if(pd2<pushR*pushR){
        var pd=Math.sqrt(pd2)||1;
        var pushStr=(1-pd/pushR)*4.5;
        cx[i]+=pdx/pd*pushStr;
        cy[i]+=pdy/pd*pushStr;
      }
    }
  }

  ctx.fillStyle='#060608';ctx.fillRect(0,0,W,H);ctx.fillStyle='#ffffff';

  var cardRect=cardEl.getBoundingClientRect();
  var ccx=(cardRect.left+cardRect.right)/2/CW,ccy=(cardRect.top+cardRect.bottom)/2/CH;
  var crx=(cardRect.width/2/CW)+3,cry=(cardRect.height/2/CH)+2;

  for(var row=0;row<ROWS;row++){
    for(var col=0;col<COLS;col++){
      // Find two nearest seed distances using squared distance (faster)
      var d1sq=1e18,d2sq=1e18;
      for(var i=0;i<NS;i++){
        var dx=col-cx[i],dy=row-cy[i];
        var dsq=dx*dx+dy*dy;
        if(dsq<d1sq){d2sq=d1sq;d1sq=dsq;}
        else if(dsq<d2sq){d2sq=dsq;}
      }
      // Mouse seed
      if(hasMouse){
        var dx=col-mcx,dy=row-mcy;
        var dsq=dx*dx+dy*dy;
        if(dsq<d1sq){d2sq=d1sq;d1sq=dsq;}
        else if(dsq<d2sq){d2sq=dsq;}
      }

      var d1=Math.sqrt(d1sq),d2=Math.sqrt(d2sq);
      var gap=d2-d1;

      // Boundary glow: bright where gap is small (near cell walls)
      var b=1/(1+gap*0.75);

      // Subtle interior warmth: cell centers faintly lit
      b=b*0.80+Math.max(0,1-d1*0.065)*0.20;

      // Slow breathe
      b*=0.82+0.18*Math.sin(t*0.28+d1*0.08);

      // Card fade
      var ndx=(col-ccx)/crx,ndy=(row-ccy)/cry;
      var nd=ndx*ndx+ndy*ndy;
      b*=nd<1?nd*nd:1;

      b=Math.max(0,Math.min(1,b));
      if(b<0.025)continue;

      var ci=Math.min(RAMP.length-1,(b*RAMP.length)|0);
      var ch=RAMP[ci];
      if(ch===' ')continue;
      ctx.globalAlpha=b;
      ctx.fillText(ch,col*CW,row*CH);
    }
  }
  ctx.globalAlpha=1;
  requestAnimationFrame(render);
}
requestAnimationFrame(render);
})();
</script></body></html>
