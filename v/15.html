<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>15 — water caustics</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#060608;overflow:hidden;cursor:crosshair}
canvas{position:fixed;inset:0;z-index:0}
.content{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;pointer-events:none}
.card{pointer-events:auto;text-align:left;padding:0}
.prompt{font:13px/1.5 'Courier New',monospace;color:#fff;text-shadow:0 0 6px #060608,0 0 14px #060608}
.links{margin-top:8px}
.links a{font:12px/1.6 'Courier New',monospace;color:rgba(255,255,255,.7);text-decoration:none;display:block;transition:color .3s;text-shadow:0 0 6px #060608,0 0 14px #060608}
.links a:hover{color:#fff}
.links a::before{content:'> ';color:rgba(255,255,255,.35)}
</style></head><body>
<canvas id="c"></canvas>
<div class="content"><div class="card" id="card"></div></div>
<script>
(function(){
var CW=4.8,CH=10,cvs=document.getElementById('c'),ctx=cvs.getContext('2d');
var W=innerWidth,H=innerHeight;cvs.width=W;cvs.height=H;
var COLS=Math.ceil(W/CW)+1,ROWS=Math.ceil(H/CH)+1;
ctx.font='8px Courier New';ctx.textBaseline='top';
var mx=-1,my=-1,mOn=false;
addEventListener('mousemove',function(e){mOn=true;mx=e.clientX;my=e.clientY});
addEventListener('mouseleave',function(){mOn=false});
var cardEl=document.getElementById('card');
cardEl.innerHTML='<div class="prompt">Joe Coll</div><div class="links"><a href="https://x.com/0xOsprey">x.com/0xOsprey</a><a href="https://github.com/0xOsprey">github.com/0xOsprey</a><a href="https://t.me/OspreyJoe">t.me/OspreyJoe</a><a href="mailto:hi@0xosprey.com">hi@0xosprey.com</a></div>';

var RAMP=' .\u00B7:;=+*#%@\u2588';

// Water surface wave vectors: caustic brightness = Laplacian of height field
// Laplacian of A*sin(kx*x+ky*y+om*t) = -A*(kx^2+ky^2)*sin(...)
// Bright spots where light focuses (positive Laplacian = concave surface)
var WV=[
  {kx: 2.10, ky: 0.55, A:0.40, om:0.50},
  {kx:-0.85, ky: 2.25, A:0.35, om:0.71},
  {kx: 1.60, ky:-1.85, A:0.42, om:0.44},
  {kx: 0.50, ky: 1.70, A:0.32, om:0.63},
  {kx:-1.30, ky:-0.95, A:0.37, om:0.57},
  {kx: 2.75, ky: 1.15, A:0.28, om:0.49},
  {kx:-1.80, ky: 0.45, A:0.31, om:0.67},
];

// Precompute Laplacian coefficients: A*(kx^2+ky^2)
var LK=new Float32Array(WV.length);
var MAXL=0;
for(var i=0;i<WV.length;i++){
  var w=WV[i];
  LK[i]=w.A*(w.kx*w.kx+w.ky*w.ky);
  MAXL+=LK[i];
}

// Scale: ~6-8 wavelengths across each axis
var XS=22/COLS, YS=22/ROWS;

function render(now){
  var t=now*0.001;
  ctx.fillStyle='#060608';ctx.fillRect(0,0,W,H);ctx.fillStyle='#d4d0c8';

  var cardRect=cardEl.getBoundingClientRect();
  var ccx=(cardRect.left+cardRect.right)/2/CW,ccy=(cardRect.top+cardRect.bottom)/2/CH;
  var crx=(cardRect.width/2/CW)+3,cry=(cardRect.height/2/CH)+2;

  // Mouse position in wave-space
  var mcx=mOn?(mx/CW)*XS:0, mcy=mOn?(my/CH)*YS:0;

  for(var row=0;row<ROWS;row++){
    for(var col=0;col<COLS;col++){
      var x=col*XS, y=row*YS;

      // Analytical Laplacian: sum of -LK[i]*sin(kx*x+ky*y+om*t)
      // Negated: bright where surface concave upward (focusing)
      var L=0;
      for(var i=0;i<WV.length;i++){
        var w=WV[i];
        L-=LK[i]*Math.sin(w.kx*x+w.ky*y+w.om*t);
      }

      // Cursor ripple: circular expanding waves from cursor
      if(mOn){
        var mr=Math.sqrt((x-mcx)*(x-mcx)+(y-mcy)*(y-mcy));
        L+=MAXL*0.55*Math.sin(mr*5.5-t*8.5)*Math.exp(-mr*0.45);
      }

      // Map: only focusing regions glow (positive L = light concentrates here)
      var b=Math.max(0,L/MAXL);
      // Power curve sharpens bright caustic lines vs dark background
      b=Math.pow(b,0.52);

      // Card fade
      var ndx=(col-ccx)/crx,ndy=(row-ccy)/cry;
      var nd=ndx*ndx+ndy*ndy;
      b*=nd<1?nd*nd:1;

      b=Math.min(1,b);
      if(b<0.03)continue;

      var ci=Math.min(RAMP.length-1,(b*RAMP.length)|0);
      var ch=RAMP[ci];
      if(ch===' ')continue;
      ctx.globalAlpha=b;
      ctx.fillText(ch,col*CW,row*CH);
    }
  }
  ctx.globalAlpha=1;
  requestAnimationFrame(render);
}
requestAnimationFrame(render);
})();
</script></body></html>
