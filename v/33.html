<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>33 — firefly sync</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#060608;overflow:hidden;cursor:crosshair}
canvas{position:fixed;inset:0;z-index:0}
.content{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;pointer-events:none;padding:48px}
.card{pointer-events:auto;text-align:center}
</style></head><body>
<canvas id="c"></canvas>
<div class="content"><div class="card" id="card"></div></div>
<script>
(function(){
var CW=4.8,CH=10,cvs=document.getElementById('c'),ctx=cvs.getContext('2d');
var W=innerWidth,H=innerHeight;cvs.width=W;cvs.height=H;
var COLS=Math.ceil(W/CW)+1,ROWS=Math.ceil(H/CH)+1;
ctx.font='8px Courier New';ctx.textBaseline='top';
var mx=-1,my=-1,mOn=false;
addEventListener('mousemove',function(e){mOn=true;mx=e.clientX;my=e.clientY});
addEventListener('mouseleave',function(){mOn=false});
document.getElementById('card').innerHTML='';

// Kuramoto firefly synchronization.
// Each firefly has a natural blink frequency. Nearby fireflies
// gradually synchronize their rhythms — emergent coordination
// spreads across the field. Cursor disrupts local synchrony.

var N=160;
var px=new Float32Array(N),py=new Float32Array(N);
var pvx=new Float32Array(N),pvy=new Float32Array(N);
var phase=new Float32Array(N),freq=new Float32Array(N);
for(var i=0;i<N;i++){
  px[i]=Math.random()*W; py[i]=Math.random()*H;
  pvx[i]=(Math.random()-0.5)*0.22; pvy[i]=(Math.random()-0.5)*0.22;
  phase[i]=Math.random()*Math.PI*2;
  freq[i]=0.010+Math.random()*0.007; // slow — ~10-15s per cycle
}

var K=0.07;       // Kuramoto coupling strength — gentle synchronization
var SYNC_R2=150*150;
var field=new Float32Array(COLS*ROWS);
var DECAY=0.945;  // slow fade — glow lingers
var CHARS=['\u00B7','\u2218','\u25CB','\u25E6','\u25CF','\u25C9']; // · ∘ ○ ◦ ● ◉

function render(){
  for(var i=0;i<field.length;i++) field[i]*=DECAY;

  for(var i=0;i<N;i++){
    // Kuramoto: gently pull phase toward neighbors
    var sum=0,cnt=0;
    for(var j=0;j<N;j++){
      if(i===j) continue;
      var dx=px[j]-px[i],dy=py[j]-py[i];
      if(dx*dx+dy*dy<SYNC_R2){ sum+=Math.sin(phase[j]-phase[i]); cnt++; }
    }
    phase[i]+=freq[i]+(cnt>0?K*sum/cnt:0);

    // Cursor gently disrupts phase
    if(mOn){
      var dx=px[i]-mx,dy=py[i]-my;
      if(dx*dx+dy*dy<60*60) phase[i]+=0.15;
    }

    // Very slow drift
    px[i]+=pvx[i]; py[i]+=pvy[i];
    if(px[i]<0){px[i]=0;pvx[i]*=-1;} if(px[i]>W){px[i]=W;pvx[i]*=-1;}
    if(py[i]<0){py[i]=0;pvy[i]*=-1;} if(py[i]>H){py[i]=H;pvy[i]*=-1;}

    // Always draw faint presence — firefly body
    var gc=px[i]/CW|0,gr=py[i]/CH|0;
    if(gc>=0&&gc<COLS&&gr>=0&&gr<ROWS) field[gr*COLS+gc]=Math.max(field[gr*COLS+gc],0.05);

    // Soft swell — sine^2 peaks wide and slow
    var s=Math.sin(phase[i]);
    if(s<0) continue;
    var b=s*s; // softer than sine^4
    if(b<0.015) continue;

    var sr=b<0.4?1.6:2.4;
    var c0=Math.max(0,(px[i]/CW-sr-1)|0),c1=Math.min(COLS-1,(px[i]/CW+sr+1)|0);
    var r0=Math.max(0,(py[i]/CH-sr-1)|0),r1=Math.min(ROWS-1,(py[i]/CH+sr+1)|0);
    var inv=1/(sr*sr*0.6+0.1);
    for(var r=r0;r<=r1;r++) for(var c=c0;c<=c1;c++){
      var ddx=c-px[i]/CW,ddy=r-py[i]/CH;
      field[r*COLS+c]=Math.min(1,field[r*COLS+c]+b*Math.exp(-(ddx*ddx+ddy*ddy)*inv));
    }
  }

  ctx.fillStyle='#060608';ctx.fillRect(0,0,W,H);ctx.fillStyle='#ffffff';
  for(var row=0;row<ROWS;row++){
    for(var col=0;col<COLS;col++){
      var b=Math.min(1,field[row*COLS+col]);
      if(b<0.04) continue;
      var ci=Math.min(CHARS.length-1,(b*CHARS.length)|0);
      ctx.globalAlpha=b;
      ctx.fillText(CHARS[ci],col*CW,row*CH);
    }
  }
  ctx.globalAlpha=1;
  requestAnimationFrame(render);
}
requestAnimationFrame(render);
})();
</script></body></html>
