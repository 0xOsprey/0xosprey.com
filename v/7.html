<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>7 — terrain contours</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#060608;overflow:hidden;cursor:crosshair}
canvas{position:fixed;inset:0;z-index:0}
.content{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;pointer-events:none;padding:48px}
.card{pointer-events:auto;text-align:center}
.name{position:relative;height:52px;margin-bottom:20px;white-space:nowrap}
.n1,.n2{position:absolute;top:0;left:50%;transform:translateX(-50%);font:40px/1 'Courier New',monospace;color:rgba(255,255,255,.85);text-shadow:0 0 6px #060608,0 0 16px #060608;letter-spacing:.04em}
.n1{animation:ns1 14s infinite}
.n2{animation:ns2 14s infinite;opacity:0}
@keyframes ns1{0%,40%{opacity:1;filter:blur(0)}55%{opacity:0;filter:blur(7px)}90%{opacity:0;filter:blur(7px)}100%{opacity:1;filter:blur(0)}}@keyframes ns2{0%,40%{opacity:0;filter:blur(7px)}55%{opacity:1;filter:blur(0)}90%{opacity:1;filter:blur(0)}100%{opacity:0;filter:blur(7px)}}
.icons{display:flex;gap:28px;align-items:center;justify-content:center}
.icons a{color:rgba(255,255,255,.85);opacity:1;transition:opacity .3s,color .3s;text-decoration:none}
.icons a:hover{opacity:.45;color:#d4c8a8}
.icons svg{display:block;width:28px;height:28px;filter:drop-shadow(0 0 8px #060608) drop-shadow(0 0 22px #060608)}
</style></head><body>
<canvas id="c"></canvas>
<div class="content"><div class="card" id="card"></div></div>
<script>
(function(){
var CW=4.8,CH=10,cvs=document.getElementById('c'),ctx=cvs.getContext('2d');
var W=innerWidth,H=innerHeight;cvs.width=W;cvs.height=H;
var COLS=Math.ceil(W/CW)+1,ROWS=Math.ceil(H/CH)+1;
ctx.font='8px Courier New';ctx.textBaseline='top';
var mx=-1,my=-1,mOn=false;
addEventListener('mousemove',function(e){mOn=true;mx=e.clientX;my=e.clientY});
addEventListener('mouseleave',function(){mOn=false});
var cardEl=document.getElementById('card');
cardEl.innerHTML='<div class="icons"><a href="https://x.com/0xOsprey" title="X" target="_blank"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.736l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></a><a href="https://github.com/0xOsprey" title="GitHub" target="_blank"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.342-3.369-1.342-.454-1.155-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0112 6.844a9.59 9.59 0 012.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg></a><a href="mailto:hi@0xosprey.com" title="Email"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg></a></div>';

// --- Terrain Contours with FBM noise ---

function hash(x,y){
  var n=x*374761393+y*668265263;
  n=((n^(n>>13))*1274126177)|0;
  return(n^(n>>16))/2147483648;
}

function smooth(x,y){
  var ix=Math.floor(x),iy=Math.floor(y);
  var fx=x-ix,fy=y-iy;
  // Smoothstep
  fx=fx*fx*(3-2*fx);
  fy=fy*fy*(3-2*fy);
  var a=hash(ix,iy);
  var b=hash(ix+1,iy);
  var c=hash(ix,iy+1);
  var d=hash(ix+1,iy+1);
  return a+(b-a)*fx+(c-a)*fy+(a-b-c+d)*fx*fy;
}

function fbm(x,y){
  return smooth(x,y)*0.5+smooth(x*2,y*2)*0.3+smooth(x*4,y*4)*0.15+smooth(x*8,y*8)*0.05;
}

var contourChars=['·','-','─','=','≈','~','+','#'];
var numContours=12;
var scale=0.06;
var scrollSpeed=0.012;

function render(time){
  var t=time*0.001;
  var offX=t*scrollSpeed*8;
  var offY=t*scrollSpeed*3;

  ctx.fillStyle='#060608';ctx.fillRect(0,0,W,H);ctx.fillStyle='#ffffff';

  // Card fade zone
  var cardRect=cardEl.getBoundingClientRect();
  var ccx=(cardRect.left+cardRect.right)/2/CW,ccy=(cardRect.top+cardRect.bottom)/2/CH;
  var crx=(cardRect.width/2/CW)+3,cry=(cardRect.height/2/CH)+2;

  // Compute elevation grid
  // We need current cell and right/below for contour detection
  var elev=new Float32Array((COLS+1)*(ROWS+1));
  for(var row=0;row<=ROWS;row++){
    for(var col=0;col<=COLS;col++){
      var wx=col*scale+offX;
      var wy=row*scale+offY;
      var e=fbm(wx,wy);

      // Mouse raises terrain
      if(mOn){
        var pdx=(col*CW-mx);
        var pdy=(row*CH-my);
        var pd=Math.sqrt(pdx*pdx+pdy*pdy);
        var mouseR=150;
        if(pd<mouseR){
          var mf=(1-pd/mouseR);
          mf=mf*mf;
          e+=mf*0.25;
        }
      }

      elev[row*(COLS+1)+col]=e*numContours;
    }
  }

  for(var row=0;row<ROWS;row++){
    for(var col=0;col<COLS;col++){
      var e=elev[row*(COLS+1)+col];
      var eRight=elev[row*(COLS+1)+col+1];
      var eBelow=elev[(row+1)*(COLS+1)+col];

      // Detect contour crossings: does e cross an integer boundary with neighbors?
      var eFloor=Math.floor(e);
      var crossH=(Math.floor(eRight)!==eFloor);
      var crossV=(Math.floor(eBelow)!==eFloor);
      var isCross=crossH||crossV;

      if(!isCross)continue;

      // Brightness based on elevation
      var normE=(e%1);
      var brightness=0.2+0.8*Math.min(1,Math.abs(normE-0.5)*2);

      // Contour level determines character
      var level=((eFloor%contourChars.length)+contourChars.length)%contourChars.length;
      var ch=contourChars[level];

      // Card fade
      var ndx=(col-ccx)/crx,ndy=(row-ccy)/cry,nd=ndx*ndx+ndy*ndy;
      var fade=nd<1?nd*nd:1;
      brightness*=fade;

      if(brightness<0.03)continue;

      // Color varies slightly by elevation level
      var hue=0.55+eFloor*0.03;
      var sat=0.05+eFloor*0.02;
      // Keep it monochrome-ish with slight tint
      var r=Math.floor(212*(1+sat*Math.sin(hue*6.28))*brightness);
      var g=Math.floor(208*(1+sat*Math.cos(hue*6.28))*brightness);
      var b2=Math.floor(200*brightness);
      r=Math.min(255,Math.max(0,r));
      g=Math.min(255,Math.max(0,g));
      b2=Math.min(255,Math.max(0,b2));

      ctx.fillStyle='rgba('+r+','+g+','+b2+','+brightness+')';
      ctx.fillText(ch,col*CW,row*CH);
    }
  }

  requestAnimationFrame(render);
}
requestAnimationFrame(render);
})();
</script></body></html>
