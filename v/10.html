<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>10 — brian's brain</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#060608;overflow:hidden;cursor:crosshair}
canvas{position:fixed;inset:0;z-index:0}
.content{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;pointer-events:none}
.card{pointer-events:auto;text-align:left;padding:0}
.prompt{font:16px/1.5 'Courier New',monospace;color:#e8e0d8;text-shadow:0 0 6px #060608,0 0 14px #060608}
.links{margin-top:8px}
.links a{font:12px/1.6 'Courier New',monospace;color:rgba(232,224,216,.7);text-decoration:none;display:block;transition:color .3s;text-shadow:0 0 6px #060608,0 0 14px #060608}
.links a:hover{color:#e8e0d8}
.links a::before{content:'> ';color:rgba(232,224,216,.35)}
</style></head><body>
<canvas id="c"></canvas>
<div class="content"><div class="card" id="card"></div></div>
<script>
(function(){
var CW=4.8,CH=10,cvs=document.getElementById('c'),ctx=cvs.getContext('2d');
var W=innerWidth,H=innerHeight;cvs.width=W;cvs.height=H;
var COLS=Math.ceil(W/CW)+1,ROWS=Math.ceil(H/CH)+1;
ctx.font='8px Courier New';ctx.textBaseline='top';
var mx=-1,my=-1,mOn=false;
addEventListener('mousemove',function(e){mOn=true;mx=e.clientX;my=e.clientY});
addEventListener('mouseleave',function(){mOn=false});
var cardEl=document.getElementById('card');
cardEl.innerHTML='<div class="prompt">Joe Coll</div><div class="links"><a href="https://x.com/0xOsprey">x.com/0xOsprey</a><a href="https://github.com/0xOsprey">github.com/0xOsprey</a><a href="https://t.me/OspreyJoe">t.me/OspreyJoe</a><a href="mailto:hi@0xosprey.com">hi@0xosprey.com</a></div>';

// Brian's Brain: 3 states — 0=dead, 1=alive, 2=dying
var gridA=new Uint8Array(COLS*ROWS);
var gridB=new Uint8Array(COLS*ROWS);

// Seed initial random alive cells
for(var i=0;i<COLS*ROWS;i++){
  if(Math.random()<0.12) gridA[i]=1;
}

// Card exclusion zone
var cardRect=cardEl.getBoundingClientRect();
var ccx=(cardRect.left+cardRect.right)/2/CW;
var ccy=(cardRect.top+cardRect.bottom)/2/CH;
var crx,cry;
function updateCard(){
  cardRect=cardEl.getBoundingClientRect();
  ccx=(cardRect.left+cardRect.right)/2/CW;
  ccy=(cardRect.top+cardRect.bottom)/2/CH;
  crx=(cardRect.width/2/CW)+3;
  cry=(cardRect.height/2/CH)+2;
}
updateCard();

var lastStep=0;
var STEP_MS=60;
var frameCount=0;

function step(){
  // Apply Brian's Brain rules
  for(var row=0;row<ROWS;row++){
    for(var col=0;col<COLS;col++){
      var idx=row*COLS+col;
      var state=gridA[idx];
      if(state===1){
        // Alive -> Dying
        gridB[idx]=2;
      } else if(state===2){
        // Dying -> Dead
        gridB[idx]=0;
      } else {
        // Dead -> Alive if exactly 2 alive neighbors
        var alive=0;
        for(var dr=-1;dr<=1;dr++){
          for(var dc=-1;dc<=1;dc++){
            if(dr===0&&dc===0)continue;
            var nr=(row+dr+ROWS)%ROWS;
            var nc=(col+dc+COLS)%COLS;
            if(gridA[nr*COLS+nc]===1)alive++;
          }
        }
        gridB[idx]=alive===2?1:0;
      }
    }
  }

  // Cursor seeds alive cells in a small radius
  if(mOn){
    var mcol=Math.floor(mx/CW);
    var mrow=Math.floor(my/CH);
    var R=4;
    for(var dr=-R;dr<=R;dr++){
      for(var dc=-R;dc<=R;dc++){
        if(dr*dr+dc*dc>R*R)continue;
        var nr=(mrow+dr+ROWS)%ROWS;
        var nc=(mcol+dc+COLS)%COLS;
        if(Math.random()<0.3&&gridB[nr*COLS+nc]===0){
          gridB[nr*COLS+nc]=1;
        }
      }
    }
  }

  // Spontaneous seeding at edges to keep simulation active
  for(var i=0;i<8;i++){
    var edge=Math.floor(Math.random()*4);
    var r,c;
    if(edge===0){r=0;c=Math.floor(Math.random()*COLS);}
    else if(edge===1){r=ROWS-1;c=Math.floor(Math.random()*COLS);}
    else if(edge===2){r=Math.floor(Math.random()*ROWS);c=0;}
    else{r=Math.floor(Math.random()*ROWS);c=COLS-1;}
    if(gridB[r*COLS+c]===0)gridB[r*COLS+c]=1;
  }

  // Swap buffers
  var tmp=gridA;gridA=gridB;gridB=tmp;
}

function render(now){
  frameCount++;
  if(frameCount%60===0)updateCard();

  // Step simulation at fixed interval
  if(now-lastStep>=STEP_MS){
    step();
    lastStep=now;
  }

  ctx.fillStyle='#060608';ctx.fillRect(0,0,W,H);ctx.fillStyle='#d4d0c8';

  for(var row=0;row<ROWS;row++){
    for(var col=0;col<COLS;col++){
      var idx=row*COLS+col;
      var state=gridA[idx];
      if(state===0)continue;

      // Card fade
      var ndx=(col-ccx)/crx,ndy=(row-ccy)/cry;
      var nd=ndx*ndx+ndy*ndy;
      var fade=nd<1?nd*nd:1;

      var ch,brightness;
      if(state===1){
        // Alive: bright white block
        ch='\u2588';
        brightness=0.85*fade;
      } else {
        // Dying: dim shade
        ch='\u2593';
        brightness=0.3*fade;
      }

      if(brightness<0.02)continue;
      ctx.globalAlpha=brightness;
      ctx.fillText(ch,col*CW,row*CH);
    }
  }
  ctx.globalAlpha=1;
  requestAnimationFrame(render);
}
requestAnimationFrame(render);
})();
</script></body></html>
