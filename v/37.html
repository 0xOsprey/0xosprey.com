<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>37 — smoke</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#060608;overflow:hidden;cursor:crosshair}
canvas{position:fixed;inset:0;z-index:0}
.content{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;pointer-events:none;padding:48px}
.card{pointer-events:auto;text-align:center}
</style></head><body>
<canvas id="c"></canvas>
<div class="content"><div class="card" id="card"></div></div>
<script>
(function(){
var CW=4.8,CH=10,cvs=document.getElementById('c'),ctx=cvs.getContext('2d');
var W=innerWidth,H=innerHeight;cvs.width=W;cvs.height=H;
var COLS=Math.ceil(W/CW)+1,ROWS=Math.ceil(H/CH)+1;
ctx.font='8px Courier New';ctx.textBaseline='top';
var mx=-1,my=-1,mOn=false;
addEventListener('mousemove',function(e){mOn=true;mx=e.clientX;my=e.clientY});
addEventListener('mouseleave',function(){mOn=false});
document.getElementById('card').innerHTML='';

// Curl noise smoke — divergence-free velocity field from
// the curl of layered sinusoidal noise. Smoke rises naturally,
// eddying and billowing without sources or sinks.
// Cursor injects heat (upward boost).

var RAMP=' \u2591\u2592\u2593\u2588';

function noise2D(x,y,t){
  return Math.sin(x*0.028+t*0.37+y*0.019)
        +0.5*Math.sin(x*0.066-t*0.28+y*0.047)
        +0.25*Math.sin(x*0.121+t*0.51-y*0.083)
        +0.125*Math.sin(x*0.183-t*0.19+y*0.161);
}

function curlV(x,y,t){
  var e=0.8;
  var vx=(noise2D(x,y+e,t)-noise2D(x,y-e,t))/(2*e);
  var vy=-(noise2D(x+e,y,t)-noise2D(x-e,y,t))/(2*e);
  return {vx:vx,vy:vy};
}

var N=240;
var px=new Float32Array(N),py=new Float32Array(N);
for(var i=0;i<N;i++){
  px[i]=W*0.15+Math.random()*W*0.7;
  py[i]=H*0.3+Math.random()*H*0.7;
}
var field=new Float32Array(COLS*ROWS);
var DECAY=0.91;

function render(now){
  var t=now*0.001;
  for(var i=0;i<field.length;i++) field[i]*=DECAY;

  for(var i=0;i<N;i++){
    var cv=curlV(px[i]*0.005,py[i]*0.005,t);
    var spd=2.8;
    var vx=cv.vx*spd;
    var vy=cv.vy*spd-0.9; // upward drift

    if(mOn){
      var dx=px[i]-mx,dy=py[i]-my;
      var d2=dx*dx+dy*dy;
      if(d2<90*90){
        var d=Math.sqrt(d2)||1,mf=(1-d/90)*2.5;
        vy-=mf; vx+=dx/d*mf*0.4;
      }
    }

    px[i]+=vx; py[i]+=vy;
    if(py[i]<-30||py[i]>H+30||px[i]<-120||px[i]>W+120){
      px[i]=W*0.1+Math.random()*W*0.8;
      py[i]=H*0.5+Math.random()*H*0.5;
      continue;
    }

    var gc=px[i]/CW,gr=py[i]/CH,sr=1.9;
    var c0=Math.max(0,(gc-2)|0),c1=Math.min(COLS-1,(gc+2)|0);
    var r0=Math.max(0,(gr-2)|0),r1=Math.min(ROWS-1,(gr+2)|0);
    for(var r=r0;r<=r1;r++) for(var c=c0;c<=c1;c++){
      var dc=c-gc,dr=r-gr;
      field[r*COLS+c]=Math.min(1.5,field[r*COLS+c]+0.32*Math.exp(-(dc*dc+dr*dr)/(sr*sr)));
    }
  }

  ctx.fillStyle='#060608';ctx.fillRect(0,0,W,H);ctx.fillStyle='#ffffff';
  for(var row=0;row<ROWS;row++){
    for(var col=0;col<COLS;col++){
      var b=Math.min(1,field[row*COLS+col]);
      if(b<0.05) continue;
      var ci=Math.min(RAMP.length-1,(b*RAMP.length)|0);
      var ch=RAMP[ci];
      if(ch===' ') continue;
      ctx.globalAlpha=b;
      ctx.fillText(ch,col*CW,row*CH);
    }
  }
  ctx.globalAlpha=1;
  requestAnimationFrame(render);
}
requestAnimationFrame(render);
})();
</script></body></html>
