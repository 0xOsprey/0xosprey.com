<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>37 — excitable medium</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#060608;overflow:hidden;cursor:crosshair}
canvas{position:fixed;inset:0;z-index:0}
.content{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;pointer-events:none;padding:48px}
.card{pointer-events:auto;text-align:center}
</style></head><body>
<canvas id="c"></canvas>
<div class="content"><div class="card" id="card"></div></div>
<script>
(function(){
var CW=4.8,CH=10,cvs=document.getElementById('c'),ctx=cvs.getContext('2d');
var W=innerWidth,H=innerHeight;cvs.width=W;cvs.height=H;
var COLS=Math.ceil(W/CW)+1,ROWS=Math.ceil(H/CH)+1;
ctx.font='8px Courier New';ctx.textBaseline='top';
var mx=-1,my=-1,mOn=false,mMoved=false,lmx=-1,lmy=-1;
addEventListener('mousemove',function(e){mOn=true;mx=e.clientX;my=e.clientY;mMoved=true;});
addEventListener('mouseleave',function(){mOn=false;mMoved=false;});
addEventListener('touchstart',function(e){if(e.touches[0]){mOn=true;mMoved=true;mx=e.touches[0].clientX;my=e.touches[0].clientY;}},{passive:true});addEventListener('touchmove',function(e){if(e.touches[0]){mOn=true;mMoved=true;mx=e.touches[0].clientX;my=e.touches[0].clientY;}},{passive:true});
document.getElementById('card').innerHTML='';

// Belousov-Zhabotinsky excitable medium.
// Each cell cycles through K states: quiescent → excited → refractory → quiescent.
// A quiescent cell ignites when ≥ 2 excited neighbors surround it.
// Broken wave fronts curl into self-sustaining spiral rotors.
// Cursor seeds new excitations, spawning fresh spirals.

var K=18;       // state count
var THRESH=2;   // neighbors needed to excite
var STEPS=2;    // simulation steps per frame

var grid=new Int32Array(COLS*ROWS);
var next=new Int32Array(COLS*ROWS);

// Seed random K-state field — phase singularities create spirals naturally
for(var i=0;i<grid.length;i++) grid[i]=Math.floor(Math.random()*K);

var RAMP=[' ','\u00B7','.',':',';','=','+','*','#','@','\u2588'];

function step(){
  if(mMoved){
    var mc=(mx/CW)|0,mr=(my/CH)|0;
    for(var dr=-4;dr<=4;dr++) for(var dc=-4;dc<=4;dc++){
      if(dr*dr+dc*dc>16) continue;
      var rr=mr+dr,cc=mc+dc;
      if(rr>=0&&rr<ROWS&&cc>=0&&cc<COLS) grid[rr*COLS+cc]=Math.floor(Math.random()*3)+1;
    }
    mMoved=false;
  }
  for(var r=0;r<ROWS;r++){
    for(var c=0;c<COLS;c++){
      var state=grid[r*COLS+c];
      if(state>0){
        next[r*COLS+c]=(state+1)%K;
      } else {
        var n=0;
        var rm1=r>0,rp1=r<ROWS-1,cm1=c>0,cp1=c<COLS-1;
        if(rm1&&grid[(r-1)*COLS+c]===1)n++;
        if(rp1&&grid[(r+1)*COLS+c]===1)n++;
        if(cm1&&grid[r*COLS+c-1]===1)n++;
        if(cp1&&grid[r*COLS+c+1]===1)n++;
        if(rm1&&cm1&&grid[(r-1)*COLS+c-1]===1)n++;
        if(rm1&&cp1&&grid[(r-1)*COLS+c+1]===1)n++;
        if(rp1&&cm1&&grid[(r+1)*COLS+c-1]===1)n++;
        if(rp1&&cp1&&grid[(r+1)*COLS+c+1]===1)n++;
        next[r*COLS+c]=(n>=THRESH)?1:0;
      }
    }
  }
  var tmp=grid;grid=next;next=tmp;
}

function render(){
  for(var s=0;s<STEPS;s++) step();

  ctx.fillStyle='#060608';ctx.fillRect(0,0,W,H);ctx.fillStyle='#ffffff';
  var TAIL=Math.floor(K*0.28); // how many refractory states are visible
  for(var row=0;row<ROWS;row++){
    for(var col=0;col<COLS;col++){
      var state=grid[row*COLS+col];
      if(state===0) continue;
      var b;
      if(state===1) b=1.0;
      else if(state<=TAIL) b=1.0-(state-1)/(TAIL);
      else continue;
      if(b<0.04) continue;
      var ci=Math.min(RAMP.length-1,(b*(RAMP.length-1))|0);
      ctx.globalAlpha=b;
      ctx.fillText(RAMP[ci],col*CW,row*CH);
    }
  }
  ctx.globalAlpha=1;
  requestAnimationFrame(render);
}
requestAnimationFrame(render);
})();
</script></body></html>
