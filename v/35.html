<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>35 — osprey</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#060608;overflow:hidden;cursor:crosshair}
canvas{position:fixed;inset:0;z-index:0}
.content{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;pointer-events:none;padding:48px}
.card{pointer-events:auto;text-align:center}
</style></head><body>
<canvas id="c"></canvas>
<div class="content"><div class="card" id="card"></div></div>
<script>
(function(){
var CW=4.8,CH=10,cvs=document.getElementById('c'),ctx=cvs.getContext('2d');
var W=innerWidth,H=innerHeight;cvs.width=W;cvs.height=H;
var COLS=Math.ceil(W/CW)+1,ROWS=Math.ceil(H/CH)+1;
ctx.font='8px Courier New';ctx.textBaseline='top';
var mx=-1,my=-1,mOn=false;
addEventListener('mousemove',function(e){mOn=true;mx=e.clientX;my=e.clientY});
addEventListener('mouseleave',function(){mOn=false});
addEventListener('touchstart',function(e){if(e.touches[0]){mOn=true;mx=e.touches[0].clientX;my=e.touches[0].clientY;}},{passive:true});
addEventListener('touchmove',function(e){if(e.touches[0]){mOn=true;mx=e.touches[0].clientX;my=e.touches[0].clientY;}},{passive:true});
document.getElementById('card').innerHTML='';

// Osprey — a fish hawk works a stretch of open water. It soars,
// marks a fish, kites in place to line up the shot, then folds
// its wings and hits the water talons-first. Put the cursor in
// the sky and it rides your thermal. Hold the cursor in the
// water and the fish gather beneath it — live bait.

var WROW=Math.floor(ROWS*0.62),WLINE=WROW*CH;

// --- water: 1D wave equation along the surface
var wh=new Float32Array(COLS),wvel=new Float32Array(COLS);
function waveStep(){
  for(var i=0;i<COLS;i++){
    var l=wh[i>0?i-1:i],r=wh[i<COLS-1?i+1:i];
    wvel[i]+=(l+r-2*wh[i])*0.22;
    wvel[i]*=0.982;
  }
  for(var i=0;i<COLS;i++)wh[i]+=wvel[i];
}

// --- fish, cruising under the surface
var FN=5,fish=[];
for(var i=0;i<FN;i++)fish.push({
  x:Math.random()*W,
  y:WLINE+30+Math.random()*Math.max(40,H-WLINE-70),
  vx:(Math.random()<0.5?-1:1)*(0.35+Math.random()*0.5),
  ph:Math.random()*6.28,
  gone:0 // respawn countdown after being caught
});

var drops=[]; // splash spray

// --- the bird
var bird={x:W*0.3,y:WLINE*0.35,vx:0.9,vy:0,st:'soar',t:0,flap:0,tgt:0,held:0};
var F_UP =[[-3,-1,'\\'],[-2,-1,'~'],[-1,-1,'~'],[0,0,'v'],[1,-1,'~'],[2,-1,'~'],[3,-1,'/']];
var F_MID=[[-3,0,'~'],[-2,0,'~'],[-1,0,'~'],[0,0,'v'],[1,0,'~'],[2,0,'~'],[3,0,'~']];
var F_DN =[[-3,1,'/'],[-2,1,'_'],[-1,1,'_'],[0,0,'v'],[1,1,'_'],[2,1,'_'],[3,1,'\\']];
var F_DIVE=[[-1,-1,'\\'],[0,-1,'|'],[1,-1,'/'],[0,0,'V']];
var FLAPSEQ=[F_UP,F_MID,F_DN,F_MID];

function splashAt(x){
  var c=Math.max(1,Math.min(COLS-2,Math.round(x/CW)));
  wvel[c]-=4.5;wvel[c-1]-=2.2;wvel[c+1]-=2.2;
  for(var i=0;i<14;i++)
    drops.push({x:x+(Math.random()-0.5)*14,y:WLINE,
                vx:(Math.random()-0.5)*3.2,vy:-(2.2+Math.random()*3.4),life:46});
}

function render(now){
  var t=now*0.001;
  waveStep();

  // --- fish behavior
  var baited=mOn&&my>WLINE+14;
  for(var i=0;i<FN;i++){
    var f=fish[i];
    if(f.gone>0){
      if(--f.gone===0){
        f.x=Math.random()<0.5?-10:W+10;
        f.y=WLINE+30+Math.random()*Math.max(40,H-WLINE-70);
        f.vx=(f.x<0?1:-1)*(0.4+Math.random()*0.4);
      }
      continue;
    }
    f.ph+=0.035;
    f.vx+=Math.sin(f.ph*0.43+i*2.6)*0.006;
    if(baited){
      var bd=Math.abs(f.x-mx);
      if(bd<340){
        f.vx+=(mx>f.x?1:-1)*Math.min(0.02,bd*0.0001+0.006);
        f.y+=(Math.min(my,H-24)-f.y)*0.004;
      }
    }
    if(f.vx>1.0)f.vx=1.0;if(f.vx<-1.0)f.vx=-1.0;
    f.x+=f.vx;
    f.y+=Math.sin(f.ph)*0.18;
    if(f.x<-20){f.x=-20;f.vx=Math.abs(f.vx);}
    if(f.x>W+20){f.x=W+20;f.vx=-Math.abs(f.vx);}
    if(f.y<WLINE+22)f.y=WLINE+22;
    if(f.y>H-18)f.y=H-18;
  }

  // --- bird state machine
  var b=bird;
  b.t++;
  if(b.st==='soar'){
    b.flap+=0.09;
    var xT,yT;
    if(mOn&&my<WLINE-40){ // ride the cursor thermal
      xT=mx;yT=Math.max(30,Math.min(WLINE-130,my));
    }else{
      xT=W*0.5+Math.sin(t*0.13)*W*0.34;
      yT=WLINE*0.34+Math.sin(t*0.21+1.5)*WLINE*0.12;
    }
    b.vx+=(xT-b.x)*0.00045;b.vy+=(yT-b.y)*0.0011;
    b.vx*=0.985;b.vy*=0.94;
    if(b.vx>1.6)b.vx=1.6;if(b.vx<-1.6)b.vx=-1.6;
    b.x+=b.vx;b.y+=b.vy;
    if(b.held>0&&--b.held===0){} // finishes its meal on the wing
    // pick a hunt after a while
    if(b.t>380+((t*997)%420)&&b.held===0){
      var bi=-1,bd2=1e18;
      for(var i=0;i<FN;i++){
        if(fish[i].gone)continue;
        var dd=Math.abs(fish[i].x-b.x);
        if(dd<bd2){bd2=dd;bi=i;}
      }
      if(bi>=0){b.tgt=bi;b.st='hover';b.t=0;}
    }
  }else if(b.st==='hover'){
    b.flap+=0.45; // kiting — fast wingbeats, holding position
    var f=fish[b.tgt];
    if(f.gone){b.st='soar';b.t=0;}
    else{
      var xT=f.x+f.vx*55;
      var yT=WLINE-105;
      b.vx+=(xT-b.x)*0.004;b.vy+=(yT-b.y)*0.004;
      b.vx*=0.90;b.vy*=0.90;
      b.x+=b.vx+Math.sin(b.t*0.3)*0.3;b.y+=b.vy;
      if(b.t>110&&Math.abs(b.x-xT)<14){b.st='dive';b.t=0;b.vy=2.2;}
      if(b.t>360){b.st='soar';b.t=0;} // lost it
    }
  }else if(b.st==='dive'){
    var f=fish[b.tgt];
    b.vy+=0.55;if(b.vy>9.5)b.vy=9.5;
    if(!f.gone)b.vx+=((f.x-b.x)*0.012-b.vx)*0.2;
    b.x+=b.vx;b.y+=b.vy;
    if(b.y>=WLINE-4){
      splashAt(b.x);
      if(!f.gone&&Math.abs(f.x-b.x)<30&&f.y-WLINE<90){f.gone=420;b.held=300;}
      b.st='under';b.t=0;
    }
  }else if(b.st==='under'){
    if(b.t>24){b.st='climb';b.t=0;b.vy=-1.5;b.vx=b.x>W*0.5?-0.5:0.5;}
  }else if(b.st==='climb'){
    b.flap+=0.16; // heavy, loaded wingbeats
    b.vy=-1.15;
    b.x+=b.vx;b.y+=b.vy;
    if(b.y<WLINE*0.36){b.st='soar';b.t=0;}
  }
  if(b.x<24)b.x=24;if(b.x>W-24)b.x=W-24;
  if(b.y<14)b.y=14;

  // cursor dabbling in the water makes small rings
  if(baited&&(b.t%7===0)){
    var mc=Math.max(1,Math.min(COLS-2,Math.round(mx/CW)));
    wvel[mc]-=0.18;
  }

  // --- spray
  for(var di=drops.length-1;di>=0;di--){
    var d=drops[di];
    d.x+=d.vx;d.y+=d.vy;d.vy+=0.30;d.life--;
    if(d.y>WLINE+4){
      var c=Math.max(1,Math.min(COLS-2,Math.round(d.x/CW)));
      wvel[c]-=0.35;
      drops.splice(di,1);
    }else if(d.life<=0)drops.splice(di,1);
  }

  // --- render
  ctx.fillStyle='#060608';ctx.fillRect(0,0,W,H);ctx.fillStyle='#ffffff';

  // sky: thin drifting cloud
  for(var row=0;row<WROW-2;row++){
    for(var col=0;col<COLS;col++){
      var c=Math.sin(col*0.05+t*0.05+Math.sin(row*0.31)*1.2)
           *Math.sin(row*0.23-t*0.018+Math.sin(col*0.013+t*0.01)*2.0);
      if(c<=0.62)continue;
      ctx.globalAlpha=(c-0.62)*0.30;
      ctx.fillText('~',col*CW,row*CH);
    }
  }

  // water surface
  for(var col=0;col<COLS;col++){
    var hs=wh[col]+2.2*Math.sin(col*0.11+t*0.8)+1.5*Math.sin(col*0.053-t*0.5);
    var off=Math.max(-4,Math.min(4,Math.round(hs*0.30)));
    var a=0.40+Math.min(0.55,Math.abs(hs)*0.06);
    ctx.globalAlpha=a;
    ctx.fillText('~',col*CW,(WROW+off)*CH);
    ctx.globalAlpha=a*0.35;
    ctx.fillText('-',col*CW,(WROW+off+1)*CH);
  }
  // subsurface shimmer
  for(var row=WROW+2;row<ROWS;row++){
    for(var col=0;col<COLS;col++){
      var ss=Math.sin(col*0.13+row*0.7-t*0.6);
      if(ss<=0.86)continue;
      ctx.globalAlpha=0.07;
      ctx.fillText('·',col*CW,row*CH);
    }
  }

  // fish shadows
  for(var i=0;i<FN;i++){
    var f=fish[i];
    if(f.gone)continue;
    var depth01=(f.y-WLINE)/Math.max(1,H-WLINE);
    ctx.globalAlpha=0.34-depth01*0.18;
    var c=Math.round(f.x/CW),r=Math.round(f.y/CH);
    var wig=Math.sin(f.ph*2)>0?'=':'-';
    if(f.vx>=0){
      ctx.fillText(wig,(c-1)*CW,r*CH);ctx.fillText('=',c*CW,r*CH);ctx.fillText('>',(c+1)*CW,r*CH);
    }else{
      ctx.fillText('<',(c-1)*CW,r*CH);ctx.fillText('=',c*CW,r*CH);ctx.fillText(wig,(c+1)*CW,r*CH);
    }
  }

  // spray
  ctx.globalAlpha=0.8;
  for(var di=0;di<drops.length;di++){
    var d=drops[di];
    ctx.fillText(d.vy<0?"'":'.',d.x,d.y);
  }

  // the bird
  if(b.st!=='under'){
    var frameG=(b.st==='dive')?F_DIVE:FLAPSEQ[(b.flap|0)%4];
    var bc=Math.round(b.x/CW),br=Math.round(b.y/CH);
    ctx.globalAlpha=0.95;
    for(var k=0;k<frameG.length;k++){
      var cell=frameG[k];
      ctx.fillText(cell[2],(bc+cell[0])*CW,(br+cell[1])*CH);
    }
    if(b.held>0){
      ctx.globalAlpha=0.55;
      ctx.fillText('<',bc*CW,(br+1)*CH);
    }
  }
  ctx.globalAlpha=1;
  requestAnimationFrame(render);
}
requestAnimationFrame(render);
})();
</script></body></html>
