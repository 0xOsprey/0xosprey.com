<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>24 — spiral galaxy</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#060608;overflow:hidden;cursor:crosshair}
canvas{position:fixed;inset:0;z-index:0}
.content{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;pointer-events:none}
.card{pointer-events:auto;text-align:left;padding:0}
.prompt{font:13px/1.5 'Courier New',monospace;color:#fff;text-shadow:0 0 6px #060608,0 0 14px #060608}
.links{margin-top:8px}
.links a{font:12px/1.6 'Courier New',monospace;color:rgba(255,255,255,.7);text-decoration:none;display:block;transition:color .3s;text-shadow:0 0 6px #060608,0 0 14px #060608}
.links a:hover{color:#fff}
.links a::before{content:'> ';color:rgba(255,255,255,.35)}
</style></head><body>
<canvas id="c"></canvas>
<div class="content"><div class="card" id="card"></div></div>
<script>
(function(){
var CW=4.8,CH=10,cvs=document.getElementById('c'),ctx=cvs.getContext('2d');
var W=innerWidth,H=innerHeight;cvs.width=W;cvs.height=H;
var COLS=Math.ceil(W/CW)+1,ROWS=Math.ceil(H/CH)+1;
ctx.font='8px Courier New';ctx.textBaseline='top';
var mx=-1,my=-1,mOn=false;
addEventListener('mousemove',function(e){mOn=true;mx=e.clientX;my=e.clientY});
addEventListener('mouseleave',function(){mOn=false});
var cardEl=document.getElementById('card');
cardEl.innerHTML='<div class="prompt">Joe Coll</div><div class="links"><a href="https://x.com/0xOsprey">x.com/0xOsprey</a><a href="https://github.com/0xOsprey">github.com/0xOsprey</a><a href="https://t.me/OspreyJoe">t.me/OspreyJoe</a><a href="mailto:hi@0xosprey.com">hi@0xosprey.com</a></div>';

var RAMP=' .\u00B7:;=+*#%@\u2588';

// Spiral galaxy: flat rotation curve — inner stars orbit faster than outer.
// Starting from 2 arm seeds, differential rotation winds them into spirals.
// Cursor warps nearby stars like a gravitational flyby.
var N=800;
var pr=new Float32Array(N);    // orbital radius (0–1)
var ptheta=new Float32Array(N);// initial angle
var pomega=new Float32Array(N);// angular speed (rad/sec)
var pz=new Float32Array(N);    // disk thickness offset (for 3D tilt)
var pbright=new Float32Array(N);

// Aspect correction: characters are taller than wide
var AX=CW/CH; // ≈ 0.48 — scale y contribution so circles look circular

var CX=COLS/2,CY=ROWS/2;
var SCALE=Math.min(COLS,ROWS)*0.44; // radius in chars for r=1

for(var i=0;i<N;i++){
  var r,theta;
  var inArm=Math.random()<0.60;
  if(inArm){
    r=0.04+Math.random()*0.80;
    var arm=Math.floor(Math.random()*2); // 2 arms
    // Log-spiral seed: arm follows θ = θ0 + k·ln(r)
    theta=arm*Math.PI+(Math.random()-0.5)*0.55+1.8*Math.log(r+0.05);
  }else{
    // Smooth background disk
    r=Math.sqrt(Math.random())*0.85;
    theta=Math.random()*Math.PI*2;
  }
  pr[i]=r;
  ptheta[i]=theta;
  // Flat rotation curve: ω = v0/(r + softening)
  pomega[i]=0.18/(r+0.05);
  pz[i]=(Math.random()-0.5)*0.06; // thin disk
  pbright[i]=0.5+Math.random()*0.5;
}

var field=new Float32Array(COLS*ROWS);
var DECAY=0.88;

// Slow tilt oscillation — slight 3D feel
var TILT_AMP=0.12,TILT_FREQ=0.04;

function render(now){
  var t=now*0.001;
  var tilt=Math.sin(t*TILT_FREQ)*TILT_AMP;
  var cosTilt=Math.cos(tilt),sinTilt=Math.sin(tilt);

  // Decay
  for(var i=0;i<field.length;i++)field[i]*=DECAY;

  for(var i=0;i<N;i++){
    var angle=ptheta[i]+pomega[i]*t;
    var r=pr[i];
    // 3D projection with slow tilt
    var x3=r*Math.cos(angle);
    var y3=r*Math.sin(angle);
    var z3=pz[i];
    var xp=x3;
    var yp=y3*cosTilt+z3*sinTilt;

    // Map to char grid (correct for non-square chars)
    var col=CX+xp*SCALE;
    var row=CY+yp*SCALE*AX;

    // Cursor gravity: nearby stars are slightly pulled
    if(mOn){
      var mdx=(mx/CW)-col,mdy=(my/CH)-row;
      var md=Math.sqrt(mdx*mdx+mdy*mdy)||1;
      if(md<22){
        col+=mdx/md*(1-md/22)*1.8;
        row+=mdy/md*(1-md/22)*1.8;
      }
    }

    var ci=col|0,ri=row|0;
    if(ci<1||ci>=COLS-1||ri<1||ri>=ROWS-1)continue;
    var idx=ri*COLS+ci;
    var v=pbright[i]*0.12;
    field[idx]+=v;
    field[idx-1]+=v*0.3;field[idx+1]+=v*0.3;
    field[idx-COLS]+=v*0.3;field[idx+COLS]+=v*0.3;
  }

  ctx.fillStyle='#060608';ctx.fillRect(0,0,W,H);ctx.fillStyle='#d4d0c8';

  var cardRect=cardEl.getBoundingClientRect();
  var ccx=(cardRect.left+cardRect.right)/2/CW,ccy=(cardRect.top+cardRect.bottom)/2/CH;
  var crx=(cardRect.width/2/CW)+3,cry=(cardRect.height/2/CH)+2;

  for(var row=0;row<ROWS;row++){
    for(var col=0;col<COLS;col++){
      var b=Math.min(1,field[row*COLS+col]);
      if(b<0.025)continue;

      var ndx=(col-ccx)/crx,ndy=(row-ccy)/cry;
      var nd=ndx*ndx+ndy*ndy;
      b*=nd<1?nd*nd:1;
      if(b<0.025)continue;

      var ci=Math.min(RAMP.length-1,(b*RAMP.length)|0);
      var ch=RAMP[ci];
      if(ch===' ')continue;
      ctx.globalAlpha=b;
      ctx.fillText(ch,col*CW,row*CH);
    }
  }
  ctx.globalAlpha=1;
  requestAnimationFrame(render);
}
requestAnimationFrame(render);
})();
</script></body></html>
