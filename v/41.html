<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>41 — falling sand</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#060608;overflow:hidden;cursor:crosshair}
canvas{position:fixed;inset:0;z-index:0}
.content{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;pointer-events:none;padding:48px}
.card{pointer-events:auto;text-align:center}
</style></head><body>
<canvas id="c"></canvas>
<div class="content"><div class="card" id="card"></div></div>
<script>
(function(){
var CW=4.8,CH=10,cvs=document.getElementById('c'),ctx=cvs.getContext('2d');
var W=innerWidth,H=innerHeight;cvs.width=W;cvs.height=H;
var COLS=Math.ceil(W/CW)+1,ROWS=Math.ceil(H/CH)+1;
ctx.font='8px Courier New';ctx.textBaseline='top';
var mx=-1,my=-1,mOn=false;
addEventListener('mousemove',function(e){mOn=true;mx=e.clientX;my=e.clientY});
addEventListener('mouseleave',function(){mOn=false});
document.getElementById('card').innerHTML='';

// Falling sand — cellular automaton gravity.
// Grains rain from the top, pile under gravity, slide off
// steep slopes. Bottom drains slowly so the dunes breathe.
// Cursor parts the rain and erodes whatever it touches.

var grid=new Uint8Array(COLS*ROWS);
var SPAWN=0.09;  // spawn probability per top column per frame
var DRAIN=0.018; // drain probability per bottom grain per frame
var STEPS=3;     // CA steps per frame
var RAMP=[' ','\u00B7','\u2591','\u2592','\u2593','\u2588'];

// Seed a small initial pile in the center so there's something to look at
var mid=COLS>>1;
for(var r=ROWS-12;r<ROWS;r++) for(var c=mid-10;c<mid+10;c++) if(Math.random()<0.8) grid[r*COLS+c]=1;

function simStep(){
  // Spawn from top row
  for(var c=0;c<COLS;c++) if(!grid[c]&&Math.random()<SPAWN) grid[c]=1;

  // Cursor erodes
  if(mOn){
    var mc=(mx/CW)|0,mr=(my/CH)|0;
    for(var dr=-4;dr<=4;dr++) for(var dc=-4;dc<=4;dc++){
      if(dr*dr+dc*dc>16) continue;
      var rr=mr+dr,cc=mc+dc;
      if(rr>=0&&rr<ROWS&&cc>=0&&cc<COLS) grid[rr*COLS+cc]=0;
    }
  }

  // Gravity — process bottom to top
  for(var r=ROWS-2;r>=0;r--){
    // Shuffle column order each row to remove left/right bias
    var start=(r&1)?0:COLS-1,dir=(r&1)?1:-1;
    for(var ci=0;ci<COLS;ci++){
      var c=start+ci*dir;
      if(!grid[r*COLS+c]) continue;
      // Fall straight down
      if(!grid[(r+1)*COLS+c]){
        grid[(r+1)*COLS+c]=1; grid[r*COLS+c]=0; continue;
      }
      // Slide diagonally
      var dL=c>0&&!grid[(r+1)*COLS+c-1];
      var dR=c<COLS-1&&!grid[(r+1)*COLS+c+1];
      if(dL&&dR) dL=Math.random()<0.5;
      if(dL){grid[(r+1)*COLS+c-1]=1;grid[r*COLS+c]=0;}
      else if(dR){grid[(r+1)*COLS+c+1]=1;grid[r*COLS+c]=0;}
    }
  }

  // Drain bottom row slowly
  for(var c=0;c<COLS;c++) if(grid[(ROWS-1)*COLS+c]&&Math.random()<DRAIN) grid[(ROWS-1)*COLS+c]=0;
}

var field=new Float32Array(COLS*ROWS);

function render(){
  for(var s=0;s<STEPS;s++) simStep();

  // Build smooth density field
  for(var i=0;i<field.length;i++) field[i]=0;
  for(var r=0;r<ROWS;r++){
    for(var c=0;c<COLS;c++){
      if(!grid[r*COLS+c]) continue;
      var idx=r*COLS+c;
      field[idx]+=0.78;
      if(c>0) field[idx-1]=Math.max(field[idx-1],0.28);
      if(c<COLS-1) field[idx+1]=Math.max(field[idx+1],0.28);
      if(r>0) field[(r-1)*COLS+c]=Math.max(field[(r-1)*COLS+c],0.14);
    }
  }

  ctx.fillStyle='#060608';ctx.fillRect(0,0,W,H);ctx.fillStyle='#ffffff';
  for(var row=0;row<ROWS;row++){
    for(var col=0;col<COLS;col++){
      var b=Math.min(1,field[row*COLS+col]);
      if(b<0.08) continue;
      var ci=Math.min(RAMP.length-1,(b*(RAMP.length-1))|0);
      ctx.globalAlpha=b;
      ctx.fillText(RAMP[ci],col*CW,row*CH);
    }
  }
  ctx.globalAlpha=1;
  requestAnimationFrame(render);
}
requestAnimationFrame(render);
})();
</script></body></html>
