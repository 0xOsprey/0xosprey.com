<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>41 — sand dunes</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#060608;overflow:hidden;cursor:crosshair}
canvas{position:fixed;inset:0;z-index:0}
.content{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;pointer-events:none;padding:48px}
.card{pointer-events:auto;text-align:center}
</style></head><body>
<canvas id="c"></canvas>
<div class="content"><div class="card" id="card"></div></div>
<script>
(function(){
var CW=4.8,CH=10,cvs=document.getElementById('c'),ctx=cvs.getContext('2d');
var W=innerWidth,H=innerHeight;cvs.width=W;cvs.height=H;
var COLS=Math.ceil(W/CW)+1,ROWS=Math.ceil(H/CH)+1;
ctx.font='8px Courier New';ctx.textBaseline='top';
var mx=-1,my=-1,mOn=false;
addEventListener('mousemove',function(e){mOn=true;mx=e.clientX;my=e.clientY});
addEventListener('mouseleave',function(){mOn=false});
document.getElementById('card').innerHTML='';

// Aeolian sand transport — wind-driven dune formation.
// Grains saltate downwind when exposed above threshold height.
// Shadow zones let slip-faces accumulate. Dunes slowly migrate.
// Cursor deposits sand, seeding new dune growth.

var RAMP=[' ','\u2591','\u2592','\u2593','\u2588']; // ░ ▒ ▓ █

var height=new Float32Array(COLS*ROWS);
var heightNext=new Float32Array(COLS*ROWS);

// Initialize: random gentle bumps
for(var r=0;r<ROWS;r++) for(var c=0;c<COLS;c++)
  height[r*COLS+c]=0.15+0.55*Math.random();

var WIND_T=0;
var THRESH=0.25;
var TRANS=0.045;
var SHADOW_L=5;  // shadow length (cells)
var SHADOW_S=0.12; // shadow slope threshold per cell
var STEPS=3;

function simulate(){
  for(var r=0;r<ROWS;r++) for(var c=0;c<COLS;c++) heightNext[r*COLS+c]=height[r*COLS+c];

  // Wind direction: mostly rightward with slow rotation
  var wc=Math.cos(WIND_T)<0?-1:1; // integer step, left or right
  var wr=0; // horizontal wind only

  for(var r=0;r<ROWS;r++){
    for(var c=0;c<COLS;c++){
      var h=height[r*COLS+c];
      if(h<THRESH) continue;

      // Shadow check: is this cell sheltered by a taller upwind cell?
      var inShadow=false;
      for(var s=1;s<=SHADOW_L;s++){
        var uc=c-wc*s;
        if(uc<0||uc>=COLS) break;
        if(height[r*COLS+uc]-h>s*SHADOW_S){inShadow=true;break;}
      }
      if(inShadow) continue;

      // Transport: move a fraction downwind
      var nc=c+wc;
      if(nc<0||nc>=COLS) nc=c; // bounce at edge
      var q=Math.min(TRANS,h-THRESH+0.005);
      heightNext[r*COLS+c]-=q;
      heightNext[r*COLS+nc]+=q;
    }
  }

  // Avalanche: smooth over-steep slopes (angle of repose)
  var AOR=0.35;
  for(var r=0;r<ROWS;r++){
    for(var c=0;c<COLS;c++){
      if(c<COLS-1){
        var diff=heightNext[r*COLS+c]-heightNext[r*COLS+c+1];
        if(diff>AOR){var f=diff*0.12;heightNext[r*COLS+c]-=f;heightNext[r*COLS+c+1]+=f;}
        else if(diff<-AOR){var f=-diff*0.12;heightNext[r*COLS+c]+=f;heightNext[r*COLS+c+1]-=f;}
      }
      if(r<ROWS-1){
        var diff=heightNext[r*COLS+c]-heightNext[(r+1)*COLS+c];
        if(Math.abs(diff)>AOR){var f=diff*0.06;heightNext[r*COLS+c]-=f;heightNext[(r+1)*COLS+c]+=f;}
      }
    }
  }

  var tmp=height;height=heightNext;heightNext=tmp;
}

function render(){
  WIND_T+=0.0008;

  if(mOn){
    var mc=(mx/CW)|0,mr=(my/CH)|0;
    for(var dr=-3;dr<=3;dr++) for(var dc=-3;dc<=3;dc++){
      var rr=mr+dr,cc=mc+dc;
      if(rr>=0&&rr<ROWS&&cc>=0&&cc<COLS) height[rr*COLS+cc]=Math.min(1.6,height[rr*COLS+cc]+0.06);
    }
  }

  for(var s=0;s<STEPS;s++) simulate();

  ctx.fillStyle='#060608';ctx.fillRect(0,0,W,H);ctx.fillStyle='#ffffff';
  for(var row=0;row<ROWS;row++){
    for(var col=0;col<COLS;col++){
      var h=Math.min(1,Math.max(0,height[row*COLS+col]));
      if(h<0.08) continue;
      var ci=Math.min(RAMP.length-1,(h*RAMP.length)|0);
      var ch=RAMP[ci];
      if(ch===' ') continue;
      ctx.globalAlpha=h;
      ctx.fillText(ch,col*CW,row*CH);
    }
  }
  ctx.globalAlpha=1;
  requestAnimationFrame(render);
}
requestAnimationFrame(render);
})();
</script></body></html>
