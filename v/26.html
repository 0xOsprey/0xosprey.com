<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>26 — mycelium</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#060608;overflow:hidden;cursor:crosshair}
canvas{position:fixed;inset:0;z-index:0}
.content{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;pointer-events:none;padding:48px}
.card{pointer-events:auto;text-align:center}
.name{position:relative;height:52px;margin-bottom:20px;white-space:nowrap}
.n1,.n2{position:absolute;top:0;left:50%;transform:translateX(-50%);font:40px/1 'Courier New',monospace;color:rgba(255,255,255,.85);text-shadow:0 0 8px #060608,0 0 22px #060608;letter-spacing:.04em}
.n1{animation:ns1 14s infinite}
.n2{animation:ns2 14s infinite;opacity:0}
@keyframes ns1{0%,40%{opacity:1;filter:blur(0)}55%{opacity:0;filter:blur(7px)}90%{opacity:0;filter:blur(7px)}100%{opacity:1;filter:blur(0)}}@keyframes ns2{0%,40%{opacity:0;filter:blur(7px)}55%{opacity:1;filter:blur(0)}90%{opacity:1;filter:blur(0)}100%{opacity:0;filter:blur(7px)}}
.icons{display:flex;gap:28px;align-items:center;justify-content:center}
.icons a{color:rgba(255,255,255,.85);opacity:1;transition:opacity .3s;text-decoration:none}
.icons a:hover{opacity:.45}
.icons svg{display:block;width:28px;height:28px;filter:drop-shadow(0 0 2px rgba(6,6,8,.9)) drop-shadow(0 0 6px rgba(6,6,8,.5))}
</style></head><body>
<canvas id="c"></canvas>
<div class="content"><div class="card" id="card"></div></div>
<script>
(function(){
var CW=4.8,CH=10,cvs=document.getElementById('c'),ctx=cvs.getContext('2d');
var W=innerWidth,H=innerHeight;cvs.width=W;cvs.height=H;
var COLS=Math.ceil(W/CW)+1,ROWS=Math.ceil(H/CH)+1;
ctx.font='8px Courier New';ctx.textBaseline='top';
var mx=-1,my=-1,mOn=false;
addEventListener('mousemove',function(e){mOn=true;mx=e.clientX;my=e.clientY});
addEventListener('mouseleave',function(){mOn=false});
var cardEl=document.getElementById('card');
cardEl.innerHTML='';

// Mycelium — correlated random walk hyphae leave persistent ASCII-line trails.
// The network slowly spreads and branches like fungal threads in agar.
// Cursor spawns a new spore cluster at its position.

var THIN=['-','\\','|','/'];
var MAX_E=260,SPEED=0.16,BRANCH_P=0.0026,FADE=0.9997,MAX_TIPS=820;

var field=new Float32Array(COLS*ROWS);
var angf=new Float32Array(COLS*ROWS);
var tips=[];
var lastSpore=0;

function spawn(c,r,a,e){
  if(tips.length>=MAX_TIPS)return;
  tips.push({c:c,r:r,a:a,e:e||MAX_E});
}

for(var i=0;i<10;i++){
  var sc=4+Math.random()*(COLS-8),sr=4+Math.random()*(ROWS-8);
  for(var j=0;j<4;j++) spawn(sc+(Math.random()-.5)*3,sr+(Math.random()-.5)*3,Math.random()*Math.PI*2);
}

function render(now){
  var t=now*.001;

  if(mOn&&t-lastSpore>2.6){
    var mc=mx/CW,mr=my/CH;
    for(var j=0;j<7;j++) spawn(mc+(Math.random()-.5)*5,mr+(Math.random()-.5)*5,Math.random()*Math.PI*2,MAX_E);
    lastSpore=t;
  }

  var alive=[];
  for(var i=0;i<tips.length;i++){
    var tip=tips[i];
    if(--tip.e<=0) continue;
    tip.a+=(Math.random()-.5)*0.19;
    tip.c+=Math.cos(tip.a)*SPEED;
    tip.r+=Math.sin(tip.a)*SPEED;
    if(tip.c<0.5||tip.c>=COLS-.5||tip.r<0.5||tip.r>=ROWS-.5) continue;

    var ci=(tip.c+.5)|0,ri=(tip.r+.5)|0;
    var idx=ri*COLS+ci;
    var bright=0.38+(tip.e/MAX_E)*0.62;
    field[idx]=Math.min(1,field[idx]+bright*0.28);
    angf[idx]=tip.a;
    if(ci>0)       field[idx-1]   =Math.min(1,field[idx-1]   +bright*0.05);
    if(ci<COLS-1)  field[idx+1]   =Math.min(1,field[idx+1]   +bright*0.05);
    if(ri>0)       field[idx-COLS]=Math.min(1,field[idx-COLS]+bright*0.05);
    if(ri<ROWS-1)  field[idx+COLS]=Math.min(1,field[idx+COLS]+bright*0.05);

    if(tip.e>50&&Math.random()<BRANCH_P&&alive.length+tips.length<MAX_TIPS){
      var ba=tip.a+(Math.random()>.5?1:-1)*(0.32+Math.random()*0.58);
      alive.push({c:tip.c,r:tip.r,a:ba,e:Math.floor(tip.e*.64)});
    }
    alive.push(tip);
  }
  tips=alive;

  if(tips.length<90){
    var sc=4+Math.random()*(COLS-8),sr=4+Math.random()*(ROWS-8);
    for(var j=0;j<6;j++) spawn(sc,sr,Math.random()*Math.PI*2);
  }

  for(var i=0;i<field.length;i++) field[i]*=FADE;

  ctx.fillStyle='#060608';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#ffffff';

  for(var row=0;row<ROWS;row++){
    for(var col=0;col<COLS;col++){
      var b=field[row*COLS+col];
      if(b<0.025) continue;
      b=Math.min(1,b);
      var a=angf[row*COLS+col];
      var ai=((( Math.round(a*4/Math.PI)%4)+4)%4);
      var ch=b>.80?'+':THIN[ai];
      ctx.globalAlpha=b;
      ctx.fillText(ch,col*CW,row*CH);
    }
  }
  ctx.globalAlpha=1;
  requestAnimationFrame(render);
}
requestAnimationFrame(render);
})();
</script></body></html>
