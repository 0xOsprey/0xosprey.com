<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1 — matrix rain</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #050505; overflow: hidden; cursor: crosshair; }
  #bg { position: fixed; inset: 0; z-index: 0; user-select: none; }
  .r { font: 13px/15px 'Courier New', monospace; white-space: pre; height: 15px; color: #d4d0c8; }
  .a1{opacity:.06} .a2{opacity:.13} .a3{opacity:.21} .a4{opacity:.30}
  .a5{opacity:.42} .a6{opacity:.55} .a7{opacity:.68} .a8{opacity:.80} .a9{opacity:.92} .a10{opacity:1}
  .content{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;pointer-events:none;padding:48px}
  .card{pointer-events:auto;text-align:center;animation:flk 12s 3s infinite}
  .name{position:relative;height:52px;margin-bottom:20px;white-space:nowrap}
  .n1,.n2{position:absolute;top:0;left:50%;transform:translateX(-50%);font:40px/1 'Courier New',monospace;color:rgba(255,255,255,.85);text-shadow:0 0 6px #060608,0 0 16px #060608;letter-spacing:.04em}
  .n1{animation:ns1 14s infinite}
  .n2{animation:ns2 14s infinite;opacity:0}
  @keyframes ns1{0%,40%{opacity:1;filter:blur(0)}55%{opacity:0;filter:blur(7px)}90%{opacity:0;filter:blur(7px)}100%{opacity:1;filter:blur(0)}}@keyframes ns2{0%,40%{opacity:0;filter:blur(7px)}55%{opacity:1;filter:blur(0)}90%{opacity:1;filter:blur(0)}100%{opacity:0;filter:blur(7px)}}
  @keyframes flk{0%,92%,96%{opacity:1}94%{opacity:.55}95%{opacity:.9}}
  .icons{display:flex;gap:28px;align-items:center;justify-content:center}
  .icons a{color:rgba(255,255,255,.85);opacity:1;transition:opacity .3s;text-decoration:none}
  .icons a:hover{opacity:.4}
  .icons svg{display:block;width:28px;height:28px;filter:drop-shadow(0 0 2px rgba(6,6,8,.9)) drop-shadow(0 0 6px rgba(6,6,8,.5))}

</style>
</head>
<body>
<div id="bg"></div>
<div class="content"><div class="card" id="card">

</div></div>
<script>
// V1: Matrix-style vertical rain with cursor disturbance
(function(){
  var CH=15,CW=7.8;
  var COLS=Math.ceil(innerWidth/CW)+2, ROWS=Math.ceil(innerHeight/CH)+2;
  var GLYPHS='.:+*|/\\=-~^!?;:.,0123456789abcdef<>[]{}()#@%&';
  var drops=[];
  for(var c=0;c<COLS;c++) drops.push({y:Math.random()*ROWS*2-ROWS, speed:0.3+Math.random()*0.7, len:4+Math.random()*12|0});

  var mouseX=-1,mouseY=-1,mouseOn=false;
  document.addEventListener('mousemove',function(e){mouseOn=true;mouseX=e.clientX;mouseY=e.clientY});
  document.addEventListener('mouseleave',function(){mouseOn=false});
  document.addEventListener('touchstart',function(e){if(e.touches[0]){mouseOn=true;mouseX=e.touches[0].clientX;mouseY=e.touches[0].clientY;}},{passive:true});document.addEventListener('touchmove',function(e){if(e.touches[0]){mouseOn=true;mouseX=e.touches[0].clientX;mouseY=e.touches[0].clientY;}},{passive:true});

  var cardEl=document.getElementById('card');
  var iC0=0,iR0=0,iC1=0,iR1=0;
  function updIsland(){var r=cardEl.getBoundingClientRect();iC0=Math.floor(r.left/CW)-1;iR0=Math.floor(r.top/CH)-1;iC1=Math.ceil(r.right/CW)+1;iR1=Math.ceil(r.bottom/CH)+1;}
  updIsland();

  // Elliptical fade parameters (updated each frame from card rect)
  var ccx=0,ccy=0,crx=1,cry=1;
  function updFade(){
    var r=cardEl.getBoundingClientRect();
    ccx=(r.left+r.right)/2/CW;
    ccy=(r.top+r.bottom)/2/CH;
    crx=r.width/2/CW+3;
    cry=r.height/2/CH+2;
  }
  updFade();

  var grid=new Float32Array(COLS*ROWS);
  var bgEl=document.getElementById('bg');
  var rowEls=[];
  for(var r=0;r<ROWS;r++){var d=document.createElement('div');d.className='r';bgEl.appendChild(d);rowEls.push(d);}

  // name handled by CSS animation

  var fc=0;
  function render(){
    fc++;
    if(fc%30===0){updIsland();updFade();}
    // Decay
    for(var i=0;i<grid.length;i++) grid[i]*=0.88;
    // Advance drops
    for(var c=0;c<COLS;c++){
      var d=drops[c];
      if(mouseOn){
        var cx=c*CW+CW/2, cy=d.y*CH;
        var dx=cx-mouseX, dy=cy-mouseY;
        var dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<120) d.speed=Math.max(0.1,d.speed*0.95);
        else d.speed=Math.min(1.2,d.speed*1.01);
      }
      d.y+=d.speed;
      if(d.y-d.len>ROWS){d.y=-d.len;d.speed=0.3+Math.random()*0.7;d.len=4+Math.random()*12|0;}
      for(var t=0;t<d.len;t++){
        var row=Math.floor(d.y)-t;
        if(row<0||row>=ROWS) continue;
        var brightness=(1-t/d.len);
        grid[row*COLS+c]=Math.max(grid[row*COLS+c],brightness);
      }
    }
    // Cursor glow
    if(mouseOn){
      var mc=Math.floor(mouseX/CW), mr=Math.floor(mouseY/CH);
      for(var dy=-8;dy<=8;dy++)for(var dx=-8;dx<=8;dx++){
        var rr=mr+dy,cc=mc+dx;
        if(rr<0||rr>=ROWS||cc<0||cc>=COLS)continue;
        var d=Math.sqrt(dx*dx+dy*dy);
        if(d<8) grid[rr*COLS+cc]=Math.max(grid[rr*COLS+cc],(1-d/8)*0.5);
      }
    }
    // Render
    for(var row=0;row<ROWS;row++){
      var line='';
      for(var col=0;col<COLS;col++){
        var v=grid[row*COLS+col];
        // Elliptical fade
        var ndx=(col-ccx)/crx;
        var ndy=(row-ccy)/cry;
        var nd=ndx*ndx+ndy*ndy;
        var fade=nd<1?1:1;
        v*=fade;
        if(v<0.03){line+=' ';continue;}
        var ai=Math.max(1,Math.min(10,Math.round(v*10)));
        var hash=((row*131+col*997+(fc>>2))*2654435761)>>>0;
        var ch=GLYPHS[hash%GLYPHS.length];
        line+='<span class="a'+ai+'">'+ch+'</span>';
      }
      rowEls[row].innerHTML=line;
    }
    requestAnimationFrame(render);
  }
  requestAnimationFrame(render);
})();
</script>
</html>
