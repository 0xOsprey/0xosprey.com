<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>28 — frost dendrite</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#060608;overflow:hidden;cursor:crosshair}
canvas{position:fixed;inset:0;z-index:0}
.content{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;pointer-events:none;padding:48px}
.card{pointer-events:auto;text-align:center}
.name{position:relative;height:52px;margin-bottom:20px;white-space:nowrap}
.n1,.n2{position:absolute;top:0;left:50%;transform:translateX(-50%);font:40px/1 'Courier New',monospace;color:rgba(255,255,255,.85);text-shadow:0 0 8px #060608,0 0 22px #060608;letter-spacing:.04em}
.n1{animation:ns1 14s infinite}
.n2{animation:ns2 14s infinite;opacity:0}
@keyframes ns1{0%,40%{opacity:1;filter:blur(0)}55%{opacity:0;filter:blur(7px)}90%{opacity:0;filter:blur(7px)}100%{opacity:1;filter:blur(0)}}@keyframes ns2{0%,40%{opacity:0;filter:blur(7px)}55%{opacity:1;filter:blur(0)}90%{opacity:1;filter:blur(0)}100%{opacity:0;filter:blur(7px)}}
.icons{display:flex;gap:28px;align-items:center;justify-content:center}
.icons a{color:rgba(255,255,255,.85);opacity:1;transition:opacity .3s;text-decoration:none}
.icons a:hover{opacity:.45}
.icons svg{display:block;width:28px;height:28px;filter:drop-shadow(0 0 2px rgba(6,6,8,.9)) drop-shadow(0 0 6px rgba(6,6,8,.5))}
</style></head><body>
<canvas id="c"></canvas>
<div class="content"><div class="card" id="card"></div></div>
<script>
(function(){
var CW=4.8,CH=10,cvs=document.getElementById('c'),ctx=cvs.getContext('2d');
var W=innerWidth,H=innerHeight;cvs.width=W;cvs.height=H;
var COLS=Math.ceil(W/CW)+1,ROWS=Math.ceil(H/CH)+1;
ctx.font='8px Courier New';ctx.textBaseline='top';
var mx=-1,my=-1,mOn=false;
addEventListener('mousemove',function(e){mOn=true;mx=e.clientX;my=e.clientY});
addEventListener('mouseleave',function(){mOn=false});
var cardEl=document.getElementById('card');
cardEl.innerHTML='';

// Frost dendrite — hex-symmetric ice crystal growth across the screen.
// Tips grow along the six crystallographic axes (0°,60°,120°…) with gentle wobble.
// Branches split at ±60° from the parent arm. Ice stays — very high persistence.
// Cursor nucleates a fresh crystal at its position.

var THIN=['-','\\','|','/'];
var HEX=[0,1,2,3,4,5].map(function(i){return i*Math.PI/3;});
var MAX_E=320,SPEED=0.14,BRANCH_P=0.0032,WOBBLE=0.055,FADE=0.99985,MAX_TIPS=900;

var field=new Float32Array(COLS*ROWS);
var angf=new Float32Array(COLS*ROWS);
var tips=[];
var lastCrystal=0;

// Snap angle toward nearest hex direction
function hexSnap(a){
  // Normalize [0,2π)
  a=((a%(Math.PI*2))+Math.PI*2)%(Math.PI*2);
  var best=0,bestD=Infinity;
  for(var i=0;i<6;i++){
    var d=Math.abs(a-HEX[i]);
    if(d>Math.PI) d=Math.PI*2-d;
    if(d<bestD){bestD=d;best=i;}
  }
  // Blend: 80% snap, 20% original
  return HEX[best]*0.80+a*0.20;
}

function spawn(c,r,a,e){
  if(tips.length>=MAX_TIPS) return;
  tips.push({c:c,r:r,a:hexSnap(a),e:e||MAX_E});
}

function nucleate(pc,pr){
  for(var i=0;i<6;i++) spawn(pc,pr,HEX[i],MAX_E);
}

// Seed initial crystals
for(var i=0;i<7;i++) nucleate(3+Math.random()*(COLS-6),3+Math.random()*(ROWS-6));

function render(now){
  var t=now*.001;

  if(mOn&&t-lastCrystal>1.8){
    nucleate(mx/CW,my/CH);
    lastCrystal=t;
  }

  var alive=[];
  for(var i=0;i<tips.length;i++){
    var tip=tips[i];
    if(--tip.e<=0) continue;
    // Gentle wobble, then re-snap toward hex axis
    tip.a+=(Math.random()-.5)*WOBBLE;
    tip.a=hexSnap(tip.a);
    tip.c+=Math.cos(tip.a)*SPEED;
    tip.r+=Math.sin(tip.a)*SPEED;
    if(tip.c<0.5||tip.c>=COLS-.5||tip.r<0.5||tip.r>=ROWS-.5) continue;

    var ci=(tip.c+.5)|0,ri=(tip.r+.5)|0;
    var idx=ri*COLS+ci;
    var bright=0.50+(tip.e/MAX_E)*0.50;
    field[idx]=Math.min(1,field[idx]+bright*0.32);
    angf[idx]=tip.a;
    if(ci>0)       field[idx-1]   =Math.min(1,field[idx-1]   +bright*0.07);
    if(ci<COLS-1)  field[idx+1]   =Math.min(1,field[idx+1]   +bright*0.07);
    if(ri>0)       field[idx-COLS]=Math.min(1,field[idx-COLS]+bright*0.07);
    if(ri<ROWS-1)  field[idx+COLS]=Math.min(1,field[idx+COLS]+bright*0.07);

    if(tip.e>60&&Math.random()<BRANCH_P&&alive.length<MAX_TIPS){
      // Branch at exactly ±60° (hex)
      var sign=Math.random()>.5?1:-1;
      var ba=tip.a+sign*Math.PI/3;
      alive.push({c:tip.c,r:tip.r,a:hexSnap(ba),e:Math.floor(tip.e*.60)});
    }
    alive.push(tip);
  }
  tips=alive;

  if(tips.length<50){
    nucleate(3+Math.random()*(COLS-6),3+Math.random()*(ROWS-6));
  }

  for(var i=0;i<field.length;i++) field[i]*=FADE;

  ctx.fillStyle='#060608';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#ffffff';

  for(var row=0;row<ROWS;row++){
    for(var col=0;col<COLS;col++){
      var b=field[row*COLS+col];
      if(b<0.022) continue;
      b=Math.min(1,b);
      var a=angf[row*COLS+col];
      var ai=((( Math.round(a*4/Math.PI)%4)+4)%4);
      var ch=b>.82?'*':THIN[ai];
      ctx.globalAlpha=b;
      ctx.fillText(ch,col*CW,row*CH);
    }
  }
  ctx.globalAlpha=1;
  requestAnimationFrame(render);
}
requestAnimationFrame(render);
})();
</script></body></html>
