<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>6 — voronoi cells</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#060608;overflow:hidden;cursor:crosshair}
canvas{position:fixed;inset:0;z-index:0}
.content{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;pointer-events:none;padding:48px}
.card{pointer-events:auto;text-align:center}
.name{position:relative;height:52px;margin-bottom:20px;white-space:nowrap}
.n1,.n2{position:absolute;top:0;left:50%;transform:translateX(-50%);font:40px/1 'Courier New',monospace;color:rgba(255,255,255,.85);text-shadow:0 0 8px #060608,0 0 22px #060608,0 0 8px rgba(127,255,212,.12);letter-spacing:.04em}
.n1{animation:ns1 14s infinite}
.n2{animation:ns2 14s infinite;opacity:0}
@keyframes ns1{0%,40%{opacity:1;filter:blur(0)}55%{opacity:0;filter:blur(7px)}90%{opacity:0;filter:blur(7px)}100%{opacity:1;filter:blur(0)}}@keyframes ns2{0%,40%{opacity:0;filter:blur(7px)}55%{opacity:1;filter:blur(0)}90%{opacity:1;filter:blur(0)}100%{opacity:0;filter:blur(7px)}}
.icons{display:flex;gap:28px;align-items:center;justify-content:center}
.icons a{color:rgba(255,255,255,.85);opacity:1;transition:opacity .3s;text-decoration:none}
.icons a:hover{opacity:.4}
.icons svg{display:block;width:28px;height:28px;filter:drop-shadow(0 0 2px rgba(6,6,8,.9)) drop-shadow(0 0 6px rgba(6,6,8,.5))}
</style></head><body>
<canvas id="c"></canvas>
<div class="content"><div class="card" id="card"></div></div>
<script>
(function(){
var CW=4.8,CH=10,cvs=document.getElementById('c'),ctx=cvs.getContext('2d');
var W=innerWidth,H=innerHeight;cvs.width=W;cvs.height=H;
var COLS=Math.ceil(W/CW)+1,ROWS=Math.ceil(H/CH)+1;
ctx.font='8px Courier New';ctx.textBaseline='top';
var mx=-1,my=-1,mOn=false;
addEventListener('mousemove',function(e){mOn=true;mx=e.clientX;my=e.clientY});
addEventListener('mouseleave',function(){mOn=false});
addEventListener('touchstart',function(e){if(e.touches[0]){mOn=true;mx=e.touches[0].clientX;my=e.touches[0].clientY;}},{passive:true});addEventListener('touchmove',function(e){if(e.touches[0]){mOn=true;mx=e.touches[0].clientX;my=e.touches[0].clientY;}},{passive:true});
var cardEl=document.getElementById('card');
cardEl.innerHTML='';

// 12 seed points with sinusoidal motion
var NUM_SEEDS=12;
var seeds=[];
for(var i=0;i<NUM_SEEDS;i++){
  seeds.push({
    cx:0.1+0.8*Math.random(), cy:0.1+0.8*Math.random(),
    ax:0.04+0.1*Math.random(), ay:0.04+0.1*Math.random(),
    sx:0.15+0.35*Math.random(), sy:0.15+0.35*Math.random(),
    px:Math.random()*Math.PI*2, py:Math.random()*Math.PI*2
  });
}

// Edge characters
var edgeChars=['\u2502','\u2500','\u2571','\u2572','\u253C','\u2534','\u252C','\u2524','\u251C','+','*','\u00B7'];

// Fill characters per seed (different visual per cell region)
var fillSets=[
  ['\u00B7',' ',' '],
  ['.',' ',' '],
  [',',' ',' '],
  ['\u00B7','.',' '],
  [':',' ',' '],
  ['\u2022',' ',' '],
  ['-',' ',' '],
  ['~',' ',' '],
  ['\u00B7',',',' '],
  ['.',' ',' '],
  ['\u2022',' ',' '],
  ['\u00B7',' ',' ']
];


var CHARS=(function(){var seen={},out='';function add(c){if(c!==' '&&!seen[c]){seen[c]=1;out+=c;}}
  for(var i=0;i<edgeChars.length;i++)add(edgeChars[i]);
  for(var i=0;i<fillSets.length;i++)for(var j=0;j<fillSets[i].length;j++)add(fillSets[i][j]);
  return out;})();
var CIDX={};for(var i=0;i<CHARS.length;i++)CIDX[CHARS[i]]=i;

// Software glyph renderer: prerendered alpha masks stamped into a
// pixel buffer, one putImageData per frame instead of per-cell
// fillText. Visuals identical; far less canvas call overhead.
var GW=Math.ceil(CW)+2,GH=CH+4,GOX=1,GOY=2;
var masks=[],mbox=[];
(function(){
  var n=CHARS.length,mc=document.createElement('canvas');
  mc.width=GW*n;mc.height=GH;
  var x=mc.getContext('2d');
  x.font='8px Courier New';x.textBaseline='top';x.fillStyle='#fff';
  for(var i=0;i<n;i++)x.fillText(CHARS[i],i*GW+GOX,GOY);
  var d=x.getImageData(0,0,GW*n,GH).data;
  for(var i=0;i<n;i++){
    var m=new Uint8Array(GW*GH);
    var bx0=GW,bx1=-1,by0=GH,by1=-1;
    for(var yy=0;yy<GH;yy++)for(var xx=0;xx<GW;xx++){
      var a=d[((yy*GW*n)+(i*GW+xx))*4+3];
      m[yy*GW+xx]=a;
      if(a){if(xx<bx0)bx0=xx;if(xx>bx1)bx1=xx;if(yy<by0)by0=yy;if(yy>by1)by1=yy;}
    }
    masks.push(m);mbox.push([bx0,by0,bx1+1,by1+1]);
  }
})();
var img=ctx.createImageData(W,H);
var buf32=new Uint32Array(img.data.buffer);
var inten=new Uint8Array(W*H);
var BG=0xFF080606;
var LUT=new Uint32Array(256);
for(var i=0;i<256;i++){
  var lr=Math.round(6+(255-6)*i/255),lg=Math.round(6+(255-6)*i/255),lb=Math.round(8+(255-8)*i/255);
  LUT[i]=(255<<24)|(lb<<16)|(lg<<8)|lr;
}
function stamp(mi,a255,sx,sy){
  var m=masks[mi],bx=mbox[mi];
  var xs=bx[0],ys=bx[1],xe=bx[2],ye=bx[3];
  if(sx+xs<0)xs=-sx;if(sy+ys<0)ys=-sy;
  if(sx+xe>W)xe=W-sx;if(sy+ye>H)ye=H-sy;
  for(var yy=ys;yy<ye;yy++){
    var ro=(sy+yy)*W+sx,mo2=yy*GW;
    for(var xx=xs;xx<xe;xx++){
      var ma=m[mo2+xx];
      if(!ma)continue;
      var v=(ma*a255)>>8;
      var p=ro+xx;
      if(v>inten[p]){inten[p]=v;buf32[p]=LUT[v];}
    }
  }
}
// Pseudo-random based on position for stable fill variation
function cellHash(col,row){
  var n=col*374761393+row*668265263;
  n=(n^(n>>13))*1274126177;
  return((n^(n>>16))&0x7fffffff)/0x7fffffff;
}

var cardRect=cardEl.getBoundingClientRect();
var ccx,ccy,crx,cry;
function updateCard(){
  cardRect=cardEl.getBoundingClientRect();
  ccx=(cardRect.left+cardRect.right)/2/CW;
  ccy=(cardRect.top+cardRect.bottom)/2/CH;
  crx=(cardRect.width/2/CW)+3;
  cry=(cardRect.height/2/CH)+2;
}
updateCard();
var frameCount=0;

// Precompute distance threshold scaled to cell dimensions
var EDGE_THRESHOLD=1.8;

function render(now){
  frameCount++;
  if(frameCount%60===0)updateCard();
  var t=now*0.001;

  // Compute current seed positions in cell coordinates
  var sx=new Float32Array(NUM_SEEDS+1);
  var sy=new Float32Array(NUM_SEEDS+1);
  var numActive=NUM_SEEDS;
  for(var i=0;i<NUM_SEEDS;i++){
    var s=seeds[i];
    sx[i]=(s.cx+Math.sin(t*s.sx+s.px)*s.ax)*COLS;
    sy[i]=(s.cy+Math.sin(t*s.sy+s.py)*s.ay)*ROWS;
  }

  // Add cursor as extra seed
  if(mOn){
    sx[NUM_SEEDS]=mx/CW;
    sy[NUM_SEEDS]=my/CH;
    numActive=NUM_SEEDS+1;
  }

  inten.fill(0);buf32.fill(BG);

  for(var row=0;row<ROWS;row++){
    for(var col=0;col<COLS;col++){
      // Card fade
      var ndx=(col-ccx)/crx,ndy=(row-ccy)/cry;
      var nd=ndx*ndx+ndy*ndy;
      var fade=nd<1?1:1;
      if(fade<0.02)continue;

      // Find closest and second closest seed
      // Weight column distance by CW/CH ratio for aspect-correct cells
      var aspect=CW/CH;
      var closest=-1,closestDist=1e9,secondDist=1e9;
      for(var i=0;i<numActive;i++){
        var dx=(col-sx[i])*aspect;
        var dy=row-sy[i];
        var d=dx*dx+dy*dy; // use squared for comparison
        if(d<closestDist){
          secondDist=closestDist;
          closestDist=d;
          closest=i;
        } else if(d<secondDist){
          secondDist=d;
        }
      }

      // Edge detection: difference of sqrt distances
      var d1=Math.sqrt(closestDist);
      var d2=Math.sqrt(secondDist);
      var edgeDelta=d2-d1;

      var ch,brightness;
      if(edgeDelta<EDGE_THRESHOLD){
        // Edge cell
        var edgeIdx=Math.floor(cellHash(col,row)*edgeChars.length);
        ch=edgeChars[edgeIdx];
        // Brighter at the very edge, fade in and out
        brightness=0.35+0.5*(1-edgeDelta/EDGE_THRESHOLD);
      } else {
        // Fill cell
        var seedIdx=closest%fillSets.length;
        var fillSet=fillSets[seedIdx];
        var fillPick=Math.floor(cellHash(col+7,row+13)*fillSet.length);
        ch=fillSet[fillPick];
        if(ch===' ')continue;
        // Subtle fill, brighter near seed center
        brightness=0.06+0.12*(1-d1/80);
        if(brightness<0.03)continue;
      }

      brightness*=fade;
      if(brightness<0.02)continue;
      brightness=Math.min(1,brightness);

      stamp(CIDX[ch],(brightness*255)|0,((col*CW+0.5)|0)-GOX,row*CH-GOY);
    }
  }
  ctx.putImageData(img,0,0);
  requestAnimationFrame(render);
}
requestAnimationFrame(render);
})();
</script></body></html>
