<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>53 — tempest</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#060608;overflow:hidden;cursor:crosshair}
canvas{position:fixed;inset:0;z-index:0}
.content{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;pointer-events:none;padding:48px}
.card{pointer-events:auto;text-align:center}
</style></head><body>
<canvas id="c"></canvas>
<div class="content"><div class="card" id="card"></div></div>
<script>
(function(){
var CW=4.8,CH=10,cvs=document.getElementById('c'),ctx=cvs.getContext('2d');
var W=innerWidth,H=innerHeight;cvs.width=W;cvs.height=H;
var COLS=Math.ceil(W/CW)+1,ROWS=Math.ceil(H/CH)+1;
ctx.font='8px Courier New';ctx.textBaseline='top';
var mx=W/2,my=H/2,mOn=false;
addEventListener('mousemove',function(e){mOn=true;mx=e.clientX;my=e.clientY;});
addEventListener('mouseleave',function(){mOn=false;});
addEventListener('touchstart',function(e){if(e.touches[0]){mOn=true;mx=e.touches[0].clientX;my=e.touches[0].clientY;}},{passive:true});
addEventListener('touchmove',function(e){if(e.touches[0]){mOn=true;mx=e.touches[0].clientX;my=e.touches[0].clientY;}},{passive:true});
document.getElementById('card').innerHTML='';

// Tempest — convective lightning storm.
// Fractal bolts generated by midpoint displacement arc from cloud
// to earth (or cursor). Each strike flashes the whole sky, then
// fades to violet afterimage. Secondary bolt echoes follow.
// Move the cursor — it becomes the lightning rod.

var bright=new Float32Array(COLS*ROWS);
var angF=new Float32Array(COLS*ROWS);
var flashLv=0;
var frame=0;
var nextStrike=30;
var DECAY=0.87;

// All segments: {x0,y0,x1,y1,b}
var segs=[];

function boltSeg(x0,y0,x1,y1,disp,depth,brp){
  if(depth<=0||disp<0.6){segs.push([x0,y0,x1,y1,2.2]);return;}
  var mx2=(x0+x1)/2+(Math.random()-0.5)*disp;
  var my2=(y0+y1)/2+(Math.random()-0.5)*disp*0.45;
  boltSeg(x0,y0,mx2,my2,disp*0.62,depth-1,brp*0.75);
  boltSeg(mx2,my2,x1,y1,disp*0.62,depth-1,brp*0.75);
  if(Math.random()<brp){
    var bd=disp*0.55,ba=(Math.random()-0.5)*0.9;
    var dx=x1-x0,dy=y1-y0;
    var bx=mx2+Math.cos(ba)*dx*0.4-Math.sin(ba)*dy*0.15;
    var by=my2+Math.sin(ba)*dx*0.15+Math.cos(ba)*dy*0.35+Math.random()*disp*0.4;
    boltSeg(mx2,my2,bx,by,bd,depth-2,0);
  }
}

function drawSegs(scale){
  for(var s=0;s<segs.length;s++){
    var sg=segs[s];
    var x0=sg[0],y0=sg[1],x1=sg[2],y1=sg[3],bv=sg[4]*scale;
    var ang=Math.atan2((y1-y0),(x1-x0));
    // Bresenham
    var dx=Math.abs(x1-x0)|0,dy=Math.abs(y1-y0)|0;
    var sx=x0<x1?1:-1,sy=y0<y1?1:-1;
    var ex=dx-dy,cx=Math.round(x0),cy=Math.round(y0);
    for(var iter=0;iter<300;iter++){
      if(cx>=0&&cx<COLS&&cy>=0&&cy<ROWS){
        var id=cy*COLS+cx;
        bright[id]=Math.min(3,bright[id]+bv);
        angF[id]=ang;
      }
      if(cx===Math.round(x1)&&cy===Math.round(y1)) break;
      var e2=2*ex;
      if(e2>-dy){ex-=dy;cx+=sx;}
      if(e2<dx){ex+=dx;cy+=sy;}
    }
  }
}

function strike(loud){
  segs=[];
  var sx=(0.05+Math.random()*0.9)*COLS;
  var tx=mOn?mx/CW:(0.1+Math.random()*0.8)*COLS;
  var ty=mOn?my/CH:ROWS*(0.7+Math.random()*0.3);
  boltSeg(sx,-1,tx,ty,COLS*0.11,6,0.45);
  drawSegs(1.0);
  if(loud!==false) flashLv=0.55;
  // Secondary echo bolt (dimmer, slightly offset)
  if(loud!==false&&Math.random()<0.6){
    segs=[];
    boltSeg(sx+(Math.random()-0.5)*5,-1,tx+(Math.random()-0.5)*4,ty,COLS*0.07,4,0.2);
    drawSegs(0.35);
  }
  nextStrike=100+Math.random()*220+(mOn?0:80);
}

// Heat lightning: dim distant flicker (no main bolt)
function heatFlash(){
  segs=[];
  var sx=Math.random()*COLS,tx=sx+(Math.random()-0.5)*COLS*0.3;
  var ey=ROWS*(0.2+Math.random()*0.5);
  boltSeg(sx,-1,tx,ey,COLS*0.08,3,0.2);
  drawSegs(0.18);
  flashLv=Math.max(flashLv,0.05);
}

// Initial strike
strike(false);

var CHARS=['─','╲','│','╱'];
var RAMP=['\u00B7','.',':',';','='];

var icx=W/2/CW,icy=H/2/CH,irx=32,iry=7;

function render(){
  frame++;

  if(frame>=nextStrike){
    if(Math.random()<0.3) heatFlash();
    else strike();
  }

  // Decay
  for(var i=0;i<bright.length;i++) bright[i]*=DECAY;
  flashLv*=0.78;

  ctx.fillStyle='#060608';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#ffffff';

  for(var row=0;row<ROWS;row++){
    for(var col=0;col<COLS;col++){
      var b=bright[row*COLS+col]+flashLv*0.12;
      if(b<0.03) continue;
      var ndx=(col-icx)/irx,ndy=(row-icy)/iry;
      var nd2=ndx*ndx+ndy*ndy;
      if(nd2<1) continue;
      if(nd2<1.6) b*=(nd2-1)/0.6;
      if(b<0.03) continue;
      b=Math.min(1,b);
      var ang=angF[row*COLS+col];
      var norm=((ang%Math.PI)+Math.PI)%Math.PI;
      var ch;
      if(b>0.85) ch=CHARS[(norm/Math.PI*4+0.5|0)%4];
      else ch=RAMP[Math.min(4,(b*5)|0)];
      ctx.globalAlpha=b;
      ctx.fillText(ch,col*CW,row*CH);
    }
  }
  ctx.globalAlpha=1;
  requestAnimationFrame(render);
}
requestAnimationFrame(render);
})();
</script></body></html>
