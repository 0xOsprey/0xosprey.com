<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>51 — swarm</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#060608;overflow:hidden;cursor:crosshair}
canvas{position:fixed;inset:0;z-index:0}
.content{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;pointer-events:none;padding:48px}
.card{pointer-events:auto;text-align:center}
</style></head><body>
<canvas id="c"></canvas>
<div class="content"><div class="card" id="card"></div></div>
<script>
(function(){
var CW=4.8,CH=10,cvs=document.getElementById('c'),ctx=cvs.getContext('2d');
var W=innerWidth,H=innerHeight;cvs.width=W;cvs.height=H;
var COLS=Math.ceil(W/CW)+1,ROWS=Math.ceil(H/CH)+1;
ctx.font='8px Courier New';ctx.textBaseline='top';
var mx=W/2,my=H/2,mOn=false;
addEventListener('mousemove',function(e){mOn=true;mx=e.clientX;my=e.clientY;});
addEventListener('mouseleave',function(){mOn=false;});
addEventListener('touchstart',function(e){if(e.touches[0]){mOn=true;mx=e.touches[0].clientX;my=e.touches[0].clientY;}},{passive:true});
addEventListener('touchmove',function(e){if(e.touches[0]){mOn=true;mx=e.touches[0].clientX;my=e.touches[0].clientY;}},{passive:true});
document.getElementById('card').innerHTML='';

// Swarm — a murmuration of locusts.
// Boid rules: separation keeps them from colliding, alignment
// synchronises heading, cohesion pulls to the mass center.
// Without a cursor, they circle in slow orbit; cursor is a lure
// they cannot resist. The mass breathes and contracts.

var N=280;
var px=new Float32Array(N),py=new Float32Array(N);
var vx=new Float32Array(N),vy=new Float32Array(N);
var SPEED=1.4;

for(var i=0;i<N;i++){
  px[i]=W*0.3+Math.random()*W*0.4;
  py[i]=H*0.3+Math.random()*H*0.4;
  var a=Math.random()*Math.PI*2;
  vx[i]=Math.cos(a)*SPEED;
  vy[i]=Math.sin(a)*SPEED;
}

// Density field for rendering
var field=new Float32Array(COLS*ROWS);

// Boid params
var SEP_R=18,ALI_R=40,COH_R=60;
var SEP_W=1.8,ALI_W=0.5,COH_W=0.5,CURSOR_W=0.9;
var CURSOR_R2=120*120;
var BORDER=60;

// Slow wandering attractor (used when no cursor)
var atx=W/2,aty=H/2,atVx=0.4,atVy=0.3,atT=0;

var frame=0;
function render(){
  frame++;
  atT+=0.003;
  atx=W/2+Math.cos(atT)*W*0.28+Math.sin(atT*0.7)*W*0.12;
  aty=H/2+Math.sin(atT*0.9)*H*0.22+Math.cos(atT*1.3)*H*0.1;
  var lx=mOn?mx:atx,ly=mOn?my:aty;

  for(var i=0;i<N;i++){
    var sx=0,sy=0,ax=0,ay=0,cx=0,cy=0;
    var ns=0,na=0,nc=0;
    for(var j=0;j<N;j++){
      if(i===j) continue;
      var dx=px[i]-px[j],dy=py[i]-py[j];
      var d2=dx*dx+dy*dy;
      if(d2<SEP_R*SEP_R&&d2>0){var d=Math.sqrt(d2);sx+=dx/d;sy+=dy/d;ns++;}
      if(d2<ALI_R*ALI_R){ax+=vx[j];ay+=vy[j];na++;}
      if(d2<COH_R*COH_R){cx+=px[j];cy+=py[j];nc++;}
    }
    var fx=0,fy=0;
    if(ns>0){fx+=SEP_W*(sx/ns);fy+=SEP_W*(sy/ns);}
    if(na>0){fx+=ALI_W*(ax/na-vx[i]);fy+=ALI_W*(ay/na-vy[i]);}
    if(nc>0){fx+=COH_W*(cx/nc-px[i])*0.004;fy+=COH_W*(cy/nc-py[i])*0.004;}

    // Cursor / wandering attractor
    var cdx=lx-px[i],cdy=ly-py[i];
    var cd2=cdx*cdx+cdy*cdy;
    if(cd2<CURSOR_R2&&cd2>0){var cd=Math.sqrt(cd2);fx+=CURSOR_W*(cdx/cd);fy+=CURSOR_W*(cdy/cd);}

    // Soft border repulsion
    if(px[i]<BORDER) fx+=(BORDER-px[i])*0.05;
    if(px[i]>W-BORDER) fx-=(px[i]-(W-BORDER))*0.05;
    if(py[i]<BORDER) fy+=(BORDER-py[i])*0.05;
    if(py[i]>H-BORDER) fy-=(py[i]-(H-BORDER))*0.05;

    vx[i]+=fx*0.12;
    vy[i]+=fy*0.12;
    var spd=Math.sqrt(vx[i]*vx[i]+vy[i]*vy[i]);
    if(spd>SPEED*2.2){vx[i]=vx[i]/spd*SPEED*2.2;vy[i]=vy[i]/spd*SPEED*2.2;}
    if(spd<SPEED*0.3&&spd>0){vx[i]=vx[i]/spd*SPEED*0.3;vy[i]=vy[i]/spd*SPEED*0.3;}
    px[i]+=vx[i];py[i]+=vy[i];
  }

  // Build density field
  for(var k=0;k<field.length;k++) field[k]=0;
  for(var i=0;i<N;i++){
    var gc=px[i]/CW,gr=py[i]/CH;
    var c0=Math.max(0,(gc-1.5)|0),c1=Math.min(COLS-1,(gc+1.5)|0);
    var r0=Math.max(0,(gr-1)|0),r1=Math.min(ROWS-1,(gr+1)|0);
    for(var r=r0;r<=r1;r++) for(var c=c0;c<=c1;c++){
      var dc=c-gc,dr=r-gr;
      field[r*COLS+c]+=Math.exp(-(dc*dc*0.7+dr*dr*1.5)*1.8)*0.55;
    }
  }

  // Island clear zone
  var icx=W/2/CW,icy=H/2/CH,irx=32,iry=7;

  ctx.fillStyle='#060608';ctx.fillRect(0,0,W,H);ctx.fillStyle='#ffffff';
  var RAMP=['\u00B7','.',':',';','*','#'];
  for(var row=0;row<ROWS;row++){
    for(var col=0;col<COLS;col++){
      var b=field[row*COLS+col];
      if(b<0.08) continue;
      var ndx=(col-icx)/irx,ndy=(row-icy)/iry;
      var nd2=ndx*ndx+ndy*ndy;
      if(nd2<1) continue;
      if(nd2<1.6) b*=(nd2-1)/0.6;
      b=Math.min(1,b);
      if(b<0.07) continue;
      var ci=Math.min(RAMP.length-1,(b*(RAMP.length))|0);
      ctx.globalAlpha=b;
      ctx.fillText(RAMP[ci],col*CW,row*CH);
    }
  }
  ctx.globalAlpha=1;
  requestAnimationFrame(render);
}
requestAnimationFrame(render);
})();
</script></body></html>
