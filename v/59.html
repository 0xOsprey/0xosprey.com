<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>59 — tide pool</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#060608;overflow:hidden;cursor:crosshair}
canvas{position:fixed;inset:0;z-index:0}
.content{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;pointer-events:none;padding:48px}
.card{pointer-events:auto;text-align:center}
</style></head><body>
<canvas id="c"></canvas>
<div class="content"><div class="card" id="card"></div></div>
<script>
(function(){
var CW=4.8,CH=10,cvs=document.getElementById('c'),ctx=cvs.getContext('2d');
var W=innerWidth,H=innerHeight;cvs.width=W;cvs.height=H;
var COLS=Math.ceil(W/CW)+1,ROWS=Math.ceil(H/CH)+1;
ctx.font='8px Courier New';ctx.textBaseline='top';
var mx=W/2,my=H/2,mOn=false;
addEventListener('mousemove',function(e){mOn=true;mx=e.clientX;my=e.clientY;});
addEventListener('mouseleave',function(){mOn=false;});
addEventListener('touchstart',function(e){if(e.touches[0]){mOn=true;mx=e.touches[0].clientX;my=e.touches[0].clientY;}},{passive:true});
addEventListener('touchmove',function(e){if(e.touches[0]){mOn=true;mx=e.touches[0].clientX;my=e.touches[0].clientY;}},{passive:true});
document.getElementById('card').innerHTML='';

// Tide pool — rock-rimmed basin seen from above. A starfish creeps,
// an anemone fans and retracts, a hermit crab patrols the rim, and
// a shoal of fry dart across. The cursor is a gull overhead: where
// its shadow falls, the anemone closes and the crab freezes.

var grid=new Float32Array(COLS*ROWS);
var ch=new Array(COLS*ROWS);
var shade=new Float32Array(COLS*ROWS);

// Pool bounds
var PX0=Math.round(COLS*0.1),PX1=Math.round(COLS*0.9);
var PY0=Math.round(ROWS*0.12),PY1=Math.round(ROWS*0.88);
var PCW=PX1-PX0,PCH=PY1-PY0;

// Static rock rim — generate once with jagged inset
var rocks=[]; // {x,y,c,g}
(function(){
  var ROCKC=['#','%','@','&','$'];
  function rim(x,y,d){
    var c=ROCKC[(Math.random()*ROCKC.length)|0];
    var g=0.55+Math.random()*0.35;
    rocks.push({x:x,y:y,c:c,g:g});
  }
  // top/bottom
  for(var x=PX0-2;x<=PX1+2;x++){
    for(var t=0;t<2+((Math.random()*2)|0);t++) rim(x+((Math.random()*3)|0)-1,PY0-1-t);
    for(var b=0;b<2+((Math.random()*2)|0);b++) rim(x+((Math.random()*3)|0)-1,PY1+1+b);
  }
  for(var y=PY0-1;y<=PY1+1;y++){
    for(var l=0;l<2+((Math.random()*2)|0);l++) rim(PX0-1-l+((Math.random()*2)|0),y);
    for(var r=0;r<2+((Math.random()*2)|0);r++) rim(PX1+1+r-((Math.random()*2)|0),y);
  }
})();

// Creatures
var star={x:PX0+PCW*0.3,y:PY0+PCH*0.55,rot:0,rotV:0.004};
var anem={x:PX0+PCW*0.68,y:PY0+PCH*0.4,open:1,tO:1};
var crab={x:PX0+3,y:PY1-2,vx:0.15,face:1,freeze:0};
var fry=[];
for(var i=0;i<5;i++) fry.push({x:PX0+Math.random()*PCW,y:PY0+Math.random()*PCH,vx:(Math.random()<0.5?-1:1)*0.4,vy:0,changeT:30+Math.random()*90});
var bubbles=[];

var frame=0;

function stamp(x,y,c,g){
  x=Math.round(x);y=Math.round(y);
  if(x<0||x>=COLS||y<0||y>=ROWS) return;
  var id=y*COLS+x;
  if(grid[id]<g){grid[id]=g;ch[id]=c;}
}

function shadow(){
  if(!mOn) return 0;
  var cx=Math.round(mx/CW),cy=Math.round(my/CH);
  var R=9;
  for(var dy=-R;dy<=R;dy++){
    for(var dx=-R;dx<=R;dx++){
      var d=Math.sqrt(dx*dx+dy*dy);
      if(d>R) continue;
      var x=cx+dx,y=cy+dy;
      if(x<0||x>=COLS||y<0||y>=ROWS) continue;
      shade[y*COLS+x]+=0.8*(1-d/R);
    }
  }
  return 1;
}

function step(){
  frame++;
  // Fade shade
  for(var i=0;i<shade.length;i++) shade[i]*=0.7;
  shadow();

  // Anemone reaction — check shade at its cell
  var ai=Math.round(anem.y)*COLS+Math.round(anem.x);
  var sh=shade[ai]||0;
  anem.tO=sh>0.2?0.15:1;
  anem.open+=(anem.tO-anem.open)*0.08;

  // Starfish slow rotation
  star.rot+=star.rotV;

  // Hermit crab walks rim. Freeze when shadow overhead.
  var ci=Math.round(crab.y)*COLS+Math.round(crab.x);
  var csh=shade[ci]||0;
  if(csh>0.25){ crab.freeze=20; }
  if(crab.freeze>0){ crab.freeze--; }
  else{
    crab.x+=crab.vx*crab.face;
    if(crab.x>PX1-2){crab.x=PX1-2;crab.face=-1;}
    if(crab.x<PX0+2){crab.x=PX0+2;crab.face=1;}
  }

  // Fry shoal
  for(var f=0;f<fry.length;f++){
    var fr=fry[f];
    fr.x+=fr.vx;fr.y+=fr.vy;
    fr.changeT--;
    var fi=Math.round(fr.y)*COLS+Math.round(fr.x);
    var fsh=shade[fi]||0;
    if(fsh>0.2){ fr.vx=-fr.vx; fr.changeT=40; }
    if(fr.changeT<=0||fr.x<PX0+1||fr.x>PX1-1||fr.y<PY0+1||fr.y>PY1-1){
      fr.vx=(Math.random()-0.5)*0.8;
      fr.vy=(Math.random()-0.5)*0.3;
      fr.changeT=30+Math.random()*90;
      if(fr.x<PX0+1) fr.x=PX0+1.5;
      if(fr.x>PX1-1) fr.x=PX1-1.5;
      if(fr.y<PY0+1) fr.y=PY0+1.5;
      if(fr.y>PY1-1) fr.y=PY1-1.5;
    }
  }

  // Bubbles
  if(Math.random()<0.08) bubbles.push({x:PX0+2+Math.random()*(PCW-4),y:PY1-1,age:0});
  for(var b=bubbles.length-1;b>=0;b--){
    bubbles[b].y-=0.12;bubbles[b].age++;
    bubbles[b].x+=Math.sin(bubbles[b].age*0.15)*0.08;
    if(bubbles[b].y<PY0+1) bubbles.splice(b,1);
  }
}

function render(){
  for(var i=0;i<grid.length;i++){grid[i]=0;ch[i]=null;}

  // Water surface — gentle ripple texture
  for(var y=PY0;y<=PY1;y++){
    for(var x=PX0;x<=PX1;x++){
      var v=Math.sin((x*0.35)+frame*0.04)*0.5 + Math.cos((y*0.45)-frame*0.03)*0.4 + Math.sin((x+y)*0.2+frame*0.02)*0.3;
      var g=0.06+Math.max(0,v)*0.16;
      var cc=v>0.9?'~':v>0.3?'-':'.';
      stamp(x,y,cc,g);
    }
  }

  // Rocks
  for(var r=0;r<rocks.length;r++){
    var rk=rocks[r];
    stamp(rk.x,rk.y,rk.c,rk.g);
  }

  step();

  // Starfish — 5 arms rotating
  for(var a=0;a<5;a++){
    var ang=star.rot+a*(Math.PI*2/5);
    for(var t=0;t<4;t++){
      var tx=star.x+Math.cos(ang)*t;
      var ty=star.y+Math.sin(ang)*t*0.6;
      var cArm=t===0?'*':t===1?'+':t===2?'/':'.';
      if(Math.abs(Math.cos(ang))<Math.abs(Math.sin(ang))*0.5) cArm=t===0?'*':t===1?'+':t===2?'|':'.';
      stamp(tx,ty,cArm,1-t*0.15);
    }
  }
  stamp(star.x,star.y,'*',1.4);

  // Anemone — column of polyps extending upward based on open state
  var polyps=['(',')','{','}','[',']'];
  var hmax=4;
  var hcur=hmax*anem.open;
  for(var p=0;p<hmax;p++){
    if(p>hcur) break;
    var py=anem.y-p;
    var sway=Math.sin(frame*0.06+p*0.5)*(p*0.2);
    stamp(anem.x-1+sway,py,polyps[(p+frame/20|0)%polyps.length],0.8-p*0.1);
    stamp(anem.x+sway,py,'|',0.9);
    stamp(anem.x+1+sway,py,polyps[(p+2+frame/20|0)%polyps.length],0.8-p*0.1);
  }
  stamp(anem.x,anem.y+1,'=',1.1);
  stamp(anem.x-1,anem.y+1,'=',0.8);
  stamp(anem.x+1,anem.y+1,'=',0.8);

  // Hermit crab
  var legA=(frame%12)<6?1:-1;
  var bx=Math.round(crab.x),by=Math.round(crab.y);
  stamp(bx-1,by,crab.face>0?'<':'/',1.2);
  stamp(bx,by,'o',1.3);
  stamp(bx+1,by,crab.face>0?'\\':'>',1.2);
  stamp(bx-2,by,legA>0?',':'.',0.7);
  stamp(bx+2,by,legA>0?',':'.',0.7);

  // Fry
  for(var f=0;f<fry.length;f++){
    var fr=fry[f];
    var fch=fr.vx>0?'>':'<';
    stamp(fr.x,fr.y,fch,0.95);
  }

  // Bubbles
  for(var b=0;b<bubbles.length;b++) stamp(bubbles[b].x,bubbles[b].y,'o',0.7);

  ctx.fillStyle='#060608';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#ffffff';
  for(var row=0;row<ROWS;row++){
    for(var col=0;col<COLS;col++){
      var id=row*COLS+col;
      var g=grid[id];if(g<0.05) continue;
      var sg=Math.min(0.75,shade[id]||0);
      var gg=g*(1-sg*0.7);
      if(gg<0.04) continue;
      ctx.globalAlpha=Math.min(1,gg);
      ctx.fillText(ch[id]||'.',col*CW,row*CH);
    }
  }
  ctx.globalAlpha=1;
  requestAnimationFrame(render);
}
requestAnimationFrame(render);
})();
</script></body></html>
