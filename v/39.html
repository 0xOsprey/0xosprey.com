<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>39 — falling leaves</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#060608;overflow:hidden;cursor:crosshair}
canvas{position:fixed;inset:0;z-index:0}
.content{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;pointer-events:none;padding:48px}
.card{pointer-events:auto;text-align:center}
</style></head><body>
<canvas id="c"></canvas>
<div class="content"><div class="card" id="card"></div></div>
<script>
(function(){
var CW=4.8,CH=10,cvs=document.getElementById('c'),ctx=cvs.getContext('2d');
var W=innerWidth,H=innerHeight;cvs.width=W;cvs.height=H;
var COLS=Math.ceil(W/CW)+1,ROWS=Math.ceil(H/CH)+1;
ctx.font='8px Courier New';ctx.textBaseline='top';
var mx=-1,my=-1,mOn=false;
addEventListener('mousemove',function(e){mOn=true;mx=e.clientX;my=e.clientY});
addEventListener('mouseleave',function(){mOn=false});
document.getElementById('card').innerHTML='';

// Falling leaves — sparse tumbling descent.
// Each leaf has angular momentum, catching a slow-shifting wind.
// Ghostly trails from very slow field decay.
// Cursor disturbs leaves that pass nearby.

var CHARS=['\u2500','\u2572','\u2502','\u2571']; // ─ ╲ │ ╱
var N=28;
var lx=new Float32Array(N),ly=new Float32Array(N);
var lvx=new Float32Array(N),lvy=new Float32Array(N);
var lang=new Float32Array(N),lav=new Float32Array(N);
var lsize=new Float32Array(N);

function spawn(i,fromTop){
  lx[i]=Math.random()*W;
  ly[i]=fromTop?-15:Math.random()*H;
  lvx[i]=(Math.random()-0.5)*1.5;
  lvy[i]=0.4+Math.random()*0.9;
  lang[i]=Math.random()*Math.PI;
  lav[i]=(Math.random()-0.5)*0.05;
  lsize[i]=0.9+Math.random()*0.9;
}
for(var i=0;i<N;i++) spawn(i,false);

var field=new Float32Array(COLS*ROWS);
var angField=new Float32Array(COLS*ROWS);
var DECAY=0.984;
var WIND_T=0;

function render(){
  WIND_T+=0.003;
  var windX=Math.sin(WIND_T)*0.7+Math.sin(WIND_T*0.37)*0.3;

  for(var i=0;i<field.length;i++) field[i]*=DECAY;

  for(var i=0;i<N;i++){
    lvx[i]+=(windX-lvx[i])*0.04;
    lx[i]+=lvx[i]; ly[i]+=lvy[i];
    lang[i]+=lav[i];
    lav[i]+=(Math.random()-0.5)*0.003;
    lav[i]*=0.98;

    // Cursor gust
    if(mOn){
      var dx=lx[i]-mx,dy=ly[i]-my;
      if(dx*dx+dy*dy<70*70){ lvx[i]+=dx*0.015; lav[i]+=0.04*(Math.random()-0.5); }
    }

    if(ly[i]>H+20||lx[i]<-80||lx[i]>W+80) spawn(i,true);

    var gc=lx[i]/CW,gr=ly[i]/CH,sr=lsize[i]*1.1;
    var c0=Math.max(0,Math.floor(gc-sr-1)),c1=Math.min(COLS-1,Math.ceil(gc+sr+1));
    var r0=Math.max(0,Math.floor(gr-sr-1)),r1=Math.min(ROWS-1,Math.ceil(gr+sr+1));
    var inv=1/(sr*sr+0.1);
    for(var r=r0;r<=r1;r++) for(var c=c0;c<=c1;c++){
      var dc=c-gc,dr=r-gr;
      var g=Math.exp(-(dc*dc+dr*dr)*inv)*0.72;
      var idx=r*COLS+c;
      if(g>field[idx]*0.4) angField[idx]=lang[i];
      field[idx]=Math.min(1.5,field[idx]+g);
    }
  }

  ctx.fillStyle='#060608';ctx.fillRect(0,0,W,H);ctx.fillStyle='#ffffff';
  for(var row=0;row<ROWS;row++){
    for(var col=0;col<COLS;col++){
      var b=Math.min(1,field[row*COLS+col]);
      if(b<0.04) continue;
      var ang=angField[row*COLS+col];
      var di=(((ang%Math.PI+Math.PI)%Math.PI)/Math.PI*4|0)%4;
      ctx.globalAlpha=b;
      ctx.fillText(CHARS[di],col*CW,row*CH);
    }
  }
  ctx.globalAlpha=1;
  requestAnimationFrame(render);
}
requestAnimationFrame(render);
})();
</script></body></html>
