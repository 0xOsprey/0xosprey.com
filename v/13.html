<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>13 — voronoi cells</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#060608;overflow:hidden;cursor:crosshair}
canvas{position:fixed;inset:0;z-index:0}
.content{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;pointer-events:none;padding:48px}
.card{pointer-events:auto;text-align:center}
.name{position:relative;height:38px;margin-bottom:20px;white-space:nowrap}
.n1,.n2{position:absolute;top:0;left:50%;transform:translateX(-50%);font:28px/1 'Courier New',monospace;color:rgba(255,255,255,.85);text-shadow:0 0 8px #060608,0 0 22px #060608,0 0 8px rgba(127,255,212,.12);letter-spacing:.04em}
.n1{animation:ns 14s infinite}
.n2{animation:ns 14s 7s infinite;opacity:0;filter:blur(7px)}
@keyframes ns{0%,38%{opacity:1;filter:blur(0)}52%{opacity:0;filter:blur(7px)}88%{opacity:0;filter:blur(7px)}100%{opacity:1;filter:blur(0)}}
.icons{display:flex;gap:28px;align-items:center;justify-content:center}
.icons a{color:rgba(255,255,255,.85);opacity:.4;transition:opacity .3s;text-decoration:none}
.icons a:hover{opacity:1}
.icons svg{display:block;width:28px;height:28px}
</style></head><body>
<canvas id="c"></canvas>
<div class="content"><div class="card" id="card"></div></div>
<script>
(function(){
var CW=4.8,CH=10,cvs=document.getElementById('c'),ctx=cvs.getContext('2d');
var W=innerWidth,H=innerHeight;cvs.width=W;cvs.height=H;
var COLS=Math.ceil(W/CW)+1,ROWS=Math.ceil(H/CH)+1;
ctx.font='8px Courier New';ctx.textBaseline='top';
var mx=-1,my=-1,mOn=false;
addEventListener('mousemove',function(e){mOn=true;mx=e.clientX;my=e.clientY});
addEventListener('mouseleave',function(){mOn=false});
var cardEl=document.getElementById('card');
cardEl.innerHTML='<div class="name"><span class="n1">Joe Coll</span><span class="n2">Osprey</span></div><div class="icons"><a href="https://x.com/0xOsprey" title="X" target="_blank"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.736l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></a><a href="https://github.com/0xOsprey" title="GitHub" target="_blank"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.342-3.369-1.342-.454-1.155-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0112 6.844a9.59 9.59 0 012.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg></a><a href="mailto:hi@0xosprey.com" title="Email"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg></a></div>';

// 12 seed points with sinusoidal motion
var NUM_SEEDS=12;
var seeds=[];
for(var i=0;i<NUM_SEEDS;i++){
  seeds.push({
    cx:0.1+0.8*Math.random(), cy:0.1+0.8*Math.random(),
    ax:0.04+0.1*Math.random(), ay:0.04+0.1*Math.random(),
    sx:0.15+0.35*Math.random(), sy:0.15+0.35*Math.random(),
    px:Math.random()*Math.PI*2, py:Math.random()*Math.PI*2
  });
}

// Edge characters
var edgeChars=['\u2502','\u2500','\u2571','\u2572','\u253C','\u2534','\u252C','\u2524','\u251C','+','*','\u00B7'];

// Fill characters per seed (different visual per cell region)
var fillSets=[
  ['\u00B7',' ',' '],
  ['.',' ',' '],
  [',',' ',' '],
  ['\u00B7','.',' '],
  [':',' ',' '],
  ['\u2022',' ',' '],
  ['-',' ',' '],
  ['~',' ',' '],
  ['\u00B7',',',' '],
  ['.',' ',' '],
  ['\u2022',' ',' '],
  ['\u00B7',' ',' ']
];

// Pseudo-random based on position for stable fill variation
function cellHash(col,row){
  var n=col*374761393+row*668265263;
  n=(n^(n>>13))*1274126177;
  return((n^(n>>16))&0x7fffffff)/0x7fffffff;
}

var cardRect=cardEl.getBoundingClientRect();
var ccx,ccy,crx,cry;
function updateCard(){
  cardRect=cardEl.getBoundingClientRect();
  ccx=(cardRect.left+cardRect.right)/2/CW;
  ccy=(cardRect.top+cardRect.bottom)/2/CH;
  crx=(cardRect.width/2/CW)+3;
  cry=(cardRect.height/2/CH)+2;
}
updateCard();
var frameCount=0;

// Precompute distance threshold scaled to cell dimensions
var EDGE_THRESHOLD=1.8;

function render(now){
  frameCount++;
  if(frameCount%60===0)updateCard();
  var t=now*0.001;

  // Compute current seed positions in cell coordinates
  var sx=new Float32Array(NUM_SEEDS+1);
  var sy=new Float32Array(NUM_SEEDS+1);
  var numActive=NUM_SEEDS;
  for(var i=0;i<NUM_SEEDS;i++){
    var s=seeds[i];
    sx[i]=(s.cx+Math.sin(t*s.sx+s.px)*s.ax)*COLS;
    sy[i]=(s.cy+Math.sin(t*s.sy+s.py)*s.ay)*ROWS;
  }

  // Add cursor as extra seed
  if(mOn){
    sx[NUM_SEEDS]=mx/CW;
    sy[NUM_SEEDS]=my/CH;
    numActive=NUM_SEEDS+1;
  }

  ctx.fillStyle='#060608';ctx.fillRect(0,0,W,H);ctx.fillStyle='#ffffff';

  for(var row=0;row<ROWS;row++){
    for(var col=0;col<COLS;col++){
      // Card fade
      var ndx=(col-ccx)/crx,ndy=(row-ccy)/cry;
      var nd=ndx*ndx+ndy*ndy;
      var fade=nd<1?nd*nd:1;
      if(fade<0.02)continue;

      // Find closest and second closest seed
      // Weight column distance by CW/CH ratio for aspect-correct cells
      var aspect=CW/CH;
      var closest=-1,closestDist=1e9,secondDist=1e9;
      for(var i=0;i<numActive;i++){
        var dx=(col-sx[i])*aspect;
        var dy=row-sy[i];
        var d=dx*dx+dy*dy; // use squared for comparison
        if(d<closestDist){
          secondDist=closestDist;
          closestDist=d;
          closest=i;
        } else if(d<secondDist){
          secondDist=d;
        }
      }

      // Edge detection: difference of sqrt distances
      var d1=Math.sqrt(closestDist);
      var d2=Math.sqrt(secondDist);
      var edgeDelta=d2-d1;

      var ch,brightness;
      if(edgeDelta<EDGE_THRESHOLD){
        // Edge cell
        var edgeIdx=Math.floor(cellHash(col,row)*edgeChars.length);
        ch=edgeChars[edgeIdx];
        // Brighter at the very edge, fade in and out
        brightness=0.35+0.5*(1-edgeDelta/EDGE_THRESHOLD);
      } else {
        // Fill cell
        var seedIdx=closest%fillSets.length;
        var fillSet=fillSets[seedIdx];
        var fillPick=Math.floor(cellHash(col+7,row+13)*fillSet.length);
        ch=fillSet[fillPick];
        if(ch===' ')continue;
        // Subtle fill, brighter near seed center
        brightness=0.06+0.12*(1-d1/80);
        if(brightness<0.03)continue;
      }

      brightness*=fade;
      if(brightness<0.02)continue;
      brightness=Math.min(1,brightness);

      ctx.globalAlpha=brightness;
      ctx.fillText(ch,col*CW,row*CH);
    }
  }
  ctx.globalAlpha=1;
  requestAnimationFrame(render);
}
requestAnimationFrame(render);
})();
</script></body></html>
