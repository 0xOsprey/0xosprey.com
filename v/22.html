<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>22 — smoke</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#060608;overflow:hidden;cursor:crosshair}
canvas{position:fixed;inset:0;z-index:0}
.content{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;pointer-events:none}
.card{pointer-events:auto;text-align:left;padding:0}
.prompt{font:16px/1.5 'Courier New',monospace;color:#e8e0d8;text-shadow:0 0 6px #060608,0 0 14px #060608}
.links{margin-top:8px}
.links a{font:12px/1.6 'Courier New',monospace;color:rgba(232,224,216,.7);text-decoration:none;display:block;transition:color .3s;text-shadow:0 0 6px #060608,0 0 14px #060608}
.links a:hover{color:#e8e0d8}
.links a::before{content:'> ';color:rgba(232,224,216,.35)}
</style></head><body>
<canvas id="c"></canvas>
<div class="content"><div class="card" id="card"></div></div>
<script>
(function(){
var CW=4.8,CH=10,cvs=document.getElementById('c'),ctx=cvs.getContext('2d');
var W=innerWidth,H=innerHeight;cvs.width=W;cvs.height=H;
var COLS=Math.ceil(W/CW)+1,ROWS=Math.ceil(H/CH)+1;
ctx.font='8px Courier New';ctx.textBaseline='top';
var mx=-1,my=-1,mOn=false,pmx=-1,pmy=-1;
addEventListener('mousemove',function(e){mOn=true;pmx=mx;pmy=my;mx=e.clientX;my=e.clientY;if(pmx<0){pmx=mx;pmy=my;}});
addEventListener('mouseleave',function(){mOn=false});
var cardEl=document.getElementById('card');
cardEl.innerHTML='<div class="prompt">Joe Coll</div><div class="links"><a href="https://x.com/0xOsprey">x.com/0xOsprey</a><a href="https://github.com/0xOsprey">github.com/0xOsprey</a><a href="https://t.me/OspreyJoe">t.me/OspreyJoe</a><a href="mailto:hi@0xosprey.com">hi@0xosprey.com</a></div>';

var RAMP=' .\u00B7:\u2591\u2592\u2593\u2588';
var N=COLS*ROWS;

// Fields
var dens=new Float32Array(N);
var dens2=new Float32Array(N);
var vx=new Float32Array(N);
var vy=new Float32Array(N);
var vx2=new Float32Array(N);
var vy2=new Float32Array(N);

// Emitters: 3 sources near bottom
var emitters=[];
var numEmitters=3;
for(var e=0;e<numEmitters;e++){
  emitters.push({
    col:Math.floor(COLS*0.2+COLS*0.6*(e/(numEmitters-1))),
    row:ROWS-3,
    strength:0.35,
    vyBase:-0.8
  });
}

function idx(c,r){return r*COLS+c;}

// Bilinear sample from a field
function sample(field,x,y){
  // x,y in col/row space (fractional)
  if(x<0)x=0;if(x>COLS-1.001)x=COLS-1.001;
  if(y<0)y=0;if(y>ROWS-1.001)y=ROWS-1.001;
  var ix=Math.floor(x),iy=Math.floor(y);
  var fx=x-ix,fy=y-iy;
  var ix1=Math.min(ix+1,COLS-1),iy1=Math.min(iy+1,ROWS-1);
  return field[iy*COLS+ix]*(1-fx)*(1-fy)
        +field[iy*COLS+ix1]*fx*(1-fy)
        +field[iy1*COLS+ix]*(1-fx)*fy
        +field[iy1*COLS+ix1]*fx*fy;
}

// Diffuse: average with neighbors
function diffuse(src,dst,amt){
  for(var r=1;r<ROWS-1;r++){
    for(var c=1;c<COLS-1;c++){
      var i=r*COLS+c;
      var avg=(src[i-1]+src[i+1]+src[(r-1)*COLS+c]+src[(r+1)*COLS+c])*0.25;
      dst[i]=src[i]*(1-amt)+avg*amt;
    }
  }
  // Edges: copy
  for(var c=0;c<COLS;c++){dst[c]=src[c]*0.5;dst[(ROWS-1)*COLS+c]=src[(ROWS-1)*COLS+c]*0.5;}
  for(var r=0;r<ROWS;r++){dst[r*COLS]=src[r*COLS]*0.5;dst[r*COLS+COLS-1]=src[r*COLS+COLS-1]*0.5;}
}

// Advect: trace back through velocity field
function advect(field,dst,velx,vely,dt){
  for(var r=0;r<ROWS;r++){
    for(var c=0;c<COLS;c++){
      var i=r*COLS+c;
      var srcx=c-velx[i]*dt;
      var srcy=r-vely[i]*dt;
      dst[i]=sample(field,srcx,srcy);
    }
  }
}

var t=0;

function simulate(){
  t++;

  // Add emitter sources
  for(var e=0;e<emitters.length;e++){
    var em=emitters[e];
    var wobble=Math.sin(t*0.03+e*2.1)*2;
    for(var dr=-2;dr<=2;dr++){
      for(var dc=-2;dc<=2;dc++){
        var rr=em.row+dr,cc=em.col+dc+Math.round(wobble);
        if(rr>=0&&rr<ROWS&&cc>=0&&cc<COLS){
          var dist=Math.sqrt(dr*dr+dc*dc);
          if(dist<2.5){
            var falloff=1-dist/2.5;
            var i=rr*COLS+cc;
            dens[i]+=em.strength*falloff;
            vy[i]+=em.vyBase*falloff*0.5;
            // Slight lateral turbulence
            vx[i]+=(Math.random()-0.5)*0.15*falloff;
          }
        }
      }
    }
  }

  // Buoyancy: upward force proportional to density
  for(var i=0;i<N;i++){
    vy[i]-=dens[i]*0.06;
  }

  // Random turbulence
  for(var i=0;i<N;i++){
    vx[i]+=(Math.random()-0.5)*0.008;
    vy[i]+=(Math.random()-0.5)*0.005;
  }

  // Cursor interaction: wind force + smoke trail
  if(mOn){
    var mcol=mx/CW,mrow=my/CH;
    var dvx=(mx-pmx)/CW,dvy=(my-pmy)/CH;
    var cursorRad=18;
    var cr2=cursorRad*cursorRad;
    var startR=Math.max(0,Math.floor(mrow-cursorRad));
    var endR=Math.min(ROWS-1,Math.ceil(mrow+cursorRad));
    var startC=Math.max(0,Math.floor(mcol-cursorRad));
    var endC=Math.min(COLS-1,Math.ceil(mcol+cursorRad));
    for(var r=startR;r<=endR;r++){
      for(var c=startC;c<=endC;c++){
        var dr=r-mrow,dc=c-mcol;
        var d2=dr*dr+dc*dc;
        if(d2<cr2){
          var falloff=1-Math.sqrt(d2)/cursorRad;
          falloff*=falloff;
          var i=r*COLS+c;
          vx[i]+=dvx*falloff*2.0;
          vy[i]+=dvy*falloff*2.0;
          dens[i]+=0.18*falloff;
        }
      }
    }
    // Shockwave ripple: fast cursor movement creates an outward ring of force
    var dvMag=Math.sqrt(dvx*dvx+dvy*dvy);
    if(dvMag>0.5){
      var shR=20,shW=8,shStr=Math.min(dvMag*1.4,6.0);
      var sR0=Math.max(0,Math.floor(mrow-shR-shW));
      var sR1=Math.min(ROWS-1,Math.ceil(mrow+shR+shW));
      var sC0=Math.max(0,Math.floor(mcol-shR-shW));
      var sC1=Math.min(COLS-1,Math.ceil(mcol+shR+shW));
      for(var rr=sR0;rr<=sR1;rr++){
        for(var cc=sC0;cc<=sC1;cc++){
          var ddr=rr-mrow,ddc=cc-mcol;
          var dd=Math.sqrt(ddr*ddr+ddc*ddc);
          var ring=1-Math.abs(dd-shR)/shW;
          if(ring<=0)continue;
          ring*=ring;
          var ii=rr*COLS+cc;
          if(dd>0.1){vx[ii]+=(ddc/dd)*ring*shStr;vy[ii]+=(ddr/dd)*ring*shStr;}
          dens[ii]+=0.22*ring;
        }
      }
    }
    pmx=mx;pmy=my;
  }

  // Diffuse velocity
  diffuse(vx,vx2,0.15);var tmp=vx;vx=vx2;vx2=tmp;
  diffuse(vy,vy2,0.15);tmp=vy;vy=vy2;vy2=tmp;

  // Advect velocity by itself
  advect(vx,vx2,vx,vy,1.0);tmp=vx;vx=vx2;vx2=tmp;
  advect(vy,vy2,vx,vy,1.0);tmp=vy;vy=vy2;vy2=tmp;

  // Advect density
  advect(dens,dens2,vx,vy,1.0);tmp=dens;dens=dens2;dens2=tmp;

  // Diffuse density
  diffuse(dens,dens2,0.08);tmp=dens;dens=dens2;dens2=tmp;

  // Decay density and dampen velocity
  for(var i=0;i<N;i++){
    dens[i]*=0.993;
    if(dens[i]<0.001)dens[i]=0;
    vx[i]*=0.99;
    vy[i]*=0.99;
  }
}

function render(){
  simulate();

  ctx.fillStyle='#060608';ctx.fillRect(0,0,W,H);ctx.fillStyle='#d4d0c8';

  var cardRect=cardEl.getBoundingClientRect();
  var ccx=(cardRect.left+cardRect.right)/2/CW;
  var ccy=(cardRect.top+cardRect.bottom)/2/CH;
  var crx=(cardRect.width/2/CW)+3;
  var cry=(cardRect.height/2/CH)+2;

  for(var row=0;row<ROWS;row++){
    for(var col=0;col<COLS;col++){
      var i=row*COLS+col;
      var brightness=dens[i];

      // Card elliptical fade
      var ndx=(col-ccx)/crx,ndy=(row-ccy)/cry;
      var nd=ndx*ndx+ndy*ndy;
      var fade=nd<1?nd*nd:1;
      brightness*=fade;

      if(brightness<0.03)continue;
      brightness=Math.min(1,brightness);

      var ci=Math.min(RAMP.length-1,(brightness*RAMP.length)|0);
      var ch=RAMP[ci];
      if(ch===' ')continue;
      ctx.globalAlpha=brightness;
      ctx.fillText(ch,col*CW,row*CH);
    }
  }
  ctx.globalAlpha=1;
  requestAnimationFrame(render);
}
requestAnimationFrame(render);
})();
</script></body></html>
