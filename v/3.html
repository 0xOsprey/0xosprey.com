<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>3 — topographic</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#060608;overflow:hidden;cursor:crosshair}
canvas{position:fixed;inset:0;z-index:0}
.content{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;pointer-events:none;padding:48px}
.card{pointer-events:auto;text-align:center}
.name{position:relative;height:52px;margin-bottom:20px;white-space:nowrap}
.n1,.n2{position:absolute;top:0;left:50%;transform:translateX(-50%);font:40px/1 'Courier New',monospace;color:rgba(255,255,255,.85);text-shadow:0 0 6px #060608,0 0 16px #060608;letter-spacing:.04em}
.n1{animation:ns1 14s infinite}
.n2{animation:ns2 14s infinite;opacity:0}
@keyframes ns1{0%,40%{opacity:1;filter:blur(0)}55%{opacity:0;filter:blur(7px)}90%{opacity:0;filter:blur(7px)}100%{opacity:1;filter:blur(0)}}@keyframes ns2{0%,40%{opacity:0;filter:blur(7px)}55%{opacity:1;filter:blur(0)}90%{opacity:1;filter:blur(0)}100%{opacity:0;filter:blur(7px)}}
.icons{display:flex;gap:28px;align-items:center;justify-content:center}
.icons a{color:rgba(255,255,255,.85);opacity:1;transition:opacity .3s,color .3s;text-decoration:none}
.icons a:hover{opacity:.45;color:#d4c8a8}
.icons svg{display:block;width:28px;height:28px;filter:drop-shadow(0 0 2px rgba(6,6,8,.9)) drop-shadow(0 0 6px rgba(6,6,8,.5))}

</style></head><body>
<canvas id="c"></canvas>
<div class="content"><div class="card" id="card">

</div></div>
<script>

var CH=14,CW=7.2;
var COLS=Math.ceil(innerWidth/CW)+2,ROWS=Math.ceil(innerHeight/CH)+2;

var mouseX=-1,mouseY=-1,mouseOn=false;
document.addEventListener('mousemove',function(e){mouseOn=true;mouseX=e.clientX;mouseY=e.clientY});
document.addEventListener('mouseleave',function(){mouseOn=false});
document.addEventListener('touchmove',function(e){mouseOn=true;mouseX=e.touches[0].clientX;mouseY=e.touches[0].clientY},{passive:true});
document.addEventListener('touchstart',function(e){if(e.touches[0]){mouseOn=true;mouseX=e.touches[0].clientX;mouseY=e.touches[0].clientY;}},{passive:true});
document.addEventListener('touchend',function(){mouseOn=false});

var cardEl=document.getElementById('card');
var iC0=0,iR0=0,iC1=0,iR1=0;
function updIsland(){var r=cardEl.getBoundingClientRect();iC0=Math.floor(r.left/CW)-1;iR0=Math.floor(r.top/CH)-1;iC1=Math.ceil(r.right/CW)+1;iR1=Math.ceil(r.bottom/CH)+1;}
updIsland();

// Elliptical fade parameters
var ccx=0,ccy=0,crx=1,cry=1;
function updFade(){
  var r=cardEl.getBoundingClientRect();
  ccx=(r.left+r.right)/2/CW;
  ccy=(r.top+r.bottom)/2/CH;
  crx=r.width/2/CW+3;
  cry=r.height/2/CH+2;
}
updFade();

function hash(x,y){var n=x*374761393+y*668265263;n=(n^(n>>13))*1274126177;return(n^(n>>16))/2147483648;}
function smooth(x,y){var ix=Math.floor(x),iy=Math.floor(y),fx=x-ix,fy=y-iy;fx=fx*fx*(3-2*fx);fy=fy*fy*(3-2*fy);return hash(ix,iy)*(1-fx)*(1-fy)+hash(ix+1,iy)*fx*(1-fy)+hash(ix,iy+1)*(1-fx)*fy+hash(ix+1,iy+1)*fx*fy;}
function fbm(x,y){return smooth(x,y)*.5+smooth(x*2,y*2)*.3+smooth(x*4,y*4)*.15+smooth(x*8,y*8)*.05;}
var CONTOUR_CHARS=['·','-','─','=','≈','~','∿','+','#'];
var elevation=new Float32Array(COLS*ROWS);
var cvs=document.getElementById('c'),ctx=cvs.getContext('2d');
var W=innerWidth,H=innerHeight;cvs.width=W;cvs.height=H;
var ALPHA=[0,.06,.14,.22,.32,.44,.56,.68,.80,.90,1];

// Software glyph renderer: prerendered alpha masks stamped into a
// pixel buffer, one putImageData per frame instead of per-cell
// fillText. Visuals identical; far less canvas call overhead.
var CHARS=CONTOUR_CHARS.join('');
var GW=Math.ceil(CW)+2,GH=CH+4,GOX=1,GOY=2;
var masks=[],mbox=[];
(function(){
  var n=CHARS.length,mc=document.createElement('canvas');
  mc.width=GW*n;mc.height=GH;
  var x=mc.getContext('2d');
  x.font='12px Courier New';x.textBaseline='top';x.fillStyle='#fff';
  for(var i=0;i<n;i++)x.fillText(CHARS[i],i*GW+GOX,GOY);
  var d=x.getImageData(0,0,GW*n,GH).data;
  for(var i=0;i<n;i++){
    var m=new Uint8Array(GW*GH);
    var bx0=GW,bx1=-1,by0=GH,by1=-1;
    for(var yy=0;yy<GH;yy++)for(var xx=0;xx<GW;xx++){
      var a=d[((yy*GW*n)+(i*GW+xx))*4+3];
      m[yy*GW+xx]=a;
      if(a){if(xx<bx0)bx0=xx;if(xx>bx1)bx1=xx;if(yy<by0)by0=yy;if(yy>by1)by1=yy;}
    }
    masks.push(m);mbox.push([bx0,by0,bx1+1,by1+1]);
  }
})();
var img=ctx.createImageData(W,H);
var buf32=new Uint32Array(img.data.buffer);
var inten=new Uint8Array(W*H);
var BG=0xFF080606;
var LUT=new Uint32Array(256);
for(var i=0;i<256;i++){
  var lr=Math.round(6+(212-6)*i/255),lg=Math.round(6+(208-6)*i/255),lb=Math.round(8+(200-8)*i/255);
  LUT[i]=(255<<24)|(lb<<16)|(lg<<8)|lr;
}
function stamp(mi,a255,sx,sy){
  var m=masks[mi],bx=mbox[mi];
  var xs=bx[0],ys=bx[1],xe=bx[2],ye=bx[3];
  if(sx+xs<0)xs=-sx;if(sy+ys<0)ys=-sy;
  if(sx+xe>W)xe=W-sx;if(sy+ye>H)ye=H-sy;
  for(var yy=ys;yy<ye;yy++){
    var ro=(sy+yy)*W+sx,mo2=yy*GW;
    for(var xx=xs;xx<xe;xx++){
      var ma=m[mo2+xx];
      if(!ma)continue;
      var v=(ma*a255)>>8;
      var p=ro+xx;
      if(v>inten[p]){inten[p]=v;buf32[p]=LUT[v];}
    }
  }
}

// Hash-lattice cache: fbm octaves sample a small integer lattice of
// hash() values rebuilt per frame (a few thousand hashes) instead of
// calling hash() four times per octave per cell (hundreds of thousands).
function buildLat(m,xa,xb,ya,yb){
  var x0=Math.floor(xa*m),y0=Math.floor(ya*m);
  var w=Math.ceil(xb*m)-x0+2,h=Math.ceil(yb*m)-y0+2;
  var a=new Float32Array(w*h);
  for(var j=0;j<h;j++)for(var i=0;i<w;i++)a[j*w+i]=hash(x0+i,y0+j);
  return {a:a,w:w,x0:x0,y0:y0};
}
function sampleLat(L,x,y){
  var ix=Math.floor(x),iy=Math.floor(y);
  var fx=x-ix,fy=y-iy;
  fx=fx*fx*(3-2*fx);fy=fy*fy*(3-2*fy);
  var p=(iy-L.y0)*L.w+(ix-L.x0);
  var a=L.a[p],b=L.a[p+1],c=L.a[p+L.w],d=L.a[p+L.w+1];
  return a+(b-a)*fx+(c-a)*fy+(a-b-c+d)*fx*fy;
}

var fc=0;
function render(now){
  if(fc%30===0){updIsland();updFade();}
  fc++;
  var t=now*0.00008;
  // fbm via per-frame hash lattices (identical values, far fewer hashes)
  var xa=t,xb=t+COLS*0.03,ya=t*0.7,yb=t*0.7+ROWS*0.04;
  var L1=buildLat(1,xa,xb,ya,yb),L2=buildLat(2,xa,xb,ya,yb),
      L4=buildLat(4,xa,xb,ya,yb),L8=buildLat(8,xa,xb,ya,yb);
  var mc=mouseX/CW,mr=mouseY/CH;
  for(var row=0;row<ROWS;row++){
    var wy=row*0.04+t*0.7;
    var dy=row-mr;
    for(var col=0;col<COLS;col++){
      var wx=col*0.03+t;
      var e=sampleLat(L1,wx,wy)*.5+sampleLat(L2,wx*2,wy*2)*.3
           +sampleLat(L4,wx*4,wy*4)*.15+sampleLat(L8,wx*8,wy*8)*.05;
      if(mouseOn){
        var dx=col-mc;
        if(dx>-15&&dx<15&&dy>-15&&dy<15){
          var d=Math.sqrt(dx*dx+dy*dy);
          if(d<15)e+=0.15*(1-d/15);
        }
      }
      elevation[row*COLS+col]=e;
    }
  }
  var NUM_CONTOURS=12;
  inten.fill(0);buf32.fill(BG);
  for(var row=0;row<ROWS;row++){
    var rpy=row*CH-GOY;
    for(var col=0;col<COLS;col++){
      var h=elevation[row*COLS+col];
      var contourLevel=h*NUM_CONTOURS;
      var frac=contourLevel%1;
      var nearContour=Math.min(frac,1-frac);
      var hR=col<COLS-1?elevation[row*COLS+col+1]:h;
      var hD=row<ROWS-1?elevation[(row+1)*COLS+col]:h;
      var gx=hR-h,gy=hD-h;
      if(nearContour<0.12){
        var v=1-nearContour/0.12;
        // Elliptical fade
        var ndx=(col-ccx)/crx;
        var ndy=(row-ccy)/cry;
        var nd=ndx*ndx+ndy*ndy;
        var fade=nd<1?1:1;
        v*=fade;
        if(v<0.03)continue;
        var ci=Math.floor(contourLevel)%CONTOUR_CHARS.length;
        var ai=Math.max(1,Math.min(10,Math.round(v*8+2)));
        stamp(ci,(ALPHA[ai]*255)|0,((col*CW+0.5)|0)-GOX,rpy);
      }
    }
  }
  ctx.putImageData(img,0,0);
  requestAnimationFrame(render);
}
requestAnimationFrame(render);

</script></body></html>
