<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3 — block shade</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:#060608;overflow:hidden;cursor:crosshair}
  #bg{position:fixed;inset:0;z-index:0;user-select:none}
  .r{font:9px/11px 'Courier New',monospace;white-space:pre;height:11px;color:#d4d0c8}
  .a1{opacity:.06}.a2{opacity:.14}.a3{opacity:.22}.a4{opacity:.32}
  .a5{opacity:.44}.a6{opacity:.56}.a7{opacity:.68}.a8{opacity:.80}.a9{opacity:.90}.a10{opacity:1}
  .content{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;pointer-events:none;padding:48px}
  .card{pointer-events:auto;text-align:center}
  .name{position:relative;height:52px;margin-bottom:20px;white-space:nowrap}
  .n1,.n2{position:absolute;top:0;left:50%;transform:translateX(-50%);font:40px/1 'Courier New',monospace;color:rgba(255,255,255,.85);text-shadow:0 0 8px #060608,0 0 22px #060608;letter-spacing:.04em}
  .n1{animation:ns1 14s infinite}
  .n2{animation:ns2 14s infinite;opacity:0}
  @keyframes ns1{0%,40%{opacity:1;filter:blur(0)}55%{opacity:0;filter:blur(7px)}90%{opacity:0;filter:blur(7px)}100%{opacity:1;filter:blur(0)}}@keyframes ns2{0%,40%{opacity:0;filter:blur(7px)}55%{opacity:1;filter:blur(0)}90%{opacity:1;filter:blur(0)}100%{opacity:0;filter:blur(7px)}}
  .icons{display:flex;gap:28px;align-items:center;justify-content:center}
  .icons a{color:rgba(255,255,255,.85);opacity:1;transition:opacity .3s;text-decoration:none}
  .icons a:hover{opacity:.45}
  .icons svg{display:block;width:28px;height:28px;filter:drop-shadow(0 0 2px rgba(6,6,8,.9)) drop-shadow(0 0 6px rgba(6,6,8,.5))}

</style>
</head>
<body>
<div id="bg"></div>
<div class="content"><div class="card" id="card">
<div class="icons"><a href="https://x.com/0xOsprey" title="X" target="_blank"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.736l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></a><a href="https://github.com/0xOsprey" title="GitHub" target="_blank"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.342-3.369-1.342-.454-1.155-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0112 6.844a9.59 9.59 0 012.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg></a><a href="mailto:hi@0xosprey.com" title="Email"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg></a></div>
</div></div>
<script>
(function(){
  var CH=11,CW=5.4;
  var COLS=Math.ceil(innerWidth/CW)+2,ROWS=Math.ceil(innerHeight/CH)+2;
  var FOS=2,FCOLS=COLS*FOS,FROWS=ROWS*FOS;
  var DECAY=0.86,PN=300;
  var DIR=["░","░","░","░","░","░","░","░"];
  var INT=["░","░","▒","▒","▓","▓","█","█"];
  var mouseX=-1,mouseY=-1,mouseOn=false;
  document.addEventListener('mousemove',function(e){mouseOn=true;mouseX=e.clientX;mouseY=e.clientY});
  document.addEventListener('mouseleave',function(){mouseOn=false});
  document.addEventListener('touchmove',function(e){mouseOn=true;mouseX=e.touches[0].clientX;mouseY=e.touches[0].clientY},{passive:true});
  var cardEl=document.getElementById('card');
  var iC0=0,iR0=0,iC1=0,iR1=0,iFX0=0,iFY0=0,iFX1=0,iFY1=0;
  function updIsland(){var r=cardEl.getBoundingClientRect();iC0=Math.floor(r.left/CW)-1;iR0=Math.floor(r.top/CH)-1;iC1=Math.ceil(r.right/CW)+1;iR1=Math.ceil(r.bottom/CH)+1;iFX0=iC0*FOS;iFY0=iR0*FOS;iFX1=iC1*FOS;iFY1=iR1*FOS;}
  updIsland();

  // Elliptical fade parameters
  var ccx=0,ccy=0,crx=1,cry=1;
  function updFade(){
    var r=cardEl.getBoundingClientRect();
    ccx=(r.left+r.right)/2/CW;
    ccy=(r.top+r.bottom)/2/CH;
    crx=r.width/2/CW+3;
    cry=r.height/2/CH+2;
  }
  updFade();

  var fieldB=new Float32Array(FCOLS*FROWS);
  var fieldA=new Float32Array(FCOLS*FROWS);
  function makeStamp(radius,peak){var size=radius*2+1,data=new Float32Array(size*size);for(var y=0;y<size;y++)for(var x=0;x<size;x++){var dx=(x-radius)/radius,dy=(y-radius)/radius,d=Math.sqrt(dx*dx+dy*dy);if(d<1)data[y*size+x]=peak*(1-d*d);}return{data:data,size:size,radius:radius};}
  var pStamp=makeStamp(14,0.3);
  var aStamp=makeStamp(18,0.45);
  var cStamp=makeStamp(24,0.6);
  function splat(stamp,cx,cy,angle){var r=stamp.radius,x0=Math.round(cx)-r,y0=Math.round(cy)-r;for(var sy=0;sy<stamp.size;sy++){var fy=y0+sy;if(fy<0||fy>=FROWS)continue;for(var sx=0;sx<stamp.size;sx++){var fx=x0+sx;if(fx<0||fx>=FCOLS)continue;var v=stamp.data[sy*stamp.size+sx];var idx=fy*FCOLS+fx;if(v>fieldB[idx])fieldA[idx]=angle;fieldB[idx]+=v;}}}
  var particles=[];
  for(var i=0;i<PN;i++){var a=(i/PN)*Math.PI*2,r=Math.min(FCOLS,FROWS)*0.3;particles.push({x:FCOLS/2+Math.cos(a)*r,y:FROWS/2+Math.sin(a)*r,vx:0,vy:0});}
  function repel(px,py){var M=8,S=0.5;if(px<iFX0-M||px>iFX1+M||py<iFY0-M||py>iFY1+M)return null;var nx=Math.max(iFX0,Math.min(iFX1,px)),ny=Math.max(iFY0,Math.min(iFY1,py));var dx=px-nx,dy=py-ny,dist=Math.sqrt(dx*dx+dy*dy)||0.1;if(px>=iFX0&&px<=iFX1&&py>=iFY0&&py<=iFY1){var tl=px-iFX0,tr=iFX1-px,tt=py-iFY0,tb=iFY1-py,mn=Math.min(tl,tr,tt,tb);if(mn===tl)return{fx:-S*2,fy:0};if(mn===tr)return{fx:S*2,fy:0};if(mn===tt)return{fx:0,fy:-S*2};return{fx:0,fy:S*2};}if(dist>M)return null;var s=S*(1-dist/M);return{fx:(dx/dist)*s,fy:(dy/dist)*s};}

  var bgEl=document.getElementById('bg');
  var rowEls=[];
  for(var r=0;r<ROWS;r++){var d=document.createElement('div');d.className='r';bgEl.appendChild(d);rowEls.push(d);}
  var fc=0;
  function render(now){
    fc++;
    if(fc%30===0){updIsland();updFade();}
    var a1x=Math.cos(now*0.0004)*FCOLS*0.3+FCOLS/2;
    var a1y=Math.sin(now*0.0007)*FROWS*0.3+FROWS/2;
    var a2x=Math.cos(now*0.001+Math.PI)*FCOLS*0.25+FCOLS/2;
    var a2y=Math.sin(now*0.0006+Math.PI)*FROWS*0.25+FROWS/2;

    var cFX=-200,cFY=-200;
    if(mouseOn){cFX=(mouseX/innerWidth)*FCOLS;cFY=(mouseY/innerHeight)*FROWS;}
    for(var i=0;i<fieldB.length;i++)fieldB[i]*=DECAY;
    for(var i=0;i<particles.length;i++){
      var p=particles[i];
      var d1x=a1x-p.x,d1y=a1y-p.y,d2x=a2x-p.x,d2y=a2y-p.y;
      var dist1=Math.sqrt(d1x*d1x+d1y*d1y)||1,dist2=Math.sqrt(d2x*d2x+d2y*d2y)||1;
      var fx,fy,best=1,minD=dist1;
      if(dist2<minD){best=2;minD=dist2;}

      if(mouseOn){var dcx=cFX-p.x,dcy=cFY-p.y,dC=Math.sqrt(dcx*dcx+dcy*dcy)||1;if(dC<minD){best=3;minD=dC;}}
      if(best===1){fx=(d1x/dist1)*0.18;fy=(d1y/dist1)*0.18;}
      else if(best===2){fx=(d2x/dist2)*0.06;fy=(d2y/dist2)*0.06;}
      else if(best===3){
        var dcx2=cFX-p.x,dcy2=cFY-p.y,dC2=Math.sqrt(dcx2*dcx2+dcy2*dcy2)||1;
        fx=(dcx2/dC2)*0.3;fy=(dcy2/dC2)*0.3;}

      var rp=repel(p.x,p.y);if(rp){fx+=rp.fx;fy+=rp.fy;}
      p.vx=(p.vx+fx)*0.96+(Math.random()-.5)*0.18;
      p.vy=(p.vy+fy)*0.96+(Math.random()-.5)*0.18;
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x+=FCOLS;if(p.x>=FCOLS)p.x-=FCOLS;
      if(p.y<0)p.y+=FROWS;if(p.y>=FROWS)p.y-=FROWS;
      splat(pStamp,p.x,p.y,Math.atan2(p.vy,p.vx));
    }
    splat(aStamp,a1x,a1y,0);splat(aStamp,a2x,a2y,Math.PI);
    if(mouseOn)splat(cStamp,cFX,cFY,0);
    for(var row=0;row<ROWS;row++){
      var line='';
      for(var col=0;col<COLS;col++){
        var fy=row*FOS,fx=col*FOS,sum=0,aSum=0,aW=0;
        for(var sy=0;sy<FOS;sy++)for(var sx=0;sx<FOS;sx++){var idx=(fy+sy)*FCOLS+(fx+sx);sum+=fieldB[idx];if(fieldB[idx]>0.01){aSum+=fieldA[idx]*fieldB[idx];aW+=fieldB[idx];}}
        var avg=sum/(FOS*FOS);
        // Elliptical fade
        var ndx=(col-ccx)/crx;
        var ndy=(row-ccy)/cry;
        var nd=ndx*ndx+ndy*ndy;
        var fade=nd<1?1:1;
        avg*=fade;
        if(avg<0.03){line+=' ';continue;}
        var angle=aW>0?aSum/aW:0;
        var ai8=((Math.round(angle/(Math.PI/4))%8)+8)%8;
        var ch=avg>0.3?INT[Math.min(INT.length-1,(avg*INT.length)|0)]:DIR[ai8];
        var alphaIdx=Math.max(1,Math.min(10,Math.round(avg*10)));
        line+='<span class="a'+alphaIdx+'">'+ch+'</span>';
      }
      rowEls[row].innerHTML=line;
    }
    requestAnimationFrame(render);
  }
  requestAnimationFrame(render);
})();
</script>
</body>
</html>
