<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>55 — hummingbird</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#060608;overflow:hidden;cursor:crosshair}
canvas{position:fixed;inset:0;z-index:0}
.content{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;pointer-events:none;padding:48px}
.card{pointer-events:auto;text-align:center}
</style></head><body>
<canvas id="c"></canvas>
<div class="content"><div class="card" id="card"></div></div>
<script>
(function(){
var CW=4.8,CH=10,cvs=document.getElementById('c'),ctx=cvs.getContext('2d');
var W=innerWidth,H=innerHeight;cvs.width=W;cvs.height=H;
var COLS=Math.ceil(W/CW)+1,ROWS=Math.ceil(H/CH)+1;
ctx.font='8px Courier New';ctx.textBaseline='top';
var mx=W/2,my=H/2,mOn=false;
addEventListener('mousemove',function(e){mOn=true;mx=e.clientX;my=e.clientY;});
addEventListener('mouseleave',function(){mOn=false;});
addEventListener('touchstart',function(e){if(e.touches[0]){mOn=true;mx=e.touches[0].clientX;my=e.touches[0].clientY;}},{passive:true});
addEventListener('touchmove',function(e){if(e.touches[0]){mOn=true;mx=e.touches[0].clientX;my=e.touches[0].clientY;}},{passive:true});
document.getElementById('card').innerHTML='';

// Hummingbird — single bird drifts between three blooms, wings a
// blur of cycling glyphs. Cursor tugs the middle bloom; the bird
// eventually notices and follows.

var grid=new Float32Array(COLS*ROWS);
var kind=new Uint8Array(COLS*ROWS); // 0 empty,1 leaf,2 stem,3 bloom,4 body,5 wing,6 tongue

var blooms=[
  {bx:COLS*0.22,by:ROWS*0.48,ax:COLS*0.22,ay:ROWS*0.48,sway:0},
  {bx:COLS*0.50,by:ROWS*0.36,ax:COLS*0.50,ay:ROWS*0.36,sway:1},
  {bx:COLS*0.78,by:ROWS*0.54,ax:COLS*0.78,ay:ROWS*0.54,sway:2}
];
var bird={x:blooms[0].ax+8,y:blooms[0].ay-3,tgt:0,state:'approach',timer:0,drinkT:0,beakOut:0};
var WINGS=['\u2248','~','-','=','\u2248','~','\u2261','='];
var frame=0;

// Pre-seed leaf dots
var leaves=[];
for(var i=0;i<160;i++){
  leaves.push({x:Math.random()*COLS,y:ROWS*(0.55+Math.random()*0.45),g:0.15+Math.random()*0.35});
}

function placeBloom(b){
  var cx=Math.round(b.ax),cy=Math.round(b.ay);
  // stem
  for(var s=0;s<12;s++){
    var sy=cy+1+s;
    var sx=cx+Math.round(Math.sin((frame*0.01)+s*0.25+b.sway)*0.9);
    if(sx>=0&&sx<COLS&&sy>=0&&sy<ROWS){var id=sy*COLS+sx;grid[id]=0.55;kind[id]=2;}
  }
  // bloom petals — 5-char wide cross
  var pat=[[0,-1,'*',1],[-1,0,'{',1],[0,0,'o',1.2],[1,0,'}',1],[0,1,'*',1],[-2,0,'(',0.75],[2,0,')',0.75],[-1,-1,'.',0.6],[1,-1,'.',0.6]];
  for(var p=0;p<pat.length;p++){
    var px=cx+pat[p][0],py=cy+pat[p][1];
    if(px>=0&&px<COLS&&py>=0&&py<ROWS){
      var id2=py*COLS+px;grid[id2]=pat[p][3];kind[id2]=3;
    }
  }
  // leaves
  var lpat=[[-3,2],[3,2],[-4,4],[4,4],[-2,6],[2,6]];
  for(var l=0;l<lpat.length;l++){
    var lx=cx+lpat[l][0]+Math.round(Math.sin(frame*0.02+l+b.sway)*0.5),ly=cy+lpat[l][1];
    if(lx>=0&&lx<COLS&&ly>=0&&ly<ROWS){var id3=ly*COLS+lx;grid[id3]=0.35;kind[id3]=1;}
  }
}

function placeBird(){
  var bx=Math.round(bird.x),by=Math.round(bird.y);
  // body
  var body=['<','=','>'];
  for(var i=0;i<3;i++){
    var cxp=bx-1+i;
    if(cxp>=0&&cxp<COLS&&by>=0&&by<ROWS){
      var id=by*COLS+cxp;grid[id]=1.4;kind[id]=4;
    }
  }
  // tail
  var tx=bx+2;
  if(tx>=0&&tx<COLS&&by>=0&&by<ROWS){var id=by*COLS+tx;grid[id]=0.7;kind[id]=4;}
  // wings — 2 rows of blur chars on either side
  var wphase=frame%WINGS.length;
  var wl=WINGS[wphase],wr=WINGS[(wphase+4)%WINGS.length];
  for(var w=0;w<2;w++){
    var wy=by-1+w*2;
    if(wy<0||wy>=ROWS) continue;
    var idL=wy*COLS+(bx-2);
    var idR=wy*COLS+(bx);
    if(bx-2>=0){grid[idL]=1.1;kind[idL]=5;}
    if(bx<COLS){grid[idR]=1.1;kind[idR]=5;}
    var idL2=wy*COLS+(bx-3);
    var idR2=wy*COLS+(bx+1);
    if(bx-3>=0){grid[idL2]=0.55;kind[idL2]=5;}
    if(bx+1<COLS){grid[idR2]=0.55;kind[idR2]=5;}
  }
  // beak/tongue when drinking
  if(bird.beakOut>0.1){
    var tlen=Math.round(bird.beakOut*3);
    for(var t=1;t<=tlen;t++){
      var tx2=bx-1-t;
      if(tx2>=0&&by>=0&&by<ROWS){var id2=by*COLS+tx2;grid[id2]=0.9;kind[id2]=6;}
    }
  }
  bird._wl=wl;bird._wr=wr;
}

function step(){
  frame++;
  // Cursor pulls middle bloom
  var mid=blooms[1];
  if(mOn){
    var tcx=mx/CW,tcy=my/CH;
    mid.ax+=(tcx-mid.ax)*0.04;
    mid.ay+=(tcy-mid.ay)*0.04;
  }else{
    mid.ax+=(mid.bx-mid.ax)*0.02;
    mid.ay+=(mid.by-mid.ay)*0.02;
  }
  // Gentle sway on others
  blooms[0].ax=blooms[0].bx+Math.sin(frame*0.012)*0.6;
  blooms[0].ay=blooms[0].by+Math.cos(frame*0.009)*0.3;
  blooms[2].ax=blooms[2].bx+Math.sin(frame*0.014+1)*0.7;
  blooms[2].ay=blooms[2].by+Math.cos(frame*0.011+1)*0.3;

  // Bird state machine
  var tb=blooms[bird.tgt];
  // Hover offset: drink position is to the right of the flower (bird's beak points left into the bloom)
  var hx=tb.ax+3.5+Math.sin(frame*0.18)*0.3;
  var hy=tb.ay-0.2+Math.cos(frame*0.22)*0.25;
  bird.x+=(hx-bird.x)*0.07;
  bird.y+=(hy-bird.y)*0.07;
  bird.timer++;
  if(bird.state==='approach'){
    if(Math.abs(hx-bird.x)<0.8&&Math.abs(hy-bird.y)<0.6){
      bird.state='drink';bird.timer=0;
    }
  }else if(bird.state==='drink'){
    bird.beakOut+=(1-bird.beakOut)*0.12;
    if(bird.timer>130+Math.random()*80){
      bird.state='leave';bird.timer=0;
    }
  }else if(bird.state==='leave'){
    bird.beakOut*=0.85;
    if(bird.timer>20){
      // pick new bloom, preferring the one cursor moves
      var next;
      if(mOn&&Math.random()<0.6) next=1;
      else{do{next=Math.floor(Math.random()*3);}while(next===bird.tgt);}
      bird.tgt=next;
      bird.state='approach';bird.timer=0;
    }
  }
}

var RAMP=['\u00B7','.',':','o','*','#'];

function render(){
  // clear grid
  for(var i=0;i<grid.length;i++){grid[i]=0;kind[i]=0;}

  // Leaves background
  for(var l=0;l<leaves.length;l++){
    var lf=leaves[l];
    var lx=Math.round(lf.x),ly=Math.round(lf.y);
    if(lx>=0&&lx<COLS&&ly>=0&&ly<ROWS){
      var id=ly*COLS+lx;
      if(grid[id]<lf.g){grid[id]=lf.g;kind[id]=1;}
    }
  }

  // Blooms
  for(var b=0;b<blooms.length;b++) placeBloom(blooms[b]);

  // Bird
  step();
  placeBird();

  ctx.fillStyle='#060608';ctx.fillRect(0,0,W,H);
  var bx=Math.round(bird.x),by=Math.round(bird.y);
  for(var row=0;row<ROWS;row++){
    for(var col=0;col<COLS;col++){
      var id=row*COLS+col;
      var g=grid[id];if(g<0.05) continue;
      var k=kind[id],ch;
      if(k===5){
        // wing
        ch=(col<bx)?bird._wl:bird._wr;
      }else if(k===4){
        var d=col-bx;
        ch=d<=-1?'<':d===0?'=':d===1?'>':'-';
      }else if(k===6){ch='-';}
      else if(k===3){
        var cxp=Math.round(blooms[0].ax),cyp=Math.round(blooms[0].ay);
        var cxq=Math.round(blooms[1].ax),cyq=Math.round(blooms[1].ay);
        var cxr=Math.round(blooms[2].ax),cyr=Math.round(blooms[2].ay);
        var bi= (col===cxp&&row===cyp)?0:(col===cxq&&row===cyq)?1:(col===cxr&&row===cyr)?2:-1;
        if(bi>=0){ch='o';}
        else{
          var dcol=col-cxp,drow=row-cyp;
          ch=(Math.abs(dcol)===1&&drow===0)?(dcol<0?'{':'}'):(drow===-1?'*':drow===1?'*':'.');
        }
      }else if(k===2){ch='|';}
      else{ch=RAMP[Math.min(5,(g*5)|0)];}
      ctx.globalAlpha=Math.min(1,g);
      ctx.fillStyle='#ffffff';
      ctx.fillText(ch,col*CW,row*CH);
    }
  }
  ctx.globalAlpha=1;
  requestAnimationFrame(render);
}
requestAnimationFrame(render);
})();
</script></body></html>
