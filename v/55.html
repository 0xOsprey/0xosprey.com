<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>55 — physarum</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#060608;overflow:hidden;cursor:crosshair}
canvas{position:fixed;inset:0;z-index:0}
.content{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;pointer-events:none;padding:48px}
.card{pointer-events:auto;text-align:center}
</style></head><body>
<canvas id="c"></canvas>
<div class="content"><div class="card" id="card"></div></div>
<script>
(function(){
var CW=4.8,CH=10,cvs=document.getElementById('c'),ctx=cvs.getContext('2d');
var W=innerWidth,H=innerHeight;cvs.width=W;cvs.height=H;
var COLS=Math.ceil(W/CW)+1,ROWS=Math.ceil(H/CH)+1;
ctx.font='8px Courier New';ctx.textBaseline='top';
var mx=W/2,my=H/2,mOn=false;
addEventListener('mousemove',function(e){mOn=true;mx=e.clientX;my=e.clientY;});
addEventListener('mouseleave',function(){mOn=false;});
addEventListener('touchstart',function(e){if(e.touches[0]){mOn=true;mx=e.touches[0].clientX;my=e.touches[0].clientY;}},{passive:true});
addEventListener('touchmove',function(e){if(e.touches[0]){mOn=true;mx=e.touches[0].clientX;my=e.touches[0].clientY;}},{passive:true});
document.getElementById('card').innerHTML='';

// Physarum polycephalum — slime mold chemotaxis simulation.
// Thousands of agents deposit a chemical trail, then sense it
// ahead and to the sides, turning toward the strongest signal.
// Collective behavior self-organizes into vein networks that
// look like neural tissue, mycelium, or exposed viscera.
// Cursor is an irresistible attractant.

var NA=4200;
var SA=0.75;   // sensor angle (rad, ~43°)
var SD=16;     // sensor distance (px)
var RA=0.72;   // rotation amount (rad, ~41°)
var STEP=0.9;  // px per frame
var DEPOSIT=3.5;
var DECAY=0.945;

var trail=new Float32Array(COLS*ROWS);
var trailBuf=new Float32Array(COLS*ROWS);

// Agents in pixel space
var ax=new Float32Array(NA);
var ay=new Float32Array(NA);
var aa=new Float32Array(NA);

// Init: all start from center mass, facing outward
for(var i=0;i<NA;i++){
  var ang=Math.random()*Math.PI*2;
  var r=Math.random()*Math.min(W,H)*0.15;
  ax[i]=W/2+Math.cos(ang)*r;
  ay[i]=H/2+Math.sin(ang)*r;
  aa[i]=ang; // face outward
}

function sampleAt(px,py){
  var c=(px/CW)|0,r=(py/CH)|0;
  if(c<0||c>=COLS||r<0||r>=ROWS) return 0;
  // Add cursor attractant
  if(mOn){var dx=px-mx,dy=py-my;var d2=dx*dx+dy*dy;if(d2<SD*SD*4) return trail[r*COLS+c]+18*Math.exp(-d2/(SD*SD*2));}
  return trail[r*COLS+c];
}

var frame=0;
function render(){
  frame++;

  // Diffuse: 3×3 box blur + decay
  for(var r=0;r<ROWS;r++){
    for(var c=0;c<COLS;c++){
      var s=0,n=0;
      for(var dr=-1;dr<=1;dr++) for(var dc=-1;dc<=1;dc++){
        var nr=r+dr,nc=c+dc;
        if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS){s+=trail[nr*COLS+nc];n++;}
      }
      trailBuf[r*COLS+c]=(s/n)*DECAY;
    }
  }
  var tmp=trail;trail=trailBuf;trailBuf=tmp;

  // Agents
  for(var i=0;i<NA;i++){
    var a=aa[i];
    var ca=Math.cos(a),sa2=Math.sin(a);
    var cl=Math.cos(a-SA),sl=Math.sin(a-SA);
    var cr=Math.cos(a+SA),sr=Math.sin(a+SA);

    var F=sampleAt(ax[i]+ca*SD, ay[i]+sa2*SD);
    var L=sampleAt(ax[i]+cl*SD, ay[i]+sl*SD);
    var R=sampleAt(ax[i]+cr*SD, ay[i]+sr*SD);

    if(F>=L&&F>=R){ /* straight */ }
    else if(L>=R&&L>F){ aa[i]-=RA; }
    else if(R>L&&R>F){ aa[i]+=RA; }
    else{ aa[i]+=(Math.random()<0.5?1:-1)*RA; }

    ax[i]+=Math.cos(aa[i])*STEP;
    ay[i]+=Math.sin(aa[i])*STEP;

    // Wrap
    if(ax[i]<0) ax[i]+=W; else if(ax[i]>=W) ax[i]-=W;
    if(ay[i]<0) ay[i]+=H; else if(ay[i]>=H) ay[i]-=H;

    // Deposit
    var dc=(ax[i]/CW)|0,dr=(ay[i]/CH)|0;
    if(dc>=0&&dc<COLS&&dr>=0&&dr<ROWS) trail[dr*COLS+dc]=Math.min(220,trail[dr*COLS+dc]+DEPOSIT);
  }

  var RAMP=['\u00B7','.',':',';','=','+','*','#','@','\u2588'];
  var icx=W/2/CW,icy=H/2/CH,irx=32,iry=7;

  ctx.fillStyle='#060608';ctx.fillRect(0,0,W,H);ctx.fillStyle='#ffffff';
  for(var row=0;row<ROWS;row++){
    for(var col=0;col<COLS;col++){
      var b=trail[row*COLS+col]/220;
      if(b<0.04) continue;
      var ndx=(col-icx)/irx,ndy=(row-icy)/iry;
      var nd2=ndx*ndx+ndy*ndy;
      if(nd2<1) continue;
      if(nd2<1.8) b*=(nd2-1)/0.8;
      if(b<0.04) continue;
      b=Math.min(1,b);
      var ci=Math.min(RAMP.length-1,(b*(RAMP.length-1)+0.5)|0);
      ctx.globalAlpha=b*0.92;
      ctx.fillText(RAMP[ci],col*CW,row*CH);
    }
  }
  ctx.globalAlpha=1;
  requestAnimationFrame(render);
}
requestAnimationFrame(render);
})();
</script></body></html>
