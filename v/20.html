<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>20 — vibrating membrane</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#060608;overflow:hidden;cursor:crosshair}
canvas{position:fixed;inset:0;z-index:0}
.content{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;pointer-events:none;padding:48px}
.card{pointer-events:auto;text-align:left}
.name{position:relative;height:18px;margin-bottom:10px;white-space:nowrap}
.n1,.n2{position:absolute;top:0;left:0;font:13px/1 'Courier New',monospace;color:rgba(255,255,255,.85);text-shadow:0 0 8px #060608,0 0 22px #060608;letter-spacing:.04em}
.n1{animation:ns 10s infinite}
.n2{animation:ns 10s 5s infinite;opacity:0}
@keyframes ns{0%,40%{opacity:1}50%,90%{opacity:0}100%{opacity:1}}
.icons{display:flex;gap:14px;align-items:center}
.icons a{color:rgba(255,255,255,.85);opacity:.45;transition:opacity .3s;text-decoration:none}
.icons a:hover{opacity:1}
.icons svg{display:block;width:14px;height:14px}
</style></head><body>
<canvas id="c"></canvas>
<div class="content"><div class="card" id="card"></div></div>
<script>
(function(){
var CW=4.8,CH=10,cvs=document.getElementById('c'),ctx=cvs.getContext('2d');
var W=innerWidth,H=innerHeight;cvs.width=W;cvs.height=H;
var COLS=Math.ceil(W/CW)+1,ROWS=Math.ceil(H/CH)+1;
ctx.font='8px Courier New';ctx.textBaseline='top';
var mx=-1,my=-1,mOn=false;
addEventListener('mousemove',function(e){mOn=true;mx=e.clientX;my=e.clientY});
addEventListener('mouseleave',function(){mOn=false});
var cardEl=document.getElementById('card');
cardEl.innerHTML='<div class="name"><span class="n1">Joe Coll</span><span class="n2">Osprey</span></div><div class="icons"><a href="https://x.com/0xOsprey" title="X" target="_blank"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.736l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></a><a href="https://github.com/0xOsprey" title="GitHub" target="_blank"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.342-3.369-1.342-.454-1.155-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0112 6.844a9.59 9.59 0 012.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg></a><a href="mailto:hi@0xosprey.com" title="Email"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg></a></div>';

var RAMP=' .\u00B7:;=+*#%@\u2588';

// 2D wave equation on a rectangular membrane:
// ∂²u/∂t² = c²∇²u
// Discretised with finite differences. Waves travel, reflect off walls,
// and interfere — forming standing wave patterns and Chladni-like nodes.
// Cursor acts as a continuous harmonic source, injecting circular waves.
var N=COLS*ROWS;
var u=new Float32Array(N);    // current displacement
var up=new Float32Array(N);   // previous displacement
var un=new Float32Array(N);   // next displacement

var C2=0.38*0.38;  // c²Δt²/Δx² — must be < 0.5 for stability
var DAMP=0.9992;   // very gentle damping per step
var SPF=2;         // simulation steps per render frame

// Seed with a few impulses to start interesting reflections
(function seed(){
  var seeds=[[Math.floor(COLS*0.2),Math.floor(ROWS*0.3),1.8],
             [Math.floor(COLS*0.7),Math.floor(ROWS*0.6),1.5],
             [Math.floor(COLS*0.5),Math.floor(ROWS*0.2),1.2]];
  for(var s=0;s<seeds.length;s++){
    var sc=seeds[s][0],sr=seeds[s][1],sa=seeds[s][2];
    for(var dr=-4;dr<=4;dr++)for(var dc=-4;dc<=4;dc++){
      var r=sr+dr,c=sc+dc;
      if(r<1||r>=ROWS-1||c<1||c>=COLS-1)continue;
      var d=Math.sqrt(dr*dr+dc*dc);
      if(d<4.5)u[r*COLS+c]=sa*(1-d/4.5);
    }
  }
})();

var frameT=0;

function waveStep(){
  for(var r=1;r<ROWS-1;r++){
    var rC=r*COLS;
    for(var c=1;c<COLS-1;c++){
      var i=rC+c;
      var laplacian=u[i-1]+u[i+1]+u[i-COLS]+u[i+COLS]-4*u[i];
      un[i]=(2*u[i]-up[i]+C2*laplacian)*DAMP;
    }
  }
  // Absorbing boundaries: damp at edges to kill reflections softly
  for(var c=0;c<COLS;c++){un[c]=un[COLS+c]*0.5;un[(ROWS-1)*COLS+c]=un[(ROWS-2)*COLS+c]*0.5;}
  for(var r=0;r<ROWS;r++){un[r*COLS]=un[r*COLS+1]*0.5;un[r*COLS+COLS-1]=un[r*COLS+COLS-2]*0.5;}
  // Swap buffers
  var tmp=up;up=u;u=un;un=tmp;
}

function render(now){
  frameT++;

  // Cursor: continuous oscillating point source
  if(mOn){
    var mc=mx/CW|0,mr=my/CH|0;
    if(mc>0&&mc<COLS-1&&mr>0&&mr<ROWS-1){
      u[mr*COLS+mc]+=Math.sin(frameT*0.38)*0.9;
    }
  }

  for(var s=0;s<SPF;s++)waveStep();

  ctx.fillStyle='#060608';ctx.fillRect(0,0,W,H);ctx.fillStyle='#d4d0c8';

  var cardRect=cardEl.getBoundingClientRect();
  var ccx=(cardRect.left+cardRect.right)/2/CW,ccy=(cardRect.top+cardRect.bottom)/2/CH;
  var crx=(cardRect.width/2/CW)+3,cry=(cardRect.height/2/CH)+2;

  for(var row=0;row<ROWS;row++){
    for(var col=0;col<COLS;col++){
      var v=u[row*COLS+col];
      // Only show positive displacement (wave crests glow)
      var b=Math.max(0,v)*1.1;
      b=Math.min(1,b);
      if(b<0.025)continue;

      var ndx=(col-ccx)/crx,ndy=(row-ccy)/cry;
      var nd=ndx*ndx+ndy*ndy;
      b*=nd<1?nd*nd:1;
      if(b<0.025)continue;

      var ci=Math.min(RAMP.length-1,(b*RAMP.length)|0);
      var ch=RAMP[ci];
      if(ch===' ')continue;
      ctx.globalAlpha=b;
      ctx.fillText(ch,col*CW,row*CH);
    }
  }
  ctx.globalAlpha=1;
  requestAnimationFrame(render);
}
requestAnimationFrame(render);
})();
</script></body></html>
