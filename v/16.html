<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>16 — flow field</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#060608;overflow:hidden;cursor:crosshair}
canvas{position:fixed;inset:0;z-index:0}
.content{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;pointer-events:none;padding:48px}
.card{pointer-events:auto;text-align:center}
.name{position:relative;height:38px;margin-bottom:20px;white-space:nowrap}
.n1,.n2{position:absolute;top:0;left:50%;transform:translateX(-50%);font:28px/1 'Courier New',monospace;color:rgba(255,255,255,.85);text-shadow:0 0 8px #060608,0 0 22px #060608;letter-spacing:.04em}
.n1{animation:ns 14s infinite}
.n2{animation:ns 14s 7s infinite;opacity:0;filter:blur(7px)}
@keyframes ns{0%,38%{opacity:1;filter:blur(0)}52%{opacity:0;filter:blur(7px)}88%{opacity:0;filter:blur(7px)}100%{opacity:1;filter:blur(0)}}
.icons{display:flex;gap:28px;align-items:center;justify-content:center}
.icons a{color:rgba(255,255,255,.85);opacity:.45;transition:opacity .3s;text-decoration:none}
.icons a:hover{opacity:1}
.icons svg{display:block;width:28px;height:28px}
</style></head><body>
<canvas id="c"></canvas>
<div class="content"><div class="card" id="card"></div></div>
<script>
(function(){
var CW=4.8,CH=10,cvs=document.getElementById('c'),ctx=cvs.getContext('2d');
var W=innerWidth,H=innerHeight;cvs.width=W;cvs.height=H;
var COLS=Math.ceil(W/CW)+1,ROWS=Math.ceil(H/CH)+1;
ctx.font='8px Courier New';ctx.textBaseline='top';
var mx=-1,my=-1,mOn=false;
addEventListener('mousemove',function(e){mOn=true;mx=e.clientX;my=e.clientY});
addEventListener('mouseleave',function(){mOn=false});
var cardEl=document.getElementById('card');
cardEl.innerHTML='<div class="name"><span class="n1">Joe Coll</span><span class="n2">Osprey</span></div><div class="icons"><a href="https://x.com/0xOsprey" title="X" target="_blank"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.736l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></a><a href="https://github.com/0xOsprey" title="GitHub" target="_blank"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.342-3.369-1.342-.454-1.155-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0112 6.844a9.59 9.59 0 012.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg></a><a href="mailto:hi@0xosprey.com" title="Email"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg></a></div>';

var RAMP=' .\u00B7:;=+*#';
var DIRS=['\u2192','\u2197','\u2191','\u2196','\u2190','\u2199','\u2193','\u2198'];

// Noise flow field: particles follow a slowly-evolving vector field
// Field angle computed from layered sine waves (smooth, Perlin-like)
// Particles leave trails that decay, painting organic flowing fabric.
var N=520;
var px=new Float32Array(N),py=new Float32Array(N);
for(var i=0;i<N;i++){px[i]=Math.random()*W;py[i]=Math.random()*H;}

var SPEED=1.75,DECAY=0.89;
var field=new Float32Array(COLS*ROWS);
var dfx=new Float32Array(COLS*ROWS);
var dfy=new Float32Array(COLS*ROWS);

// Smooth multi-octave angle field — evolves slowly over time
function flowAngle(x,y,t){
  var s=0.030;
  return(Math.sin(x*s*1.00+y*s*0.40+t*0.160)*0.38
        +Math.sin(x*s*0.55-y*s*1.05+t*0.110)*0.28
        +Math.sin(x*s*1.35+y*s*0.85-t*0.130)*0.20
        +Math.sin(x*s*0.28+y*s*1.55+t*0.095)*0.16
        +Math.sin((x+y)*s*0.75+t*0.200)*0.18
        +Math.sin((x-y)*s*0.60-t*0.140)*0.14)*Math.PI*2.8;
}

function render(now){
  var t=now*0.001;

  // Decay persistence fields
  for(var i=0;i<field.length;i++){
    field[i]*=DECAY;dfx[i]*=DECAY;dfy[i]*=DECAY;
  }

  // Move particles along flow field
  for(var i=0;i<N;i++){
    var a=flowAngle(px[i],py[i],t);
    var vx=Math.cos(a)*SPEED;
    var vy=Math.sin(a)*SPEED;

    // Cursor creates a vortex: particles swirl around it
    if(mOn){
      var mdx=px[i]-mx,mdy=py[i]-my;
      var md=Math.sqrt(mdx*mdx+mdy*mdy)||1;
      if(md<180){
        var mf=(1-md/180)*(1-md/180)*2.2;
        // Tangential swirl (perpendicular to radius)
        vx+=-mdy/md*mf;
        vy+= mdx/md*mf;
      }
    }

    px[i]+=vx;py[i]+=vy;
    // Toroidal wrap
    if(px[i]<0)px[i]+=W;else if(px[i]>=W)px[i]-=W;
    if(py[i]<0)py[i]+=H;else if(py[i]>=H)py[i]-=H;

    // Splat onto density+direction fields
    var col=px[i]/CW|0,row=py[i]/CH|0;
    if(col<0||col>=COLS||row<0||row>=ROWS)continue;
    var idx=row*COLS+col,v=0.32;
    field[idx]+=v;dfx[idx]+=vx*v;dfy[idx]+=vy*v;
    if(col>0)      {field[idx-1]   +=v*0.18;dfx[idx-1]   +=vx*v*0.18;dfy[idx-1]   +=vy*v*0.18;}
    if(col<COLS-1) {field[idx+1]   +=v*0.18;dfx[idx+1]   +=vx*v*0.18;dfy[idx+1]   +=vy*v*0.18;}
    if(row>0)      {field[idx-COLS]+=v*0.18;dfx[idx-COLS]+=vx*v*0.18;dfy[idx-COLS]+=vy*v*0.18;}
    if(row<ROWS-1) {field[idx+COLS]+=v*0.18;dfx[idx+COLS]+=vx*v*0.18;dfy[idx+COLS]+=vy*v*0.18;}
  }

  ctx.fillStyle='#060608';ctx.fillRect(0,0,W,H);ctx.fillStyle='#ffffff';

  var cardRect=cardEl.getBoundingClientRect();
  var ccx=(cardRect.left+cardRect.right)/2/CW,ccy=(cardRect.top+cardRect.bottom)/2/CH;
  var crx=(cardRect.width/2/CW)+3,cry=(cardRect.height/2/CH)+2;

  for(var row=0;row<ROWS;row++){
    for(var col=0;col<COLS;col++){
      var idx=row*COLS+col;
      var b=Math.min(1,field[idx]);
      if(b<0.03)continue;

      var ndx=(col-ccx)/crx,ndy=(row-ccy)/cry;
      var nd=ndx*ndx+ndy*ndy;
      b*=nd<1?nd*nd:1;
      if(b<0.03)continue;

      var ch;
      if(b>0.48){
        ch=RAMP[Math.min(RAMP.length-1,(b*(RAMP.length-1))|0)];
      }else{
        var angle=Math.atan2(dfy[idx],dfx[idx]);
        var di=((Math.round(angle/(Math.PI/4))%8)+8)%8;
        ch=DIRS[di];
      }
      ctx.globalAlpha=b;
      ctx.fillText(ch,col*CW,row*CH);
    }
  }
  ctx.globalAlpha=1;
  requestAnimationFrame(render);
}
requestAnimationFrame(render);
})();
</script></body></html>
