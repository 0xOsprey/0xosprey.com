<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>30 — northern lights</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#060608;overflow:hidden;cursor:crosshair}
canvas{position:fixed;inset:0;z-index:0}
.content{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;pointer-events:none;padding:48px}
.card{pointer-events:auto;text-align:center}
.name{position:relative;height:52px;margin-bottom:20px;white-space:nowrap}
.n1,.n2{position:absolute;top:0;left:50%;transform:translateX(-50%);font:40px/1 'Courier New',monospace;color:rgba(255,255,255,.85);text-shadow:0 0 8px #060608,0 0 22px #060608;letter-spacing:.04em}
.n1{animation:ns1 14s infinite}
.n2{animation:ns2 14s infinite;opacity:0}
@keyframes ns1{0%,40%{opacity:1;filter:blur(0)}55%{opacity:0;filter:blur(7px)}90%{opacity:0;filter:blur(7px)}100%{opacity:1;filter:blur(0)}}@keyframes ns2{0%,40%{opacity:0;filter:blur(7px)}55%{opacity:1;filter:blur(0)}90%{opacity:1;filter:blur(0)}100%{opacity:0;filter:blur(7px)}}
.icons{display:flex;gap:28px;align-items:center;justify-content:center}
.icons a{color:rgba(255,255,255,.85);opacity:1;transition:opacity .3s;text-decoration:none}
.icons a:hover{opacity:.45}
.icons svg{display:block;width:28px;height:28px;filter:drop-shadow(0 0 2px rgba(6,6,8,.9)) drop-shadow(0 0 6px rgba(6,6,8,.5))}
</style></head><body>
<canvas id="c"></canvas>
<div class="content"><div class="card" id="card"></div></div>
<script>
(function(){
var CW=4.8,CH=10,cvs=document.getElementById('c'),ctx=cvs.getContext('2d');
var W=innerWidth,H=innerHeight;cvs.width=W;cvs.height=H;
var COLS=Math.ceil(W/CW)+1,ROWS=Math.ceil(H/CH)+1;
ctx.font='8px Courier New';ctx.textBaseline='top';
var mx=-1,my=-1,mOn=false;
addEventListener('mousemove',function(e){mOn=true;mx=e.clientX;my=e.clientY});
addEventListener('mouseleave',function(){mOn=false});
var cardEl=document.getElementById('card');
cardEl.innerHTML='';

// Northern lights — vertical curtain folds drift across the sky,
// each pulsing with its own rhythm. A horizontal shimmer runs up the curtains
// like standing waves in a magnetic field. Cursor excites a brightening at its position.

var RAMP=' .\u00B7:;=+*#%@\u2588';
var NFOLDS=9;

var folds=[];
for(var i=0;i<NFOLDS;i++){
  folds.push({
    x:  W*(i+0.35+Math.random()*0.3)/NFOLDS,
    vx: (Math.random()-.5)*0.18,
    phase:  Math.random()*Math.PI*2,
    freq:   0.22+Math.random()*0.28,
    shPhase:Math.random()*Math.PI*2,
    shFreq: 0.8+Math.random()*1.4,
    sig:    W*0.045+Math.random()*W*0.030
  });
}

// Pre-allocate per-column brightness and row-oscillation scratch
var colB=new Float32Array(COLS);

function render(now){
  var t=now*.001;

  // Update fold positions
  for(var i=0;i<NFOLDS;i++){
    var f=folds[i];
    f.vx+=(Math.random()-.5)*0.008;
    if(f.vx>0.28) f.vx=0.28; else if(f.vx<-0.28) f.vx=-0.28;
    f.x+=f.vx;
    if(f.x<-W*0.15) f.x=W*1.15;
    if(f.x>W*1.15)  f.x=-W*0.15;
  }

  // Cursor: adds a transient bright fold at cursor x
  var cursorBoost=0,cursorX=0;
  if(mOn){cursorBoost=0.65;cursorX=mx;}

  ctx.fillStyle='#060608';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#ffffff';

  // Compute per-column brightness sums from all folds
  for(var col=0;col<COLS;col++){
    var x=col*CW;
    var b=0;
    for(var i=0;i<NFOLDS;i++){
      var f=folds[i];
      var dx=x-f.x;
      var gb=Math.exp(-dx*dx/(2*f.sig*f.sig));
      // Slow pulse: raised-cosine for softer breathing
      var amp=0.35+0.65*Math.pow(Math.max(0,Math.sin(t*f.freq+f.phase)),1.4);
      b+=gb*amp;
    }
    // Cursor brightening: narrow Gaussian
    if(mOn){
      var dc=x-cursorX;
      b+=cursorBoost*Math.exp(-dc*dc/(W*W*0.0010));
    }
    colB[col]=Math.min(1.8,b);
  }

  for(var row=0;row<ROWS;row++){
    var yFrac=row/ROWS;
    // Curtain hangs from top; fades out toward bottom half of screen
    if(yFrac>0.82) continue;
    // Envelope: builds from top edge, peaks ~20% down, fades to ~82%
    var vertEnv;
    if(yFrac<0.06) vertEnv=yFrac/0.06;
    else vertEnv=Math.pow(1-(yFrac-0.06)/0.76,0.55);
    vertEnv=Math.max(0,vertEnv);

    for(var col=0;col<COLS;col++){
      var b=colB[col];
      if(b<0.01) continue;

      // Shimmer: sinusoidal intensity ripple along the curtain height
      // Each fold contributes its own vertical shimmer wave
      var shimmer=1;
      var x=col*CW;
      for(var i=0;i<NFOLDS;i++){
        var f=folds[i];
        var dx=x-f.x;
        var gb=Math.exp(-dx*dx/(2*f.sig*f.sig));
        shimmer+=gb*0.22*Math.sin(t*f.shFreq+f.shPhase+row*0.18);
      }
      shimmer=Math.max(0.4,shimmer);

      var bfinal=Math.min(1,b*shimmer*vertEnv);
      if(bfinal<0.025) continue;

      var ci=Math.min(RAMP.length-1,(bfinal*RAMP.length)|0);
      var ch=RAMP[ci];
      if(ch===' ') continue;
      ctx.globalAlpha=bfinal;
      ctx.fillText(ch,col*CW,row*CH);
    }
  }
  ctx.globalAlpha=1;
  requestAnimationFrame(render);
}
requestAnimationFrame(render);
})();
</script></body></html>
